Screens:
  Sign Document Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =// revert to prior document state if user leaves screen before saving
        If(
            locJobDocumentSave = false,
            ClearCollect(
                colCdsJobDocuments,
                colJobDocumentsCancel
            )
        );
        // reset screen
        UpdateContext(
            {
                locHideScreen: false,
                locJobDocumentSave: false,
                locShowSignatureCapture: false,
                locShowSignatureWarning: false
            }
        )
      OnVisible: |-
        =UpdateContext({locResetScrollable: Blank()});
        ClearCollect(
            colJobDocumentsCancel,
            colCdsJobDocuments
        );
    Children:
      - cmp_SignDoc_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Documents"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_SignDoc_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_SignDoc_Titlebar.Y+cmp_SignDoc_Titlebar.Height
      - cmp_SignDoc_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Jobs Screen'
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - cvs_SignDoc_Scrollable:
          Control: FluidGrid@2.3.0
          Properties:
            BorderThickness: =0
            Height: =681
            Width: =888
            X: =115
            Y: =86
          Children:
            - crd_SignDoc_Verbiage:
                Control: DataCard@1.0.2
                Properties:
                  Fill: =gblAppColors.Secondary.White
                  Height: =100
                  Width: =888
                  X: =0
                  Y: =1
                Children:
                  - lbl_SignDoc_Verbiage:
                      Control: Label@2.5.1
                      Properties:
                        AutoHeight: =true
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Segoe UI'
                        Height: =Coalesce(locResetScrollable, 237)
                        LineHeight: =1.5
                        PaddingLeft: =30
                        PaddingRight: =20
                        PaddingTop: =20
                        Size: =gblAppStyles.Text.Size
                        Text: |-
                          =Text(Today(), "[$-en-US]mmmm d, yyyy")&"

                          "&
                           locContractVerbiage&"
                           "
                        VerticalAlign: =VerticalAlign.Top
                        Width: =861
            - crd_SignDoc_Title:
                Control: DataCard@1.0.2
                Variant: BlankCard
                Properties:
                  Fill: =gblAppColors.Secondary.White
                  Height: =lbl_SignDoc_Title.Height+10
                  Width: =888
                  X: =0
                  Y: =0
                Children:
                  - lbl_SignDoc_Title:
                      Control: Label@2.5.1
                      Properties:
                        AutoHeight: =true
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Segoe UI'
                        Height: =Coalesce(locResetScrollable, 40)
                        PaddingLeft: =30
                        PaddingRight: =20
                        PaddingTop: =25
                        Size: =gblAppStyles.Text.TitleSize
                        Text: =gblRecordCurrentDocument.Name
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.Width
            - crd_SignDoc_Signatures:
                Control: DataCard@1.0.2
                Variant: BlankCard
                Properties:
                  Height: =325
                  Width: =888
                  X: =0
                  Y: =2
                Children:
                  - cmp_SignDoc_AdvanceButton:
                      Control: CanvasComponent
                      ComponentName: cmp_AdvanceButton
                      Properties:
                        ButtonFill: =Color.White
                        Color: =Color.Black
                        Fill: =Color.Transparent
                        Height: =60
                        Icon: |-
                          ={Value: Icon.Check}
                        IconColor: =Color.White
                        IconFill: =gblAppColors.Secondary.Green
                        NavigateScreen: ='Documents Screen'
                        Text: ="Complete Form"
                        Visible: =!IsBlank(img_SignDoc_Homeowner1.Image) And !IsBlank(img_SignDoc_Technician.Image) And gblRecordJobCurrent.Completed='Completed (Jobs)'.No
                        Width: =265
                        X: =603
                        Y: =214
                  - lbl_SignDoc_AdvanceButton:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        FocusedBorderColor: =Color.Transparent
                        FocusedBorderThickness: =0.01
                        Font: =Font.'Open Sans'
                        Height: =cmp_SignDoc_AdvanceButton.Height
                        OnSelect: |-
                          =With(
                              {
                                  varType: "colCdsJobDocuments",
                                  varRecordRef: gblRecordCurrentDocument.'Job Document'
                              },
                              // change document completed status to 'yes'
                              Patch(
                                  colCdsJobDocuments,
                                  LookUp(
                                      colCdsJobDocuments,
                                      'Job Document' = varRecordRef
                                  ),
                                  {
                                      DocumentDate: Today(),
                                      Completed: gblOptionSets.JobDocument.Completed.Yes
                                  }
                              );
                              // update job documents in the AUD records collection
                              If(
                                  IsBlank(
                                      LookUp(
                                          colAUDRecords,
                                          Type = varType
                                          And RecordRef= varRecordRef
                                      )
                                  ),
                                  Collect(
                                      colAUDRecords,
                                      {
                                          Type: varType,
                                          RecordRef: varRecordRef,
                                          Job: gblRecordJobCurrent.Job,
                                          Operation: "U"
                                      }
                                  )
                              )
                          );
                          //Save local data
                          If(
                              gblAppLoadOffline,
                              SaveData(
                                  colAUDRecords,
                                  "localAUDRecords"
                              );
                              SaveData(
                                  colCdsJobDocuments,
                                  "localCdsJobDocuments"
                              )
                          );
                          // flag to save the document changes once screen is hidden
                          UpdateContext({locJobDocumentSave: true});
                          // next screen
                          Navigate('Documents Screen');
                        TabIndex: =0
                        Text: =""
                        Visible: =cmp_SignDoc_AdvanceButton.Visible
                        Width: =cmp_SignDoc_AdvanceButton.Width
                        X: =cmp_SignDoc_AdvanceButton.X
                        Y: =cmp_SignDoc_AdvanceButton.Y

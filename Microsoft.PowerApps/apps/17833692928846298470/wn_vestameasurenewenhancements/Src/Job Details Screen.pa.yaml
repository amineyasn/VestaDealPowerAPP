                  Width: =180
                  X: =668
                  Y: =420
            - btn_JobDetails_ClosedJob__Cancel:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =gblAppColors.Secondary.GrayMediumDark
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =gblAppColors.Secondary.White
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =ColorFade(Self.Fill, -10%)
                  OnSelect: |
                    =// change the jobs completed field to 'No'
                    Patch(
                        colCdsJobs,
                        LookUp(
                            colCdsJobs,
                            appJobIDText = gblRecordJobCurrent.appJobIDText
                        ),
                        {Completed: gblOptionSets.Job.CompletedJob.No}
                    );
                    Set(
                        gblRecordJobCurrent,
                        LookUp(
                            colCdsJobs,
                            appJobIDText = gblRecordJobCurrent.appJobIDText
                        )
                    );
                    // hide the prompt
                    UpdateContext(
                        {
                            locShowClosedJobPrompt: false,
                            locReOpenClosedJobDecisionMade: true
                        }
                    );
                    // unsaved job
                    Collect(
                        colAUDRecords,
                        {
                            Type: "colCdsJobs",
                            RecordRef: gblRecordJobCurrent.Job,
                            Job: gblRecordJobCurrent.Job,
                            Operation: "U"
                        }
                    );
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        )
                    )
                  PressedBorderColor: =Self.BorderColor
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(Self.Fill,-30%)
                  RadiusBottomLeft: =5
                  RadiusBottomRight: =5
                  RadiusTopLeft: =5
                  RadiusTopRight: =5
                  Size: =20
                  Text: ="Make Changes"
                  Width: =215
                  X: =433
                  Y: =420

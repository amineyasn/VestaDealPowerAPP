Screens:
  Job Details Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: =UpdateContext({locCurrentJobDetailsPage:1})
      OnVisible: |-
        =// check if job is closed
        If(
            // open the closed job modal
            gblRecordJobCurrent.Completed = gblOptionSets.Job.CompletedJob.Yes And locReOpenClosedJobDecisionMade = false,
            UpdateContext({locShowClosedJobPrompt: true}),
            With(
                {
                    varType: "colCdsJobs",
                    varRecordRef: gblRecordJobCurrent.Job
                },
                If(
                    IsBlank(
                        LookUp(
                            colAUDRecords,
                            Type = varType
                            And RecordRef = varRecordRef
                        )
                    ),
                    Collect(
                        colAUDRecords,
                        {
                            Type: varType,
                            RecordRef: varRecordRef,
                            Job: gblRecordJobCurrent.Job,
                            Operation: "U"
                        }
                    )
                )
            );
            If(
                gblAppLoadOffline,
                SaveData(
                    colAUDRecords,
                    "localAUDRecords"
                )
            )
        )
    Children:
      - cmp_JobDetails_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Job"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_JobDetails_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_JobDetails_Titlebar.Y+cmp_JobDetails_Titlebar.Height
      - cmp_JobDetails_Titlebar:

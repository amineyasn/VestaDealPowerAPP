Screens:
  Jobs Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |
        =// Set Variables
        Set(
            gblTextClickedSaveScreen,
            Blank()
        );
        Set(
            gblRecordJobCurrent,
            Blank()
        );
        UpdateContext({locBlockUserInput: false});
        Set(
            gblRecordUserCurrent,
            First(
                Filter(
                    Employees,
                    'Employees (Views)'.'My Employee Record'
                )
            )
        );
        Set(
            gblRecordJobSpotlight,
            With(
                {
                    varRecordCurrent: LookUp(
                        Sort(
                            colCdsJobs,
                            DateAdd(
                                'Start Date Time',
                                -30,
                                TimeUnit.Minutes
                            ),
                            SortOrder.Descending
                        ),
                        'Start Date Time' <= Now() And Completed = 'Completed (Jobs)'.No And DateValue(
                            Text(
                                'Start Date Time',
                                "[$-en-US]yyyy-mm-dd"
                            )
                        ) = Today()
                    ),
                    varRecordNext: LookUp(
                        Sort(
                            colCdsJobs,
                            DateAdd(
                                'Start Date Time',
                                -30,
                                TimeUnit.Minutes
                            ),
                            SortOrder.Ascending
                        ),
                        'Start Date Time' > Now() And Completed = 'Completed (Jobs)'.No
                    )
                },
                If(
                    !IsBlank(varRecordCurrent.Name),
                    varRecordCurrent,
                    varRecordNext
                )
            )
        );
        Reset(gal_Jobs_List);

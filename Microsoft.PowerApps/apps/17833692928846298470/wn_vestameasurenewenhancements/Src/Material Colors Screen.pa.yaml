Screens:
  Material Colors Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |
        =// reset controls
        Reset(tog_MaterialColors_Components__CustomValue);
        Reset(gal_MaterialColors_Selection);
        Reset(txt_MaterialColors_Components__CustomValue);
        // clear variables
        UpdateContext(
            {
                locShowSaveButton: false,
                locCurrentMaterialItem: Blank(),
                locGUIDJobMaterialItem: Blank(),
                locMaterialColorSelected: Blank(),
                locMaterialColorIsCustomValue: Blank(),
                locMaterialColorIsPredefinedOptions: Blank()
            }
        );
        // clear collections
        ClearCollect(
            colMaterialItemColors,
            {
                Value: "",
                Attribute: "Color"
            }
        );
      OnVisible: |-
        =ClearCollect(colMaterialItemColors,{Attribute: "Color", ID: "", Value: locMaterialColorSelected});
    Children:
      - cmp_MaterialColors_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Materials"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_MaterialColors_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_MaterialColors_Titlebar.Y+cmp_MaterialColors_Titlebar.Height
      - cmp_MaterialColors_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Jobs Screen'
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =20
            Title: ="Vesta Measure"
            Width: =1024
      - lbl_MaterialColors_Actions__Background:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#faf9f8")
            Font: =Font.'Open Sans'
            Height: =708
            Text: =""
            Width: =250
            X: =80
            Y: =60
      - gal_MaterialColors__Selected:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            Default: =First(colMaterialItemColors)
            DelayItemLoading: =false
            Fill: =gblAppStyles.ActionsMenu.Fill
            Height: =708
            Items: =colMaterialItemColors
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: =UpdateContext({locCurrentCloneProperty:ThisItem.Attribute})
            TabIndex: =0
            TemplateFill: =If(ThisItem.IsSelected, ColorFade(gal_MaterialColors__Selected.Fill, -5%), Color.Transparent)
            TemplatePadding: =0
            TemplateSize: =68
            Width: =250
            X: =cmp_MaterialColors_Sidebar.X+cmp_MaterialColors_Sidebar.Width
            Y: =cmp_MaterialColors_Titlebar.Y+cmp_MaterialColors_Titlebar.Height
          Children:
            - lbl_MaterialColors_Selected__Value:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.ActionsMenu.Color
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight
                  OnSelect: =Select(Parent)
                  PaddingLeft: =30
                  PaddingTop: =15
                  Size: =gblAppStyles.ActionsMenu.SizeTitle
                  Text: =Coalesce(ThisItem.Value, "Select An Option")
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth
                  Wrap: =false
            - lbl_MaterialColors_Selected__Attribute:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.ActionsMenu.Color
                  Font: =gblAppStyles.Text.Font
                  Height: =Parent.TemplateHeight
                  OnSelect: =Select(Parent)
                  PaddingLeft: =30
                  PaddingTop: =40
                  Size: =gblAppStyles.ActionsMenu.SizeSubtitle
                  Text: =ThisItem.Attribute
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth
      - con_MaterialColors:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =708
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =694
            X: =330
            Y: =60
          Children:
            - gal_MaterialColors_Selection:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =Color.Transparent
                  DelayItemLoading: =false
                  Height: =If(locShowSaveButton, 500, Parent.Height-Self.Y)
                  Items: |-
                    =RenameColumns(
                        ShowColumns(
                            SortByColumns(
                                Filter(colCdsMaterialItemColors, 'Material Item'=locCurrentMaterialItem),
                                "wn_displayordernumber", SortOrder.Ascending,
                                "wn_name", SortOrder.Ascending
                            ),
                            'Material Item Colors',
                            Name
                        ),
                        wn_materialitemcolorsid,ID,
                        wn_name,Value
                    )
                  LoadingSpinner: =LoadingSpinner.None
                  OnSelect: "=// select the material color and show the save button\nUpdateContext(\n    {\n        locMaterialColorSelected: ThisItem.Value,\n        locShowSaveButton: true\n        \n    }\n);\n// write the selection to the materials colors collection\nPatch(\n    colMaterialItemColors,\n    LookUp(\n        colMaterialItemColors,\n        Attribute = \"Color\"\n    ),\n    {\n        Attribute: \"Color\",\n        ID: ThisItem.ID,\n        Value: ThisItem.Value\n    }\n);\n// reset controls\nReset(gal_MaterialColors__Selected);\n"
                  ShowScrollbar: =false
                  TabIndex: =0
                  TemplatePadding: =0
                  TemplateSize: =180
                  Visible: =!tog_MaterialColors_Components__CustomValue.Value
                  Width: =635
                  WrapCount: =3
                  X: =30
                  Y: =80
                Children:
                  - btn_Material_Colors__Base:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =gblAppStyles.Card.BorderColor
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =If(locMaterialColorSelected=ThisItem.Value, gblAppStyles.Status.Neutral, gblAppStyles.Card.Fill)
                        FocusedBorderThickness: =1
                        Font: =Font.'Open Sans'
                        Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =Self.Color
                        HoverFill: =Self.Fill
                        OnSelect: =Select(Parent)
                        PaddingLeft: =gblAppStyles.Card.PaddingLeft
                        PaddingRight: =gblAppStyles.Card.PaddingRight
                        PressedBorderColor: =Self.BorderColor
                        PressedFill: =Self.Fill
                        RadiusBottomLeft: =gblAppStyles.Card.Radius
                        RadiusBottomRight: =gblAppStyles.Card.Radius
                        RadiusTopLeft: =gblAppStyles.Card.Radius
                        RadiusTopRight: =gblAppStyles.Card.Radius
                        Size: =11.24
                        Text: =
                        Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                        X: =(Parent.TemplateWidth-Self.Width)/2
                        Y: =(Parent.TemplateHeight-Self.Height)/2
                  - lbl_MaterialColors_Selection:
                      Control: Label@2.5.1
                      Properties:
                        Align: =LayoutAlignItems.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =If(locMaterialColorSelected=ThisItem.Value, gblAppColors.Secondary.White, gblAppStyles.Card.TitleColor)
                        Fill: =Color.Transparent
                        Font: =gblAppStyles.Text.TitleFont
                        FontWeight: =FontWeight.Lighter
                        Height: =150
                        LineHeight: =1.3
                        OnSelect: =Select(Parent)
                        PaddingLeft: =10
                        PaddingRight: =10
                        Size: =If(locCurrentCloneProperty="Quantity", 20, gblAppStyles.Card.TitleSize)
                        Text: =ThisItem.Value
                        Width: =181
                        X: =15
                        Y: =15
                  - btn_MaterialColors_Selection:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =Color.Transparent
                        BorderThickness: =1
                        Color: =
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =Color.Transparent
                        FocusedBorderThickness: =1
                        Font: =Font.'Open Sans'
                        Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =Self.Color
                        HoverFill: =If(locMaterialColorSelected<>ThisItem.Value, gblAppStyles.Card.HoverFill)
                        OnSelect: =Select(Parent)
                        PaddingRight: =3.75
                        PaddingTop: =3.75
                        PressedBorderColor: =Self.BorderColor
                        PressedFill: =If(locMaterialColorSelected<>ThisItem.Value, gblAppStyles.Card.PressedFill)
                        RadiusBottomLeft: =gblAppStyles.Card.Radius
                        RadiusBottomRight: =gblAppStyles.Card.Radius
                        RadiusTopLeft: =gblAppStyles.Card.Radius
                        RadiusTopRight: =gblAppStyles.Card.Radius
                        Size: =11.24
                        Text: =
                        Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                        X: =(Parent.TemplateWidth-Self.Width)/2*1
                        Y: =(Parent.TemplateHeight-Self.Height)/2*1
            - lbl_MaterialColors_Title:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Segoe UI'
                  Size: =20
                  Text: ="Material Colors"
                  Width: =638
                  X: =40
                  Y: =30
            - cmp_MaterialColors_AdvanceButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Check}
                  IconColor: =Color.White
                  IconFill: =gblAppColors.Secondary.Green
                  NavigateScreen: ='Measure Window Screen'
                  Text: ="Select Color"
                  Visible: =locShowSaveButton Or Len(txt_MaterialColors_Components__CustomValue.Text)>0
                  Width: =231
                  X: =422
                  Y: =Parent.Height-Self.Height-gblAppStyles.Padding.ButtonMargin
            - btn_MaterialColors_AdvanceButton:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =cmp_MaterialColors_AdvanceButton.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |
                    =With(
                        {
                            varType: "colCdsJobMaterialItems",
                            varRecordRef: locGUIDJobMaterialItem
                        },
                    // update color in job materials record 
                        Patch(
                            colCdsJobMaterialItems,
                            LookUp(colCdsJobMaterialItems, 'Job Material Item'=varRecordRef),
                            {
                                Color: LookUp(colMaterialItemColors, Attribute="Color", locMaterialColorSelected)
                            }
                        );
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // save local data
                    IfError( // This line of code is added to hide the errors
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsJobMaterialItems,
                            "localCdsJobMaterialItems"
                        )
                    )
                    ,Blank())  // This line of code is added to hide the errors
                    ;
                    // leave the screen and reset
                    Reset(gal_MaterialColors__Selected);
                    Reset(gal_MaterialColors_Selection);
                    // next screen
                    Navigate(
                        'Materials Screen',
                        BorderStyle.None
                    );
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: =""
                  Visible: =cmp_MaterialColors_AdvanceButton.Visible
                  Width: =cmp_MaterialColors_AdvanceButton.Width
                  X: =cmp_MaterialColors_AdvanceButton.X
                  Y: =cmp_MaterialColors_AdvanceButton.Y
            - tog_MaterialColors_Components__CustomValue:
                Control: Classic/Toggle@2.1.0
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Default: =locMaterialColorIsCustomValue Or !locMaterialColorIsPredefinedOptions
                  DisplayMode: =If(locMaterialColorIsPredefinedOptions, DisplayMode.Edit, DisplayMode.Disabled)
                  FalseText: ="No"
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =Font.'Segoe UI'
                  Height: =30
                  OnChange: =
                  OnCheck: |-
                    =UpdateContext({locComponentIsCustomValue: true});
                  OnUncheck: |-
                    =UpdateContext({locComponentIsCustomValue: false});
                  TrueFill: =gblAppStyles.Status.Success
                  TrueText: ="Yes"
                  Width: =109
                  X: =544
                  Y: =35
            - lbl_MaterialColors_Components__MaxLength:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  Height: =50
                  Text: =Len(txt_MaterialColors_Components__CustomValue.Text) & "/20"
                  Visible: =locComponentIsCustomValue
                  X: =505*1
                  Y: =100*1
            - txt_MaterialColors_Components__CustomValue:
                Control: Classic/TextInput@2.3.2
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  BorderStyle: =BorderStyle.None
                  Color: =gblAppStyles.Text.Color
                  Default: =locMaterialColorSelected
                  Font: =gblAppStyles.Text.Font
                  Height: =50
                  HintText: ="Enter a custom color"
                  HoverBorderColor: =RGBA(0, 18, 107, 1)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  MaxLength: =20
                  OnChange: |-
                    =UpdateContext({locMaterialColorSelected: Self.Text, locShowSaveButton: true});
                  PaddingLeft: =20
                  Visible: =locComponentIsCustomValue
                  Width: =443
                  X: =40*1
                  Y: =100*1
      - lbl_LeadTest_Components__CustomValue_1:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Text.Color
            Font: =gblAppStyles.Text.Font
            Size: =gblAppStyles.Text.Size
            Text: ="Custom Value?"
            X: =720
            Y: =90

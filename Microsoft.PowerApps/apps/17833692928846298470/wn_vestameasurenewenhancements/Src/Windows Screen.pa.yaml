Screens:
  Windows Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =UpdateContext(
            {
                locClickedWindowActionsMenu: false,
                locShowWindowActionsMenu: false
            }
        );
      OnVisible: |-
        =ClearCollect(
            colNotCompletedWindows,
            Filter(
                colCdsWindowMeasurements,
                'Job Entry'.'Job Entry'=gblRecordJobEntryCurrent_.'Job Entry',
                !Completed,
                Type = gblOptionSets.WindowMeasurement.Type.Tech,
                Status <> gblOptionSets.WindowMeasurement.Status.Inactive
            )
        );
    Children:
      - gal_Windows_Attributes:
          Control: Gallery@2.15.0
          Variant: Vertical
          Group: grp_Windows_Main
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            DelayItemLoading: =false
            Height: =592
            Items: |-
              =Sort(
                  Filter(
                      colCdsJobEntrySelections,
                      'Job Entry'.'Job Entry' = gblRecordJobEntryCurrent_.'Job Entry'
                  ),
                  'Job Entry Option (Attribute)'.Name,
                  SortOrder.Ascending
              )
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |
              =Set(
                  gblRecordJobEntryOption_Hierarchy,
                  If(
                      IsBlank(ThisItem.'Job Entry Option (Value)'),
                      ThisItem.'Job Entry Option (Attribute)',
                      ThisItem.'Job Entry Option (Value)'
                  )
              );
              Set(
                  gblRecordJobEntrySelection,
                  ThisItem
              );
              Navigate(
                  'Options Screen',
                  ScreenTransition.None,
                  {locShowSaveButton: false}
              );
            TabIndex: =0
            TemplatePadding: =0
            TemplateSize: =180
            Visible: =CountRows(gal_Windows_Select.AllItems)>0
            Width: =636
            WrapCount: =3
            X: =370
            Y: =176
          Children:
            - lbl_Windows_Attributes__Card:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: |-
                    =If(
                        // has tech data
                        !IsBlank(ThisItem.'Job Entry Option (Value)'),
                        gblAppStyles.Status.Neutral,

                        // has no tech data or sales data
                        IsBlank(ThisItem.'Job Entry Option (Value)') And IsBlank(ThisItem.'Job Entry Option (Value) (Sales)'),
                        gblAppStyles.Status.Warning,

                        gblAppStyles.Card.BorderColor
                    )
                  BorderThickness: |-
                    =If(
                        // has tech data
                        !IsBlank(ThisItem.'Job Entry Option (Value)'),
                        3,

                        // has no tech data or sales data
                        IsBlank(ThisItem.'Job Entry Option (Value)') And IsBlank(ThisItem.'Job Entry Option (Value) (Sales)'),
                        3,

                        1
                    )
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =gblAppStyles.Card.Fill
                  FocusedBorderThickness: =1
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: =Select(Parent)
                  PaddingRight: =3.75
                  PaddingTop: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =11.24
                  Text: =
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2
                  Y: =(Parent.TemplateHeight-Self.Height)/2
            - lbl_Windows_Attributes__Title:
                Control: Label@2.5.1
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.Card.TitleColor
                  Fill: =Color.Transparent
                  Font: =gblAppStyles.Text.TitleFont
                  Height: =41
                  OnSelect: =Select(Parent)
                  Size: =gblAppStyles.Card.TitleSize
                  Text: =ThisItem.'Job Entry Option (Attribute)'.Name
                  Width: =186
                  X: =15
                  Y: =41
            - lbl_Windows_Attributes__Subtitle:
                Control: Label@2.5.1
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.Card.SubtitleColor
                  Fill: =Color.Transparent
                  Font: =Font.'Segoe UI'
                  Height: =83
                  Italic: "=IsBlank(ThisItem.'Job Entry Option (Value)') And IsBlank(ThisItem.'Job Entry Option (Value) (Sales)')\r\n   "
                  LineHeight: =1.5
                  OnSelect: =Select(Parent)
                  PaddingLeft: =15
                  PaddingRight: =15
                  PaddingTop: =0
                  Size: =If(Len(Self.Text)>40,gblAppStyles.Card.SubtitleSize-2, gblAppStyles.Card.SubtitleSize)
                  Text: |-
                    =Coalesce(
                        Coalesce(
                            ThisItem.'Job Entry Option (Value)'.Value,
                            ThisItem.'Job Entry Option (Value)'.Name
                        ),
                        Coalesce(
                            ThisItem.'Job Entry Option (Value) (Sales)'.Value,
                            ThisItem.'Job Entry Option (Value) (Sales)'.Name
                        ),
                        "Select Option"
                    )
                  VerticalAlign: =VerticalAlign.Top
                  Width: =186
                  X: =15
                  Y: =82
            - lbl_Window_Overlay:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =gblAppColors.Secondary.GrayMedium
                  BorderStyle: =BorderStyle.None
                  BorderThickness: =1
                  Color: =
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisplayMode: =If(gblRecordJobCurrent.Completed='Completed (Jobs)'.No,DisplayMode.Edit,DisplayMode.View)
                  Fill: =Color.Transparent
                  FocusedBorderThickness: =1
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =gblAppStyles.Card.HoverFill
                  OnSelect: =Select(Parent)
                  PaddingRight: =3.75
                  PaddingTop: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: =gblAppStyles.Card.PressedFill
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =11.24
                  Text: =
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2*1
                  Y: =(Parent.TemplateHeight-Self.Height)/2*1
      - ico_Windows_Select__Base:
          Control: Label@2.5.1
          Group: grp_Windows_Select
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =gal_Windows_Select.Fill
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =App.Height-gal_Windows_Select.Y
            TabIndex: =0
            Text: =
            Width: =gal_Windows_Select.Width
            X: =cmp_Windows_Sidebar.Width
            Y: =gal_Windows_Select.Y
      - gal_Windows_Select:
          Control: Gallery@2.15.0
          Variant: Vertical
          Group: grp_Windows_Select
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            Default: =LookUp(colProjectSidebar, ID=gblProjectSidebarItemCurrent.ID) //TODO gblRecordJobEntryCurrent_
            DelayItemLoading: =false
            Fill: =gblAppStyles.ActionsMenu.Fill
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Height: =lbl_Windows_Select__AddWindows.Y-Self.Y
            Items: =colProjectSidebar
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |-
              =If(
                  And(
                      locClickedWindowActionsMenu,
                      locShowWindowActionsMenu,
                      gblProjectSidebarItemCurrent.ID = ThisItem.ID
                  ),
                  UpdateContext({locShowWindowActionsMenu: false}),
                  And(
                      locClickedWindowActionsMenu,
                      !locShowWindowActionsMenu
                  ),
                  UpdateContext({locShowWindowActionsMenu: true})
              );
              UpdateContext({locClickedWindowActionsMenu: false});
              Set(
                  gblProjectSidebarItemCurrent,
                  ThisItem
              );
              If(
                  And(
                      ThisItem.Category = "Job Entry",
                      !(App.ActiveScreen.Name="Windows Screen")
                  ),
                  Navigate(
                      'Windows Screen',
                      ScreenTransition.None,
                      {locShowWindowActionsMenu: locShowWindowActionsMenu}
                  ),
                  ThisItem.Category = "Window Measurement",
                  Set(
                      gblRecordWindowMeasurement_Tech,
                      LookUp(
                          colCdsWindowMeasurements,
                          'Window Measurement' = ThisItem.ID
                      )
                  );
                  // check if Job Completed status
              If(
                      gblRecordJobCurrent.Completed = gblOptionSets.Job.CompletedJob.No,
                      Set(
                          gblRecordWindowChoice,
                          LookUp(
                              colCdsWindowChoices,
                              'Window Choice' = gblRecordJobEntryCurrent_.'Window Choice'.'Window Choice'
                          )
                      );
                      Set(
                          gblRecordWindowMeasurement_Sales,
                          LookUp(
                              colCdsWindowMeasurements,
                              'Window Measurement' = gblRecordJobEntryCurrent_.'Measurement (Sales)'.'Window Measurement'
                          )
                      );
                      Clear(colMeasureWidth);
                      Clear(colMeasureHeight);
                      Clear(colMeasureJambDepth);
                      Clear(colMeasureMaxProjection);
                      Clear(colMeasureSoffitDepth);
                      Clear(colMeasureWallThickness);
                      With(
                          {
                              varWidthMin: Value(gblRecordWindowChoice.'Min Width'),
                              varWidthRange: Value(gblRecordWindowChoice.'Max Width') - Value(gblRecordWindowChoice.'Min Width'),
                              varHeightMin: Value(gblRecordWindowChoice.'Min Height'),
                              varHeightRange: Value(gblRecordWindowChoice.'Max Height') - Value(gblRecordWindowChoice.'Min Height'),
                              varJambDepthMin: Value(gblRecordWindowChoice.'Min Jamb Depth'),
                              varJambDepthRange: Value(gblRecordWindowChoice.'Max Jamb Depth') - Value(gblRecordWindowChoice.'Min Jamb Depth'),
                              varMaxProjectionMin: Value(gblRecordWindowChoice.'Min Max Projection'),
                              varMaxProjectionRange: Value(gblRecordWindowChoice.'Max Max Projection') - Value(gblRecordWindowChoice.'Min Max Projection'),
                              varSoffitDepthMin: Value(gblRecordWindowChoice.'Min Soffit Depth'),
                              varSoffitDepthRange: Value(gblRecordWindowChoice.'Max Soffit Depth') - Value(gblRecordWindowChoice.'Min Soffit Depth'),
                              varWallThicknessMin: Value(gblRecordWindowChoice.'Min Wall Thickness'),
                              varWallThicknessRange: Value(gblRecordWindowChoice.'Max Wall Thickness') - Value(gblRecordWindowChoice.'Min Wall Thickness')
                          },
                          Concurrent(
                              ForAll(
                                  Sequence(varWidthRange + 1),
                                  Collect(
                                      colMeasureWidth,
                                      {tblValue: ThisRecord.Value + varWidthMin - 1}
                                  )
                              ),
                              ForAll(
                                  Sequence(varHeightRange + 1),
                                  Collect(
                                      colMeasureHeight,
                                      {tblValue: ThisRecord.Value + varHeightMin - 1}
                                  )
                              ),
                              ForAll(
                                  Sequence(varJambDepthRange + 1),
                                  Collect(
                                      colMeasureJambDepth,
                                      {tblValue: ThisRecord.Value + varJambDepthMin - 1}
                                  )
                              ),
                              ForAll(
                                  Sequence(varMaxProjectionRange + 1),
                                  Collect(
                                      colMeasureMaxProjection,
                                      {tblValue: ThisRecord.Value + varMaxProjectionMin - 1}
                                  )
                              ),
                              ForAll(
                                  Sequence(varSoffitDepthRange + 1),
                                  Collect(
                                      colMeasureSoffitDepth,
                                      {tblValue: ThisRecord.Value + varSoffitDepthMin - 1}
                                  )
                              ),
                              ForAll(
                                  Sequence(varWallThicknessRange + 1),
                                  Collect(
                                      colMeasureWallThickness,
                                      {tblValue: ThisRecord.Value + varWallThicknessMin - 1}
                                  )
                              )
                          )
                      );
                      Concurrent(
                          Set(
                              gblMeasurementWidthWhole,
                              RoundDown(
                                  If(
                                      gblRecordWindowMeasurement_Tech.Width = 0,
                                      gblRecordWindowMeasurement_Sales.Width,
                                      gblRecordWindowMeasurement_Tech.Width
                                  ),
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementHeightWhole,
                              RoundDown(
                                  If(
                                      gblRecordWindowMeasurement_Tech.Height = 0,
                                      gblRecordWindowMeasurement_Sales.Height,
                                      gblRecordWindowMeasurement_Tech.Height
                                  ),
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementJambDepthWhole,
                              RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Jamb Depth',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementMaxProjectionWhole,
                              RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Max Projection',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementSoffitDepthWhole,
                              RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Soffit Depth',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementWallThicknessWhole,
                              RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Wall Thickness',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementWidthFraction,
                              With(
                                  {
                                      varWidth: If(
                                          gblRecordWindowMeasurement_Tech.Width = 0,
                                          gblRecordWindowMeasurement_Sales.Width,
                                          gblRecordWindowMeasurement_Tech.Width
                                      )
                                  },
                                  varWidth - RoundDown(
                                      varWidth,
                                      0
                                  )
                              )
                          ),
                          Set(
                              gblMeasurementHeightFraction,
                              With(
                                  {
                                      varHeight: If(
                                          gblRecordWindowMeasurement_Tech.Height = 0,
                                          gblRecordWindowMeasurement_Sales.Height,
                                          gblRecordWindowMeasurement_Tech.Height
                                      )
                                  },
                                  varHeight - RoundDown(
                                      varHeight,
                                      0
                                  )
                              )
                          ),
                          Set(
                              gblMeasurementJambDepthFraction,
                              gblRecordWindowMeasurement_Tech.'Jamb Depth' - RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Jamb Depth',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementMaxProjectionFraction,
                              gblRecordWindowMeasurement_Tech.'Max Projection' - RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Max Projection',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementSoffitDepthFraction,
                              gblRecordWindowMeasurement_Tech.'Soffit Depth' - RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Soffit Depth',
                                  0
                              )
                          ),
                          Set(
                              gblMeasurementWallThicknessFraction,
                              gblRecordWindowMeasurement_Tech.'Wall Thickness' - RoundDown(
                                  gblRecordWindowMeasurement_Tech.'Wall Thickness',
                                  0
                              )
                          )
                      );
                      Set(
                          gblMeasurementMaxUI,
                          gblRecordWindowChoice.'Max UI'
                      );
                  );
                  // reset screen
                  Reset(gal_Windows_Select);
                  // next screen
                  If(
                      !Or(
                          App.ActiveScreen.Name="Measure Window Screen",
                          App.ActiveScreen.Name="Measurements Screen"
                      ),
                      If(
                          gblRecordJobCurrent.Completed = gblOptionSets.Job.CompletedJob.No,
                          Navigate(
                              'Measure Window Screen',
                              ScreenTransition.None,
                              {locShowWindowActionsMenu: locShowWindowActionsMenu}
                          ),
                          Navigate(
                              'Measurements Screen',
                              ScreenTransition.None
                          );
                      )
                  )
              )
            ShowScrollbar: =false
            TabIndex: =0
            TemplateFill: =If(gblProjectSidebarItemCurrent.ID=ThisItem.ID, ColorFade(gal_Windows_Select.Fill, -5%), Color.Transparent)
            TemplatePadding: =0
            TemplateSize: =72
            Width: =250
            X: =cmp_Windows_Sidebar.Width
            Y: =cmp_Windows_Titlebar.Y+cmp_Windows_Titlebar.Height
          Children:
            - con_Windows_Select:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =Color.DarkGray
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =72
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =250
                Children:
                  - lbl_Windows_Select__Title:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =22
                        PaddingLeft: =66
                        Size: =12
                        Text: =ThisItem.Title
                        Width: =Parent.Width
                  - lbl_Windows_Select__Description:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =18
                        PaddingLeft: =66
                        Size: =9
                        Text: =ThisItem.Description
                        Visible: =!IsBlank(ThisItem.Description)
                        Width: =Parent.Width
                        Y: =22
                  - lbl_Windows_Select__Lead:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =18
                        PaddingLeft: =66
                        Size: =9
                        Text: |-
                          =With(
                              {
                                  varRecordWindowMeasurement: If(
                                      ThisItem.Category="Window Measurement",
                                      LookUp(
                                          colCdsWindowMeasurements,
                                          'Window Measurement'=ThisItem.ID
                                      ),
                                      Blank()
                                  )
                              },
                              If(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number'),
                                  "Mull " & varRecordWindowMeasurement.'Window Mull'.'Sequence Number'
                              )
                              &
                              If(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number')
                                  And !IsBlank(varRecordWindowMeasurement.'Lead Test: Exterior Result'),
                                  ", "
                              )
                              &
                              If(
                                  varRecordWindowMeasurement.'Lead Test: Exterior Result'=gblOptionSets.JobEntry.LeadTestResult.Yes
                                  Or varRecordWindowMeasurement.'Lead Test: Interior Result'=gblOptionSets.JobEntry.LeadTestResult.Yes,
                                  "Contains Lead",
                                  varRecordWindowMeasurement.'Lead Test: Exterior Result'=gblOptionSets.JobEntry.LeadTestResult.No
                                  Or varRecordWindowMeasurement.'Lead Test: Interior Result'=gblOptionSets.JobEntry.LeadTestResult.No,
                                  "No Lead",
                                  Blank()
                              )
                          )
                        Visible: |-
                          =With(
                              {
                                  varRecordWindowMeasurement: If(
                                      ThisItem.Category="Window Measurement",
                                      LookUp(
                                          colCdsWindowMeasurements,
                                          'Window Measurement'=ThisItem.ID
                                      ),
                                      Blank()
                                  )
                              },
                              Or(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number'),
                                  !IsBlank(varRecordWindowMeasurement.'Lead Test: Exterior Result')
                              )
                          )
                        Width: =Parent.Width
                        Y: =39
            - ico_Windows_Select__Image:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =64
                  Image: |-
                    =ThisItem.Image
                    /*
                    LookUp(
                        colCdsWindowStyles,
                        LookUp(
                            colCdsWindowChoices,
                            colCdsWindowChoices[@'Window Choice'] = ThisItem.'Window Choice'.'Window Choice',
                            Style
                        ).'Window Style' = colCdsWindowStyles[@'Window Style']
                    ).Thumbnail.Value
                    */
                  PaddingBottom: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingLeft: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingRight: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingTop: =If(ThisItem.Type="Window Choice", 6, 15)
                  Width: =64
                  X: =0*1
                  Y: =(Parent.TemplateHeight-Self.Height)/2
            - btn_Windows_Select__Status:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =gblAppStyles.ActionsMenu.QuantityBorderThickness
                  Color: =Color.White//If(ThisItem.Completed, gblAppColors.Secondary.White,gblAppStyles.ActionsMenu.Color)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisabledFill: =gblAppStyles.Status.Success
                  Fill: =gblAppStyles.Status.Success
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =gblAppStyles.ActionsMenu.QuantityFontWeight
                  Height: =17
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: =Select(Parent)
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =180
                  RadiusBottomRight: =Self.RadiusBottomLeft
                  RadiusTopLeft: =Self.RadiusBottomLeft
                  RadiusTopRight: =Self.RadiusBottomLeft
                  Size: =8
                  Text: =Blank()//ThisItem.Quantity
                  Visible: |-
                    =And(
                        ThisItem.Category="Window Measurement",
                        LookUp(
                            colCdsWindowMeasurements,
                            'Window Measurement'=ThisItem.ID,
                            Completed
                        ) = gblOptionSets.WindowMeasurement.Completed.Yes
                    )
                  Width: =17
                  X: =35
                  Y: =gblAppStyles.ActionsMenu.QuantityY*1+3
            - img_Windows_Select__Status:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =14
                  Image: ='icons8-checkmark'
                  Visible: |-
                    =And(
                        ThisItem.Category="Window Measurement",
                        LookUp(
                            colCdsWindowMeasurements,
                            'Window Measurement'=ThisItem.ID,
                            Completed
                        ) = gblOptionSets.WindowMeasurement.Completed.Yes
                    )
                  Width: =18
                  X: =35
                  Y: =45*1
            - btn_Windows_Select__Overlay:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =72
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |-
                    =UpdateContext({locShowWindowActionsMenu: false});
                    Select(Parent);
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: =""
                  Width: =250
            - ico_Windows_Select__Dots:
                Control: Classic/Icon@2.5.0
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppColors.Primary.Blue
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0
                  Height: =44
                  Icon: =Icon.More
                  OnSelect: |-
                    =UpdateContext({locClickedWindowActionsMenu: true});
                    Select(Parent);
                  PaddingBottom: =8
                  PaddingTop: =8
                  Rotation: =90
                  TabIndex: =0
                  Visible: '=gblRecordJobCurrent.Completed = gblOptionSets.Job.CompletedJob.No '
                  Width: =32
                  X: =Parent.Width - Self.Width
                  Y: =(Parent.TemplateHeight-Self.Height)/2*1
      - ico_Windows_Select__AddWindows:
          Control: Classic/Icon@2.5.0
          Group: grp_Windows_Select
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppColors.Primary.Blue
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Height: =28
            Icon: =Icon.Add
            OnSelect: =Blank()
            TabIndex: =0
            Visible: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No
            Width: =28
            X: =lbl_Windows_Select__AddWindows.X+18
            Y: =lbl_Windows_Select__AddWindows.Y+20
      - lbl_Windows_Subtitle:
          Control: Label@2.5.1
          Group: grp_Windows_Main
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppColors.Secondary.GrayMediumDark
            Font: =Font.'Segoe UI'
            PaddingLeft: =10
            Size: =14
            Text: |-
              =LookUp(
                  colCdsWindowStyles,
                  LookUp(
                      colCdsWindowChoices,

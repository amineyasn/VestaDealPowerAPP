Screens:
  Add Room Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |+
        =// clear collections
        ClearCollect(
            locRoomProperties,
            {
                Value: "",
                Attribute: "Room"
            }
        );
        UpdateContext({locPreviousScreen: ""});
        // reset controls
        Reset(gal_AddRoom_Selection);
        Reset(lbl_AddRoom_Description);
      OnVisible: "=If(\r\n    locFormMode=\"New\",\r\n    // TRUE CASE\r\n    UpdateContext({locCurrentRoomProperty: \"Room\"});\r\n    ClearCollect(\r\n        colRoomProperties,\r\n        {\r\n            Value: \"\",\r\n            Attribute: \"Room\"\r\n        }\r\n    ),\r\n    // ELSE CASE\r\n    UpdateContext({locCurrentRoomProperty: \"Description\"});\r\n    ClearCollect(\r\n        colRoomProperties,\r\n        {\r\n            Value: gblRecordJobEntryCurrent_.'Room: Type',\r\n            ID: GUID(),\r\n            Attribute: \"Room\"\r\n        },\r\n        {\r\n            Value: gblRecordJobEntryCurrent_.'Room: Floor',\r\n            ID: GUID(),\r\n            Attribute: \"Floor\"\r\n        },\r\n        {\r\n            Value: gblRecordJobEntryCurrent_.'Room: Description',\r\n            ID: GUID(),\r\n            Attribute: \"Description\"\r\n        }\r\n    );\r\n    \r\n)"
    Children:
      - cmp_AddRoom_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Project"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =708
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =60
      - cmp_AddRoom_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Rooms Screen'
            Color: =Color.White
            Context: =
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - gal_AddRoom_Selection:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            DelayItemLoading: =false
            Height: =If(locCurrentRoomProperty="Floor", 506, App.Height-Self.Y)
            Items: |-
              =Switch(
                  gal_AddRoom_Selected.Selected.Attribute,
                  "Room",
                  RenameColumns(
                      ShowColumns(
                          Filter(
                              colCdsDataEntryChoices,
                              Type = gblOptionSets.Global.DataEntryType.Room
                          ),
                          'Data Entry Choice',
                          Value
                      ),
                      wn_dataentrychoiceid,
                      ID,
                      wn_value,
                      Value
                  ),
                  "Floor",
                  Table(
                      {
                          Value: "Basement",
                          ID: "0"
                      },
                      {
                          Value: "1st Floor",
                          ID: "1"
                      },
                      {
                          Value: "2nd Floor",
                          ID: "2"
                      },
                      {
                          Value: "3rd Floor",
                          ID: "3"
                      },
                      {
                          Value: "4th Floor",
                          ID: "4"
                      },
                      {
                          Value: "5th Floor",
                          ID: "5"
                      }
                  ),
                  "Description",
                  Blank(),
                  "Window",
                  RenameColumns(
                      ShowColumns(
                          AddColumns(
                              Filter(
                                  colCdsJobEntries,
                                  Job.Job = gblRecordJobCurrent.Job,
                                  Status <> gblOptionSets.JobEntry.Status.Inactive
                              ),
                              Value,
                              Concatenate(
                                  First(
                                      ForAll(Split(
                                          Name,
                                          " > "
                                      ), {Result: ThisRecord.Value})
                                  ).Result,
                                  Char(13),
                                  'Room: Type',
                                  Char(13),
                                  'Room: Floor'
                              )
                          ),
                          'Job Entry',
                          Value
                      ),
                      hsl_jobentryid,
                      ID
                  )
              )
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |
              =// add the next window attribute to window properties
              If(
                  LookUp(
                      colRoomProperties,
                      Attribute = locCurrentRoomProperty,
                      Value
                  ) = "",
                  Switch(
                      locCurrentRoomProperty,
                      "Room",
                      Collect(
                          colRoomProperties,
                          {
                              Attribute: "Floor",
                              ID: "",
                              Value: ""
                          }
                      ),
                      "Floor",
                      Collect(
                          colRoomProperties,
                          {
                              Attribute: "Description",
                              ID: "",
                              Value: ""
                          }
                      ),
                      "Description",
                      Collect(
                          colRoomProperties,
                          {
                              Attribute: "Window",
                              ID: "",
                              Value: ""
                          }
                      ),
                      "Window",
                      Set(
                          gblRecordJobEntryCurrent_,
                          LookUp(
                              colCdsJobEntries,
                              'Job Entry'=GUID(ThisItem.ID)
                          )
                      )
                  )
              );
              // change to the next window property
              UpdateContext({
                  locCurrentRoomProperty:
                  Switch(
                      locCurrentRoomProperty,
                      "Room",
                      "Floor",
                      "Floor",
                      "Description",
                      "Description",
                      "Window",
                      "Window"
                  )
              });
              // write the selection to the window property
              Patch(
                  colRoomProperties,
                  LookUp(
                      colRoomProperties,
                      Attribute = gal_AddRoom_Selected.Selected.Attribute
                  ),
                  {
                      ID: ThisItem.ID,
                      Value: Substitute(ThisItem.Value, Char(13), ", ")
                  }
              );
              Reset(gal_AddRoom_Selected);
              Reset(gal_AddRoom_Selection);
            ShowScrollbar: =false
            TabIndex: =0
            TemplatePadding: =0
            TemplateSize: =180
            Width: =650
            WrapCount: =3
            X: =349
            Y: =140
          Children:
            - btn_AddRoom_Selection:
                Control: Classic/Button@2.2.0
                Properties:
                  AutoDisableOnSelect: =false
                  BorderColor: =gblAppColors.Secondary.GrayMedium
                  BorderThickness: =1
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =If(Substitute(gal_AddRoom_Selected.Selected.Value,", ",Char(13))=ThisItem.Value, gblAppStyles.Status.Neutral, gblAppStyles.Card.Fill)
                  FocusedBorderThickness: =1
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: =Select(Parent)
                  PaddingRight: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =11.24
                  Text: =
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2
                  Y: =(Parent.TemplateHeight-Self.Height)/2
            - lbl_AddRoom_Selection:
                Control: Label@2.5.1
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =If(Substitute(gal_AddRoom_Selected.Selected.Value,", ",Char(13))=ThisItem.Value, gblAppColors.Secondary.White,gblAppStyles.Card.TitleColor)
                  Fill: =Color.Transparent
                  Font: =gblAppStyles.Text.TitleFont
                  FontWeight: =FontWeight.Lighter
                  Height: =150
                  OnSelect: =Select(Parent)
                  PaddingLeft: =10
                  PaddingRight: =10
                  Size: =16
                  Text: =ThisItem.Value
                  Width: =186
                  X: =15
                  Y: =15
            - btn_AddRoomSelection:
                Control: Classic/Button@2.2.0
                Properties:
                  AutoDisableOnSelect: =false
                  BorderColor: =Color.Transparent
                  BorderThickness: =1
                  Color: =
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =Color.Transparent
                  FocusedBorderThickness: =1
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =If(gal_AddRoom_Selected.Selected.ID<>ThisItem.ID, gblAppStyles.Card.HoverFill)
                  OnSelect: =Select(Parent)
                  PaddingLeft: =10
                  PaddingRight: =20
                  PaddingTop: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: =If(!ThisItem.IsSelected, gblAppStyles.Card.PressedFill)
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =11.24
                  Text: =
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2*1
                  Y: =(Parent.TemplateHeight-Self.Height)/2*1
      - cmp_AddRoom_AdvanceButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton_1
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Check}
            IconColor: =Color.White
            IconFill: =gblAppColors.Secondary.Green
            NavigateScreen: ='Measure Window Screen'
            Text: |-
              =If(
                  locFormMode="New",
                  "Add Project Line",
                  "Edit Project Line"
              )
            Visible: |-
              =Or(
                  And(
                      locFormMode="New",
                      gal_AddRoom_Selected.Selected.Attribute="Window",
                      !IsBlank(
                          LookUp(
                              colRoomProperties,
                              Attribute="Window",
                              Value
                          )
                      )
                  ),
                  And(
                      locFormMode="Edit",
                      locCurrentRoomProperty="Description"
                  )
              )
            Width: =260
            X: =App.Width-Self.Width-40
            Y: =670
      - btn_AddRoom_AdvanceButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            Height: =cmp_AddRoom_AdvanceButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Color.Transparent
            HoverFill: =Color.Transparent
            OnSelect: "=// store the job entry GUID to be cloned\nUpdateContext({locCloneJobEntryGUID: gblRecordJobEntryCurrent_.'Job Entry'});\nIf(\n    locFormMode = \"New\",\n// create new job entry record\n    With(\n        {\n            varType: \"colCdsJobEntries\",\n            varRecordRef: GUID()\n        },\n        Set(\n            gblRecordJobEntryCurrent_,\n            Patch(\n                colCdsJobEntries,\n                Defaults(colCdsJobEntries),\n                //gblRecordJobEntryCurrent_,\n                {\n                    Completed: gblOptionSets.JobEntry.Completed.No,\n                    'Job Entry': varRecordRef,\n                    Job: LookUp(\n                        colCdsJobs,\n                        Job = gblRecordJobCurrent.Job\n                    ),\n                    'Job Stage': gblRecordJobEntryCurrent_.'Job Stage',\n                    'Job Entry Option (Header)': gblRecordJobEntryCurrent_.'Job Entry Option (Header)',\n                    'Measurement (Sales)': Blank(),\n                    Name: gblRecordJobEntryCurrent_.Name,\n                    \n                    'Room: Description': lbl_AddRoom_Description.Text,\n                    'Room: Floor': LookUp(\n                        colRoomProperties,\n                        Attribute = \"Floor\",\n                        Value\n                    ),\n                    'Room: Type': LookUp(\n                        colRoomProperties,\n                        Attribute = \"Room\",\n                        Value\n                    ),\n                    'Sequence Number': gblRecordJobEntryCurrent_.'Sequence Number',\n                    'Window Choice': gblRecordJobEntryCurrent_.'Window Choice',\n                    appJobRoomIdText: gblRecordJobEntryCurrent_.appJobRoomIdText,\n                    appJobIdText: gblRecordJobEntryCurrent_.appJobIdText\n                }\n            )\n        );\n        Collect(\n            colAUDRecords,\n            {\n                Type: \"colCdsJobEntries\",\n                RecordRef: varRecordRef,\n                Job: gblRecordJobCurrent.Job,\n                Operation: \"A\"\n            }\n        );\n        // add new job entries and job entry selections\nForAll(\n            Filter(\n                colCdsJobEntrySelections,\n                'Job Entry'.'Job Entry' = locCloneJobEntryGUID\n            ) As tblJobEntrySelections,\n            With(\n                {\n                    varType: \"colCdsJobEntrySelections\",\n                    varRecordRef: GUID()\n                },\n                Patch(\n                    colCdsJobEntrySelections,\n                    Defaults(colCdsJobEntrySelections),\n                    {\n                        'Job Entry Selection': varRecordRef,\n                        'Job Entry': gblRecordJobEntryCurrent_,\n                        'Job Entry Option (Attribute)': tblJobEntrySelections[@'Job Entry Option (Attribute)'],\n                        'Job Entry Option (Value)': tblJobEntrySelections[@'Job Entry Option (Value)'],\n                        'Job Entry Option (Value) (Sales)': tblJobEntrySelections[@'Job Entry Option (Value) (Sales)']\n                    }\n                );\n                Collect(\n                    colAUDRecords,\n                    {\n                        Type: varType,\n                        RecordRef: varRecordRef,\n                        Job: gblRecordJobCurrent.Job,\n                        Operation: \"A\"\n                    }\n                )\n            )\n        )\n    );\n    ForAll(\n        Sequence(1),\n        With(\n            {\n                varType: \"colCdsWindowMeasurements\",\n                varRecordRef: GUID()\n            },\n            Patch(\n                colCdsWindowMeasurements,\n                Defaults(colCdsWindowMeasurements),\n                {\n                    Name: \"Tech 0\"\" x 0\"\"\",\n                    'Exception?': gblOptionSets.WindowMeasurement.Exception.No,\n                    Height: 0,\n                    Job: gblRecordJobCurrent,\n                    'Job Entry': gblRecordJobEntryCurrent_,\n                    Type: gblOptionSets.WindowMeasurement.Type.Tech,\n                    Width: 0,\n                    'Window Measurement': varRecordRef\n                }\n            );\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"A\"\n                }\n            )\n        )\n    );\n    \n// create project sidebar\nClearCollect(\n        colProjectSidebar,\n        Ungroup(\n            Table(\n                {\n                    varMenuItems: RenameColumns(\n                        Table(\n                            {\n                                ID: gblRecordJobEntryCurrent_.'Job Entry',\n                                Name: Index(\n                                    ForAll(\n                                        Split(\n                                            gblRecordJobEntryCurrent_.'Window Choice'.Name,\n                                            \" > \"\n                                        ),\n                                        {Result: ThisRecord.Value}\n                                    ),\n                                    2\n                                ).Result,\n                                Category: \"Job Entry\",\n                                Description: Index(\n                                    ForAll(\n                                        Split(\n                                            gblRecordJobEntryCurrent_.'Window Choice'.Name,\n                                            \" > \"\n                                        ),\n                                        {Result: ThisRecord.Value}\n                                    ),\n                                    1\n                                ).Result,\n                                Screen: 'Windows Screen',\n                                Type: \"Window Choice\",\n                                Image: 'dblhungw-2',\n                                ImageDisabled: 'dblhungw-2'\n                            }\n                        ),\n                        Name,\n                        Title\n                    )\n                },\n                {\n                    varMenuItems: ShowColumns(\n                        RenameColumns(\n                            AddColumns(\n                                Filter(\n                                    colCdsWindowMeasurements,\n                                    'Job Entry'.'Job Entry' = gblRecordJobEntryCurrent_.'Job Entry',\n                                    Type = gblOptionSets.WindowMeasurement.Type.Tech,\n                                    Status <> gblOptionSets.WindowMeasurement.Status.Inactive\n                                ),\n                                Category,\n                                \"Window Measurement\",\n                                Description,\n                                If(\n                                    'United Inches (UI)' = 0,\n                                    \"Sales Measurement\",\n                                    \"Tech Measurement\"\n                                ),\n                                Image,\n                                gblAppIcons.Ruler,\n                                ImageDisabled,\n                                gblAppIcons.RulerDisabled,\n                                Screen,\n                                'Measure Window Screen',\n                                Title,\n                                If(\n                                    'United Inches (UI)' = 0,\n                                    $\"{Text(gblRecordJobEntryCurrent_.'Measurement (Sales)'.Width)}\"\" x {Text(gblRecordJobEntryCurrent_.'Measurement (Sales)'.Height)}\"\"\",\n                                    $\"{RoundDown(\n                                        Width,\n                                        0\n                                    )} {Switch(\n                                        Mod(\n                                            Width,\n                                            1\n                                        ),\n                                        0,\n                                        \"\",\n                                        0.125,\n                                        \"1/8\",\n                                        0.250,\n                                        \"1/4\",\n                                        0.375,\n                                        \"3/8\",\n                                        0.500,\n                                        \"1/2\",\n                                        0.625,\n                                        \"5/8\",\n                                        0.750,\n                                        \"3/4\",\n                                        0.875,\n                                        \"7/8\"\n                                    )}\"\" x {RoundDown(\n                                        Height,\n                                        0\n                                    )} {Switch(\n                                        Mod(\n                                            Height,\n                                            1\n                                        ),\n                                        0,\n                                        \"\",\n                                        0.125,\n                                        \"1/8\",\n                                        0.250,\n                                        \"1/4\",\n                                        0.375,\n                                        \"3/8\",\n                                        0.500,\n                                        \"1/2\",\n                                        0.625,\n                                        \"5/8\",\n                                        0.750,\n                                        \"3/4\",\n                                        0.875,\n                                        \"7/8\"\n                                    )}\"\"\"\n                                )\n                            ),\n                            'Window Measurement',\n                            ID\n                        ),\n                        ID,\n                        Title,\n                        Category,\n                        Description,\n                        Screen,\n                        Image,\n                        ImageDisabled\n                    )\n                }\n            ),\n            varMenuItems\n        )\n    );\n    Set(\n        gblProjectSidebarItemCurrent,\n        First(colProjectSidebar)\n    ),\n    locFormMode = \"Edit\",\n    With(\n        {\n            varType: \"colCdsJobEntries\",\n            varRecordRef: gblRecordJobEntryCurrent_.'Job Entry'\n        },\n        Set(\n            gblRecordJobEntryCurrent_,\n            Patch(\n                colCdsJobEntries,\n                gblRecordJobEntryCurrent_,\n                {\n                    'Room: Description': lbl_AddRoom_Description.Text,\n                    'Room: Floor': LookUp(\n                        colRoomProperties,\n                        Attribute = \"Floor\",\n                        Value\n                    ),\n                    'Room: Type': LookUp(\n                        colRoomProperties,\n                        Attribute = \"Room\",\n                        Value\n                    )\n                }\n            )\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef = varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: \"colCdsJobEntries\",\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    )\n);\n//save local data\nIf(\n    gblAppLoadOffline,\n    SaveData(\n        colAUDRecords,\n        \"localAUDRecords\"\n    );\n    SaveData(\n        colCdsJobEntries,\n        \"localCdsJobEntries\"\n    );\n    SaveData(\n        colCdsJobEntrySelections,\n        \"localCdsJobEntrySelections\"\n    );\n    SaveData(\n        colCdsWindowMeasurements,\n        \"localCdsWindowMeasurements\"\n    )\n);\n// leave the screen and reset\nReset(gal_AddRoom_Selection);\nReset(gal_AddRoom_Selected);\n// next screen\nIf(\n    And(\n        locFormMode = \"Edit\",\n        locPreviousScreen = \"Rooms Screen\"\n    ),\n    Navigate(\n        'Rooms Screen',\n        ScreenTransition.None\n    ),\n    Navigate(\n        'Windows Screen',\n        ScreenTransition.None\n    )\n);"
            PressedBorderColor: =Self.Fill
            PressedColor: =Color.Transparent
            PressedFill: =Color.Transparent
            Text: =""
            Visible: =cmp_AddRoom_AdvanceButton.Visible
            Width: =cmp_AddRoom_AdvanceButton.Width
            X: =cmp_AddRoom_AdvanceButton.X
            Y: =cmp_AddRoom_AdvanceButton.Y
      - lbl_AddRoom_Titlebar:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Segoe UI'
            Size: =20
            Text: |-
              =If(
                  locFormMode = "New",
                  "Add Window/Door - ",
                  "Change Window/Door - "
              )& locCurrentRoomProperty
            Width: =638
            X: =cmp_AddRoom_Sidebar.X+cmp_AddRoom_Sidebar.Width+lbl_AddRoom_Actions__Background.Width+30
            Y: =cmp_AddRoom_Titlebar.Y+cmp_AddRoom_Titlebar.Height+30
      - lbl_AddRoom_Actions__Background:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#faf9f8")
            Font: =Font.'Open Sans'
            Height: =708
            Text: =""
            Width: =250
            X: =80
            Y: =60
      - gal_AddRoom_Selected:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            BorderStyle: =BorderStyle.None
            Default: =LookUp(colRoomProperties, Attribute=locCurrentRoomProperty)
            DelayItemLoading: =false
            Fill: =gblAppStyles.ActionsMenu.Fill
            Height: =708
            Items: =colRoomProperties
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: =UpdateContext({locCurrentRoomProperty:ThisItem.Attribute})
            TabIndex: =0
            TemplateFill: =If(ThisItem.IsSelected, ColorFade(gal_AddRoom_Selected.Fill, -5%), Color.Transparent)
            TemplatePadding: =0
            TemplateSize: =68
            Width: =250
            X: =cmp_AddRoom_Sidebar.X+cmp_AddRoom_Sidebar.Width
            Y: =cmp_AddRoom_Titlebar.Y+cmp_AddRoom_Titlebar.Height
          Children:
            - lbl_AddRoom_Selected__Value:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.ActionsMenu.Color
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight
                  OnSelect: =Select(Parent)
                  PaddingLeft: =30
                  PaddingTop: =15
                  Size: =gblAppStyles.ActionsMenu.SizeTitle
                  Text: =Coalesce(ThisItem.Value, "Select An Option")
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth
                  Wrap: =false
            - lbl_AddRoom_Selected__Attribute:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.ActionsMenu.Color
                  Font: =gblAppStyles.Text.Font
                  Height: =Parent.TemplateHeight
                  OnSelect: =Select(Parent)
                  PaddingLeft: =30
                  PaddingTop: =40
                  Size: =gblAppStyles.ActionsMenu.SizeSubtitle
                  Text: =ThisItem.Attribute
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth
      - lbl_AddRoom_Description:
          Control: Classic/TextInput@2.3.2
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            BorderStyle: =BorderStyle.None
            Color: =gblAppStyles.Text.Color
            Default: |-
              =gblRecordJobEntryCurrent_.'Room: Description'
            Font: =gblAppStyles.Text.Font
            Height: =50
            HintText: ="Enter a room description"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            MaxLength: =20
            OnChange: |-
              =Patch(colRoomProperties, LookUp(colRoomProperties, Attribute="Description"), {Value: Self.Text});
            PaddingLeft: =20
            Visible: =gal_AddRoom_Selected.Selected.Attribute="Description"
            Width: =443
            X: =360
            Y: =155
      - lbl_AddRoom_WordLength:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Height: =50
            Text: =Len(lbl_AddRoom_Description.Text) & "/20"
            Visible: =gal_AddRoom_Selected.Selected.Attribute="Description"
            Width: =147
            X: =825
            Y: =155
      - btn_AddRoom_OKDescription:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =gblAppColors.Secondary.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisabledColor: =gblAppColors.Secondary.White
            DisabledFill: =gblAppStyles.Status.Disabled
            DisplayMode: |-
              =If(
                  IsBlank(lbl_AddRoom_Description.Text),
                  DisplayMode.Disabled,
                  DisplayMode.Edit
              )
            Fill: =gblAppStyles.Status.Neutral
            FocusedBorderColor: =Color.Transparent
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Normal
            Height: =50*1
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(Self.Fill, -20%)
            OnSelect: |-
              =Collect(
                  colRoomProperties,
                  {
                      Attribute: "Window",
                      ID: "",
                      Value: ""
                  }
              );
              // change to the next window property
              UpdateContext({locCurrentRoomProperty: "Window"});

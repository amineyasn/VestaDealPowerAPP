ComponentDefinitions:
  cmp_AdvanceButton:
    DefinitionType: CanvasComponent
    CustomProperties:
      ButtonFill:
        PropertyKind: Input
        DisplayName: ButtonFill
        Description: A custom property
        DataType: Color
        Default: =Color.White
      Color:
        PropertyKind: Input
        DisplayName: Color
        Description: A custom property
        DataType: Color
        Default: =Color.Black
      Icon:
        PropertyKind: Input
        DisplayName: Icon
        Description: A custom property
        DataType: Record
        Default: |-
          ={Value: Icon.Check}
      IconColor:
        PropertyKind: Input
        DisplayName: IconColor
        Description: A custom property
        DataType: Color
        Default: =Color.White
      IconFill:
        PropertyKind: Input
        DisplayName: IconFill
        Description: A custom property
        DataType: Color
        Default: =Color.Green
      NavigateScreen:
        PropertyKind: Input
        DisplayName: NavigateScreen
        Description: A custom property
        DataType: Screen
        Default: =App.ActiveScreen
      Text:
        PropertyKind: Input
        DisplayName: Text
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Properties:
      Fill: =Color.Transparent
      Height: =60
      Width: =280
    Children:
      - btn_AdvanceButton_Base:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =Color.Transparent
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =cmp_AdvanceButton.ButtonFill
            Font: =Font.'Open Sans'
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =Self.Fill
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Fill
            RadiusBottomLeft: =180
            RadiusBottomRight: =Self.RadiusBottomLeft
            RadiusTopLeft: =Self.RadiusBottomLeft
            RadiusTopRight: =Self.RadiusBottomLeft
            Text: =""
            Width: =cmp_AdvanceButton.Width
      - btn_AdvanceButton_IconFill:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =Blank()
            BorderThickness: =0
            Color: =
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =cmp_AdvanceButton.IconFill
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =cmp_AdvanceButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =Self.Fill
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Fill
            RadiusBottomLeft: =180
            RadiusBottomRight: =Self.RadiusBottomLeft
            RadiusTopLeft: =Self.RadiusBottomLeft
            RadiusTopRight: =Self.RadiusBottomLeft
            Text: =""
            Width: =Self.Height
      - ico_AdvanceButton_Icon:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =cmp_AdvanceButton.IconColor
            Height: =39
            Icon: =cmp_AdvanceButton.Icon.Value
            Width: =39
            X: =10
            Y: =10
      - lbl_AdvanceButton_Text:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =cmp_AdvanceButton.Color
            Font: =Font.'Segoe UI'
            Size: =16
            Text: =cmp_AdvanceButton.Text
            Width: =cmp_AdvanceButton.Width-Self.X
            X: =75
            Y: =10
      - lbl_AdvanceButton_Overlay:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            BorderStyle: =BorderStyle.None
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =60
            OnSelect: =Navigate(cmp_AdvanceButton.NavigateScreen, BorderStyle.None)
            TabIndex: =0
            Text: =""
            Width: =280

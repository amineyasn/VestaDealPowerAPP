Screens:
  Overview Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =// reset screen
        UpdateContext({
            locOverviewFieldName: Blank(),
            locOverviewSelectedValues: Blank()
        });
    Children:
      - cmp_Overview_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Overview"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_Overview_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_Overview_Titlebar.Y+cmp_Overview_Titlebar.Height
      - cmp_Overview_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Jobs Screen'
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - con_Overview_Notes:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =708
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =944
            X: =80
            Y: =60
          Children:
            - cmp_Overview_AdvanceButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Check}
                  IconColor: =Color.White
                  IconFill: =gblAppColors.Secondary.Green
                  NavigateScreen: ='Final Steps Screen'
                  Text: ="Go to Final Steps"
                  Visible: |-
                    =!IsBlank(gblRecordJobCurrent.'Overview: Style Of Home') And !IsBlank(gblRecordJobCurrent.'Overview: Construction') And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Covering') And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Capping') And !IsBlank(gblRecordJobCurrent.'Overview: Existing Windows') And !IsBlank(gblRecordJobCurrent.'Overview: Special Equipment Needed') And !IsBlank(gblRecordJobCurrent.'Overview: Special Conditions') And !IsBlank(gblRecordJobCurrent.'Overview: Notes')
                  Width: =288
                  X: =616
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
            - lbl_Overview_Title:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Segoe UI'
                  Height: =50
                  PaddingLeft: =25
                  Size: =gblAppStyles.Text.TitleSize
                  Text: ="Overview"
                  Width: =681
                  X: =92
                  Y: =25
            - ico_Overview_Title:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =gblAppStyles.Status.Disabled
                  Height: =49
                  Icon: =Icon.OptionsList
                  Width: =49
                  X: =43*1
                  Y: =25*1
            - gal_Overview_Notes:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DelayItemLoading: =false
                  Height: |-
                    =If(
                        !IsBlank(gblRecordJobCurrent.'Overview: Style Of Home')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Construction')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Covering')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Capping')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Existing Windows')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Special Equipment Needed')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Special Conditions')
                        And !IsBlank(gblRecordJobCurrent.'Overview: Notes'),
                        485,
                        615
                    )
                  Items: |-
                    =Table(
                        {Title: "Style of Home", Value: gblRecordJobCurrent.'Overview: Style Of Home'},
                        {Title: "Construction", Value: gblRecordJobCurrent.'Overview: Construction'},
                        {Title: "Exterior Covering", Value: gblRecordJobCurrent.'Overview: Exterior Covering'},
                        {Title: "Exterior Capping", Value: gblRecordJobCurrent.'Overview: Exterior Capping'},
                        {Title: "Existing Windows", Value: gblRecordJobCurrent.'Overview: Existing Windows'},
                        {Title: "Special Equipment", Value: gblRecordJobCurrent.'Overview: Special Equipment Needed'},
                        {Title: "Special Conditions", Value: gblRecordJobCurrent.'Overview: Special Conditions'},
                        {Title: "Notes", Value: gblRecordJobCurrent.'Overview: Notes'}
                    )
                  LoadingSpinner: =LoadingSpinner.None
                  OnSelect: |-
                    =If(
                        ThisItem.Title = "Notes",
                        Navigate(
                            'Add Note Screen',
                            ScreenTransition.None,
                            {
                                locRecordNoteCurrent: {
                                    TableName: "Jobs",
                                    GUID: gblRecordJobCurrent.Job,
                                    BackScreen: App.ActiveScreen,
                                    Notes: gblRecordJobCurrent.'Overview: Notes'
                                }
                            }
                        ),
                        UpdateContext(
                            {
                                locOverviewFieldName: ThisItem.Title,
                                locOverviewSelectedValues: ThisItem.Value & If(
                                    !IsBlank(ThisItem.Value),
                                    ", "
                                )
                            }
                        )
                    )
                  ShowScrollbar: =false
                  TabIndex: =0
                  TemplateSize: =91
                  Width: =885
                  X: =36
                  Y: =93
                Children:
                  - lbl_Overview_Notes:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =gblAppStyles.Text.Font
                        Height: =50
                        Text: =ThisItem.Title
                        Width: =195
                  - btn_Overview_Notes:
                      Control: Classic/Button@2.2.0
                      Properties:
                        Align: =Align.Left
                        BorderColor: =ColorFade(Self.Fill, -15%)
                        BorderStyle: =BorderStyle.None
                        Color: =gblAppStyles.Text.Color
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        DisplayMode: =If(gblRecordJobCurrent.Completed='Completed (Jobs)'.No, DisplayMode.Edit, DisplayMode.View)
                        Fill: =gblAppStyles.Card.Fill
                        Font: =gblAppStyles.Text.Font
                        FontWeight: =FontWeight.Lighter
                        Height: =76
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =Self.Color
                        HoverFill: =Self.Fill
                        Italic: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No And Len(ThisItem.Value) = 0
                        OnSelect: =Select(Parent)
                        PaddingLeft: =20
                        PaddingTop: =15
                        PressedBorderColor: =Self.Fill
                        PressedFill: =Self.Fill
                        RadiusBottomLeft: =gblAppStyles.Card.Radius
                        RadiusBottomRight: =gblAppStyles.Card.Radius
                        RadiusTopLeft: =gblAppStyles.Card.Radius
                        RadiusTopRight: =gblAppStyles.Card.Radius
                        Size: =gblAppStyles.Text.Size
                        Text: |-
                          =If(
                              gblRecordJobCurrent.Completed='Completed (Jobs)'.No And Len(ThisItem.Value) > 160,
                              Left(
                                  ThisItem.Value,
                                  160
                              ) & "...",
                              (gblRecordJobCurrent.Completed='Completed (Jobs)'.No Or gblRecordJobCurrent.Completed='Completed (Jobs)'.Yes) And Len(ThisItem.Value) > 0,
                              ThisItem.Value,
                              gblRecordJobCurrent.Completed='Completed (Jobs)'.No And Len(ThisItem.Value) = 0,
                              "tap to select "&Lower(ThisItem.Title)&" options",
                              gblRecordJobCurrent.Completed='Completed (Jobs)'.Yes And Len(ThisItem.Value) = 0,
                              "None"
                          )
                        VerticalAlign: =VerticalAlign.Top
                        Width: =664
                        X: =195
      - con_Overview_DataEntry:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =gblAppColors.Secondary.GrayLight
            Height: =708
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =!IsBlank(locOverviewFieldName)
            Width: =944
            X: =80
            Y: =60
          Children:
            - lbl_Overview_DataEntry__Title:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Segoe UI'
                  Height: =50
                  PaddingLeft: =0
                  Size: =gblAppStyles.Text.TitleSize
                  Text: =locOverviewFieldName&" (select one or more)"
                  Width: =682
                  X: =51
                  Y: =40
            - gal_Overview_DataEntry:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =Color.Transparent
                  DelayItemLoading: =false
                  Height: =470
                  Items: |-
                    =Switch(
                        locOverviewFieldName,
                        "Style of Home", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.StyleOfHome),
                        "Construction", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.Construction),
                        "Exterior Covering", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.ExteriorCovering),
                        "Exterior Capping", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.ExteriorCapping),
                        "Existing Windows", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.ExistingWindows),
                        "Special Equipment", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.SpecialEquipmentNeeded),
                        "Special Conditions", Filter(colCdsDataEntryChoices, Type=gblOptionSets.Global.DataEntryType.SpecialConditions)
                    )
                  LoadingSpinner: =LoadingSpinner.None
                  OnSelect: |-
                    =UpdateContext(
                        {
                            locOverviewSelectedValues: If(
                                ThisItem.Value & ", " in locOverviewSelectedValues,
                                Substitute(locOverviewSelectedValues,ThisItem.Value & ", ",""),
                                locOverviewSelectedValues & ThisItem.Value & ", "
                            )
                        }
                    )
                  ShowScrollbar: =false
                  TabIndex: =0
                  TemplatePadding: =0
                  TemplateSize: =188
                  Width: =885
                  WrapCount: =4
                  X: =30
                  Y: =105
                Children:
                  - btn_Overview_DataEntry__Base:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =gblAppStyles.Card.BorderColor
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =If(ThisItem.Value&", " in locOverviewSelectedValues, gblAppStyles.Status.Neutral, gblAppStyles.Card.Fill)
                        FocusedBorderThickness: =1
                        Font: =Font.'Open Sans'
                        Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =Self.Color
                        HoverFill: =Self.Fill
                        OnSelect: =Select(Parent)
                        PaddingLeft: =gblAppStyles.Card.PaddingLeft
                        PaddingRight: =gblAppStyles.Card.PaddingRight
                        PressedBorderColor: =Self.BorderColor
                        PressedFill: =Self.Fill
                        RadiusBottomLeft: =gblAppStyles.Card.Radius
                        RadiusBottomRight: =gblAppStyles.Card.Radius
                        RadiusTopLeft: =gblAppStyles.Card.Radius
                        RadiusTopRight: =gblAppStyles.Card.Radius
                        Size: =11.24
                        Text: =
                        Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                        X: =(Parent.TemplateWidth-Self.Width)/2
                        Y: =(Parent.TemplateHeight-Self.Height)/2
                  - lbl_Overview_DataEntry:
                      Control: Label@2.5.1
                      Properties:
                        Align: =LayoutAlignItems.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =If(ThisItem.Value&", " in locOverviewSelectedValues, gblAppColors.Secondary.White, gblAppStyles.Card.TitleColor)
                        Fill: =Color.Transparent
                        Font: =gblAppStyles.Text.TitleFont
                        FontWeight: =FontWeight.Lighter
                        Height: =btn_Overview_DataEntry__Base.Height
                        LineHeight: =1.3
                        OnSelect: =Select(Parent)
                        PaddingLeft: =20
                        PaddingRight: =20
                        Size: =gblAppStyles.Card.TitleSize
                        Text: =ThisItem.Value
                        Width: =btn_Overview_DataEntry__Base.Width
                        X: =btn_Overview_DataEntry__Base.X
                        Y: =btn_Overview_DataEntry__Base.Y
                  - btn_Overview_DataEntry:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =Color.Transparent
                        BorderThickness: =1
                        Color: =
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =Color.Transparent
                        FocusedBorderThickness: =1
                        Font: =Font.'Open Sans'
                        Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =Self.Color
                        HoverFill: =If(!(ThisItem.Value&", " in locOverviewSelectedValues), gblAppStyles.Card.HoverFill)
                        OnSelect: =Select(Parent)
                        PaddingRight: =3.75
                        PaddingTop: =3.75
                        PressedBorderColor: =Self.BorderColor
                        PressedFill: =If(!(ThisItem.Value&", " in locOverviewSelectedValues), gblAppStyles.Card.PressedFill)
                        RadiusBottomLeft: =gblAppStyles.Card.Radius
                        RadiusBottomRight: =gblAppStyles.Card.Radius
                        RadiusTopLeft: =gblAppStyles.Card.Radius
                        RadiusTopRight: =gblAppStyles.Card.Radius
                        Size: =11.24
                        Text: =
                        Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                        X: =(Parent.TemplateWidth-Self.Width)/2*1
                        Y: =(Parent.TemplateHeight-Self.Height)/2*1
            - cmp_Overview_DataEntry_AdvanceButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Check}
                  IconColor: =Color.White
                  IconFill: =gblAppColors.Secondary.Green
                  NavigateScreen: =
                  Text: |-
                    ="Add "&CountRows(ForAll(Split(locOverviewSelectedValues,","), {Result: ThisRecord.Value}))-1&" Items"
                  Visible: |-
                    =CountRows(ForAll(Split(locOverviewSelectedValues,","), {Result: ThisRecord.Value}))>1
                  Width: =253
                  X: =647
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
            - btn_Overview_DataEntry_AdvanceButton:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =cmp_Overview_DataEntry_AdvanceButton.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |-
                    =// update job record
                    With(
                        {
                            varType: "colCdsJobs",
                            varRecordRef: gblRecordJobCurrent.Job, 
                            varPatchRecord: LookUp(colCdsJobs, appJobIDText=gblRecordJobCurrent.appJobIDText),
                            varPatchValue: Left(locOverviewSelectedValues, Len(locOverviewSelectedValues)-2)
                        },
                        Switch(
                            locOverviewFieldName,
                            "Style of Home", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Style Of Home': varPatchValue})),
                            "Construction", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Construction': varPatchValue})),
                            "Exterior Covering", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Exterior Covering': varPatchValue})),
                            "Exterior Capping", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Exterior Capping': varPatchValue})),
                            "Existing Windows", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Existing Windows': varPatchValue})),
                            "Special Equipment", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Special Equipment Needed': varPatchValue})),
                            "Special Conditions", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Special Conditions': varPatchValue}))
                        );
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // reset variables
                    UpdateContext({
                        locOverviewFieldName: Blank(),
                        locOverviewSelectedValues: Blank()
                    });
                    // save local data
                    IfError( // This line of code is added to hide the errors
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsJobs,
                            "localCdsJobs"
                        );
                    )
                    ,Blank())  // This line of code is added to hide the errors
                    ;
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: =""
                  Visible: =cmp_Overview_DataEntry_AdvanceButton.Visible
                  Width: =cmp_Overview_DataEntry_AdvanceButton.Width
                  X: =cmp_Overview_DataEntry_AdvanceButton.X
                  Y: =cmp_Overview_DataEntry_AdvanceButton.Y
            - cmp_Overview_DataEntry_ClearButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Trash}
                  IconColor: =Color.White
                  IconFill: =gblAppColors.Secondary.Red
                  NavigateScreen: =
                  Text: ="Clear Selection"
                  Width: =266
                  X: =gblAppStyles.Padding.ButtonMargin
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
            - btn_Overview_DataEntry_ClearButton:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =cmp_Overview_DataEntry_ClearButton.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |-
                    =// Update job record
                    With(
                        {
                            varType: "colCdsJobs",
                            varRecordRef: gblRecordJobCurrent.Job,
                            varPatchRecord: LookUp(colCdsJobs, appJobIDText=gblRecordJobCurrent.appJobIDText)
                        },
                        Switch(
                            locOverviewFieldName,
                            "Style of Home", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Style Of Home': Blank()})),
                            "Construction", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Construction': Blank()})),
                            "Exterior Covering", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Exterior Covering': Blank()})),
                            "Exterior Capping", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Exterior Capping': Blank()})),
                            "Existing Windows", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Existing Windows': Blank()})),
                            "Special Equipment", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Special Equipment Needed': Blank()})),
                            "Special Conditions", Set(gblRecordJobCurrent, Patch(colCdsJobs, varPatchRecord, {'Overview: Special Conditions': Blank()}))
                        );
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // reset variables
                    UpdateContext({
                        locOverviewFieldName: Blank(),
                        locOverviewSelectedValues: Blank()
                    });
                    // save local data
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsJobs,
                            "localCdsJobs"
                        );
                    );
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: =""
                  Visible: =cmp_Overview_DataEntry_ClearButton.Visible
                  Width: =cmp_Overview_DataEntry_ClearButton.Width
                  X: =cmp_Overview_DataEntry_ClearButton.X
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin

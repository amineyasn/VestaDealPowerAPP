                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =FontWeight.Normal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  Italic: =IsBlank(ThisItem.Color)
                  OnSelect: |-
                    =Navigate(
                        'Material Colors Screen',
                        BorderStyle.None,
                        {
                            locCurrentMaterialItem: LookUp(
                                colCdsMarketMaterialItems,
                                'Market Material Item' = ThisItem.'Market Material Item'.'Market Material Item',
                                'Material Item'
                            ).Name,
                            locGUIDJobMaterialItem: ThisItem.'Job Material Item',
                            locMaterialColorSelected: ThisItem.Color,
                            locMaterialColorIsCustomValue: With(
                                {
                                    varMaterialItemName: LookUp(
                                        colCdsMarketMaterialItems,
                                        'Market Material Item' = ThisItem.'Market Material Item'.'Market Material Item',
                                        'Material Item'
                                    ).Name
                                },
                                IsBlank(
                                    LookUp(
                                        colCdsMaterialItemColors,
                                        'Material Item' = varMaterialItemName
                                        And Name = ThisItem.Color
                                    )
                                ) And !IsBlank(ThisItem.Color)
                            ),
                            locMaterialColorIsPredefinedOptions: With(
                                {
                                    varMaterialItemName: LookUp(
                                        colCdsMarketMaterialItems,
                                        'Market Material Item' = ThisItem.'Market Material Item'.'Market Material Item',
                                        'Material Item'
                                    ).Name
                                },
                                !IsEmpty(
                                    Filter(
                                        colCdsMaterialItemColors,
                                        'Material Item' = varMaterialItemName
                                    )
                                )
                            )
                        }
                    )
                  PaddingLeft: =10
                  PaddingRight: =10

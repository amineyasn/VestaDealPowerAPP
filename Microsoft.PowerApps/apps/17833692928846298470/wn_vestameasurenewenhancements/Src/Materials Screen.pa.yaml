                  PaddingRight: =10
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =5
                  RadiusBottomRight: =Self.RadiusBottomLeft
                  RadiusTopLeft: =Self.RadiusBottomLeft
                  RadiusTopRight: =Self.RadiusBottomLeft
                  Size: =gblAppStyles.Text.Size
                  Text: |-
                    =With(
                        {
                            varMaterialItemType: LookUp(
                                colCdsMarketMaterialItems,
                                'Market Material Item' = ThisItem.'Market Material Item'.'Market Material Item',
                                'Material Item'
                            ).Type
                        },
                        If(
                            varMaterialItemType = 'Material Item Type'.COIL And !IsBlank(ThisItem.'Lumber: Grade'),
                            ThisItem.'Lumber: Species' & Char(13) & ThisItem.'Lumber: Grade',
                            gblRecordJobCurrent.Completed = 'Completed (Jobs)'.No And varMaterialItemType = 'Material Item Type'.COIL And IsBlank(ThisItem.'Lumber: Grade'),
                            "tap to select"
                        )
                    )
                  Width: =147
                  X: =btn_Materials_Items__Color.X+btn_Materials_Items__Color.Width+15
                  Y: =7
            - btn_Materials_Items__Color:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =gblAppColors.Secondary.Black
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)

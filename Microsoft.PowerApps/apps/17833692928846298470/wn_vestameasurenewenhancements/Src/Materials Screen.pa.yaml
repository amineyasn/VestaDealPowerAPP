Screens:
  Materials Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =// eliminate any items selected for deletion where 'delete items' button was not pressed
        Clear(colDeleteMaterialItems);
        // Save local data

        IfError( // This line of code is added to hide the errors
        If(
            gblAppLoadOffline,
            SaveData(
                colAUDRecords,
                "localAUDRecords"
            );
            SaveData(
                colCdsJobMaterialItems,
                "localCdsJobMaterialItems"
            );
        )
        ,Blank())  // This line of code is added to hide the errors
        ;
        //reset screen
        UpdateContext(
            {
                locShowColorsSelection: false,
                locShowCalculator: false
            }
        );
        Reset(gal_Materials_Items)
      OnVisible: |-
        =UpdateContext(
            {
                locShowColorsSelection: false,
                locShowCalculator: false
            }
        )
    Children:
      - cmp_Materials_AdvanceButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Group: grp_Materials_Main
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Check}
            IconColor: =Color.White
            IconFill: =gblAppColors.Secondary.Green
            NavigateScreen: ='Documents Screen'
            Text: ="Go to Signatures"
            Visible: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No
            Width: =270
            X: =713
            Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
      - cmp_Materials_AddItemsButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Group: grp_Materials_Main
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Add}
            IconColor: =Color.White
            IconFill: =gblAppStyles.Status.Neutral
            NavigateScreen: ='Add Materials Items Screen'
            Text: ="Add Items"
            Visible: =!cmp_Materials_DeleteItemsButton.Visible
            Width: =225
            X: =cmp_Materials_Sidebar.Width + gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
      - cmp_Materials_DeleteItemsButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Group: grp_Materials_Main
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Trash}
            IconColor: =Color.White
            IconFill: =gblAppStyles.Status.Danger
            NavigateScreen: ='Add Labor Items Screen'
            Text: ="Delete Items"
            Visible: =CountRows(Filter(gal_Materials_Items.AllItems, 'Job Material Item' in colDeleteMaterialItems.'Job Material Item'))>0
            Width: =225
            X: =cmp_Materials_Sidebar.Width + gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
      - btn_Materials_DeleteItemsButton:
          Control: Classic/Button@2.2.0
          Group: grp_Materials_Main
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Transparent
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            Height: =cmp_Materials_DeleteItemsButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Color.Transparent
            HoverFill: =Color.Transparent
            OnSelect: |-
              =// Remove each record from the local job material items collection
              ForAll(
                  colDeleteMaterialItems,
                  With(
                      {
                          varType: "colCdsJobMaterialItems",
                          varRecordRef: colDeleteMaterialItems[@'Job Material Item']
                      },
                      If(
                          varRecordRef in Filter(
                              colAUDRecords,
                              Type = "colCdsJobMaterialItems"
                              And Operation = "A"
                          ).RecordRef,
                          // if labor item was created on local device
                          Remove(
                              colCdsJobMaterialItems,
                              LookUp(
                                  colCdsJobMaterialItems,
                                  'Job Material Item' = varRecordRef
                              )
                          );
                          Remove(
                              colAUDRecords,
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef = varRecordRef
                                  And Operation = "A"
                              )
                          ),
                          // if labor item was downloaded from the server
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "D"
                              }
                          )
                      )
                  )
              );
              UpdateIf(
                  colCdsJobMaterialItems,
                  'Job Material Item' in Filter(
                      colAUDRecords,
                      Type = "colCdsJobMaterialItems",
                      Operation = "D").RecordRef,
                  {
                      Status: gblOptionSets.JobMaterialItem.Status.Inactive,
                      'Status Reason': gblOptionSets.JobMaterialItem.StatusReason.Inactive
                  }
              );
              // save local changes
              If(
                  gblAppLoadOffline,
                  SaveData(
                      colAUDRecords,
                      "localAUDRecords"
                  );
                  SaveData(
                      colCdsJobMaterialItems,
                      "localCdsJobMaterialItems"
                  );
              );
            PressedBorderColor: =Self.Fill
            PressedColor: =Color.Transparent
            PressedFill: =Color.Transparent
            Visible: =cmp_Materials_DeleteItemsButton.Visible
            Width: =cmp_Materials_DeleteItemsButton.Width
            X: =cmp_Materials_DeleteItemsButton.X
            Y: =cmp_Materials_DeleteItemsButton.Y

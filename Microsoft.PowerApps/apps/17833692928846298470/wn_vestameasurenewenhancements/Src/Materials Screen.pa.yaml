      - tog_Materials_Calculator:
          Control: Classic/Toggle@2.1.0
          Group: grp_Materials_Calculator
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            Default: =locShowCalculator And !cmp_Materials_Calculator.OK
            Font: =Font.'Open Sans'
            OnUncheck: |-
              =With(
                  {
                      varType: "colCdsJobMaterialItems",
                      varRecordRef: gal_Materials_Items.Selected.'Job Material Item'
                  },
                  // update job material item with quantity
                  Patch(
                      colCdsJobMaterialItems,
                      LookUp(
                          colCdsJobMaterialItems,
                          'Job Material Item' = gal_Materials_Items.Selected.'Job Material Item'
                      ),
                      {Quantity: cmp_Materials_Calculator.Value}
                  );
                  If(
                      IsBlank(
                          LookUp(
                              colAUDRecords,
                              Type = varType
                              And RecordRef = varRecordRef
                          )
                      ),
                      Collect(
                          colAUDRecords,
                          {
                              Type: varType,
                              RecordRef: varRecordRef,
                              Job: gblRecordJobCurrent.Job,
                              Operation: "U"
                          }
                      )
                  )
              );
              // save local changes
              IfError( // This line of code is added to hide the errors
              If(
                  gblAppLoadOffline,
                  SaveData(
                      colAUDRecords,
                      "localAUDRecords"
                  );
                  SaveData(
                      colCdsJobMaterialItems,
                      "localCdsJobMaterialItems"
                  );
              )
              ,Blank())  // This line of code is added to hide the errors

              ;
              // Hide and reset calculator
              UpdateContext({
                  locShowCalculator: false,
                  locResetCalculator: true
              });
              UpdateContext({locResetCalculator: false})
            Reset: =locResetCalculator
            TrueFill: =RGBA(56, 96, 178, 1)
            Visible: =false
            X: =932
            Y: =740

                    =Navigate(
                        'Material Options Screen',
                        BorderStyle.None,
                        {
                            locCurrentMaterialItem: LookUp(
                                colCdsMarketMaterialItems,
                                'Market Material Item' = ThisItem.'Market Material Item'.'Market Material Item',
                                'Material Item'
                            ).Name,
                            locGUIDJobMaterialItem: ThisItem.'Job Material Item',
                            locCurrentMaterialOptionProperty: "Species",
                            locMaterialItemSpecies: ThisItem.'Lumber: Species',
                            locMaterialItemGrade: ThisItem.'Lumber: Grade'
                        }
                    )

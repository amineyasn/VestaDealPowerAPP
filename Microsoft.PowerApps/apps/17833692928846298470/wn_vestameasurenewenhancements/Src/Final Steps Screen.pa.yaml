Screens:
  Final Steps Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =// Unblock user input
        UpdateContext({locShowConfirmFinishJob: false});
        Reset(tog_FinalSteps_SendEmail);
      OnVisible: |
        =Set(
            gblTextClickedSaveScreen,
            Blank()
        );
        UpdateContext(
            {
                locLeadTestPerformed: !IsBlank(
                    LookUp(
                        colCdsWindowMeasurements,
                        Job.Job = gblRecordJobCurrent.Job And (!IsBlank('Lead Test: Exterior Component') Or !IsBlank('Lead Test: Interior Component'))
                    )
                ),
                locShowConfirmFinishJob: false
            }
        );
    Children:
      - lbl_FinalSteps_Title:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Segoe UI'
            Height: =60
            PaddingLeft: =25
            Size: =gblAppStyles.Text.TitleSize
            Text: ="Final Steps"
            Width: =400
            X: =172
            Y: =90
      - cmp_FinalSteps_SaveProgress:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Save}
            IconColor: =Color.White
            IconFill: =gblAppStyles.Status.Disabled
            NavigateScreen: =
            Text: ="Save Progress"
            Visible: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No
            Width: =240
            X: =cmp_FinalSteps_Sidebar.Width + gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height- Self.Height - gblAppStyles.Padding.ButtonMargin
      - btn_FinalSteps_SaveProgress:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =cmp_FinalSteps_SaveProgress.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            OnSelect: |-
              =Set(
                  gblRecordJobCurrent,
                  Patch(
                      colCdsJobs,
                      LookUp(
                          colCdsJobs,
                          appJobIDText = gblRecordJobCurrent.appJobIDText
                      ),
                      {
                          Completed: gblOptionSets.Job.CompletedJob.No,
                          'Lead Test: Send Document?': If(
                              tog_FinalSteps_SendEmail.Value,
                              gblOptionSets.Job.LeadTestSendDocuments.Yes,
                              gblOptionSets.Job.LeadTestSendDocuments.No
                          )
                      }
                  )
              );
              Set(gblTextClickedSaveScreen, "Final Steps Screen");
              Navigate(
                  'Saving Screen',
                  ScreenTransition.Fade,
                  {locSaveText: "Saving data to Vesta Data..."}
              )
            PressedBorderColor: =Self.Fill
            PressedFill: =Self.Fill
            Text: =""
            Visible: =cmp_FinalSteps_SaveProgress.Visible
            Width: =cmp_FinalSteps_SaveProgress.Width
            X: =cmp_FinalSteps_SaveProgress.X
            Y: =cmp_FinalSteps_SaveProgress.Y
      - cmp_FinalSteps_ElevationPhotos:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Camera}
            IconColor: =Color.White
            IconFill: =gblAppColors.Primary.Blue
            NavigateScreen: ='Photos Screen'
            Text: ="Elevation Photos"
            Visible: =false
            Width: =270
            X: =Parent.Width - Self.Width - gblAppStyles.Padding.ButtonMargin
            Y: =85
      - btn_FinalSteps_ElevationPhotos:
          Control: Classic/Button@2.2.0
          Properties:
            AutoDisableOnSelect: =false
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =Color.Transparent
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            DisabledColor: =RGBA(0, 0, 0, 0)
            DisabledFill: =RGBA(0, 0, 0, 0)
            Fill: =Color.Transparent
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =cmp_FinalSteps_ElevationPhotos.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            OnSelect: |-
              =With(
                  {
                      varElevationCount: CountRows(
                          Filter(
                              colCdsJobPhotos,
                              colCdsJobPhotos[@Job].Job = gblRecordJobCurrent.Job,
                              Type in [
                                  gblOptionSets.Global.PhotoType.ElevationFront,
                                  gblOptionSets.Global.PhotoType.ElevationRear,
                                  gblOptionSets.Global.PhotoType.ElevationSide
                              ]
                          )
                      )
                  },
                  Navigate(
                      'Photos Screen',
                      ScreenTransition.None,
                      {
                          locModeElevation: true,
                          locModeDefault: false,
                          locModeWindow: false,
                          locShowTypes: varElevationCount = 0,
                          locShowPhotos: varElevationCount > 0,
                          locAddPhotoLabel: "",
                          locReturnScreen: 'Final Steps Screen'
                      }
                  )
              )
            PressedBorderColor: =Self.Fill
            PressedFill: =Self.Fill
            Text: =""
            Visible: =false
            Width: =cmp_FinalSteps_ElevationPhotos.Width
            X: =Parent.Width - Self.Width - gblAppStyles.Padding.ButtonMargin
            Y: =cmp_FinalSteps_ElevationPhotos.Y
      - cmp_FinalSteps_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Final Steps"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_FinalSteps_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_FinalSteps_Titlebar.Y+cmp_FinalSteps_Titlebar.Height
      - cmp_FinalSteps_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Jobs Screen'
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - cmp_FinalSteps_Finish:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Send}
            IconColor: =Color.White
            IconFill: =gblAppColors.Secondary.Green
            NavigateScreen: =
            Text: ="Finish Job"
            Visible: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No
            Width: =221
            X: =Parent.Width - Self.Width - gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height- Self.Height - gblAppStyles.Padding.ButtonMargin
      - btn_FinalSteps_Finish:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =cmp_FinalSteps_Finish.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            OnSelect: |-
              =UpdateContext({locShowConfirmFinishJob: true})
            PressedBorderColor: =Self.Fill
            PressedFill: =Self.Fill
            Text: =""
            Visible: =cmp_FinalSteps_Finish.Visible
            Width: =cmp_FinalSteps_Finish.Width
            X: =cmp_FinalSteps_Finish.X
            Y: =cmp_FinalSteps_Finish.Y
      - gal_FinalSteps:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            BorderThickness: =1
            DelayItemLoading: =false
            Fill: =Color.Transparent
            FocusedBorderThickness: =Self.BorderThickness
            Height: =419
            Items: |-
              =Table(
                  {
                      Item: "Rooms",
                      Message: With(
                          {
                              varWindowsNotCompleted: CountRows(
                                  Filter(
                                      colCdsWindowMeasurements,
                                      Job.Job = gblRecordJobCurrent.Job,
                                      Completed = gblOptionSets.WindowMeasurement.Completed.No,
                                      Type = gblOptionSets.WindowMeasurement.Type.Tech,
                                      Status <> gblOptionSets.WindowMeasurement.Status.Inactive
                                  )
                              )
                          },
                          If(
                              varWindowsNotCompleted > 0,
                              Text(
                                  varWindowsNotCompleted,
                                  "[$-en-US]0"
                              ) & " windows have not been completed for this job",
                              "Completed"
                          )
                      ),
                      Success: CountRows(
                          Filter(
                              colCdsWindowMeasurements,
                              Job.Job = gblRecordJobCurrent.Job,
                              Completed = gblOptionSets.WindowMeasurement.Completed.No,
                              Type = gblOptionSets.WindowMeasurement.Type.Tech,
                              Status <> gblOptionSets.WindowMeasurement.Status.Inactive
                          )
                      ) = 0
                  },
                  {
                      Item: "Labor",
                      Message: If(
                          IsEmpty(
                              Filter(
                                  colCdsJobLaborItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                      Status <> gblOptionSets.JobLaborItem.Status.Inactive
                              )
                          ),
                          "No labor items were found for this job",
                          CountRows(
                              Filter(
                                  colCdsJobLaborItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                  IsBlank(Quantity),
                                  Status <> gblOptionSets.JobLaborItem.Status.Inactive
                              )
                          ) > 0,
                          Text(
                              CountRows(
                                  Filter(
                                      colCdsJobLaborItems,
                                      appJobIDText = gblRecordJobCurrent.appJobIDText,
                                      IsBlank(Quantity),
                                      Status <> gblOptionSets.JobLaborItem.Status.Inactive
                                  )
                              ),
                              "[$-en-US]0"
                          ) & " labor item(s) are missing quantity information",
                          "Completed"
                      ),
                      Success: With(
                          {
                              tblJobLaborItems: Filter(
                                  colCdsJobLaborItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                  Status <> gblOptionSets.JobLaborItem.Status.Inactive
                              )
                          },
                          !IsEmpty(tblJobLaborItems) And IsEmpty(
                              Filter(
                                  tblJobLaborItems,
                                  IsBlank(Quantity)
                              )
                          )
                      )
                  },
                  {
                      Item: "Materials",
                      Message: If(
                          IsEmpty(
                              Filter(
                                  colCdsJobMaterialItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                  Status <> gblOptionSets.JobMaterialItem.Status.Inactive
                              )
                          ),
                          "No materials items were found for this job",
                          CountRows(
                              Filter(
                                  colCdsJobMaterialItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                  IsBlank(Quantity) Or IsBlank(Color),
                                  Status <> gblOptionSets.JobMaterialItem.Status.Inactive
                              )
                          ) > 0,
                          Text(
                              CountRows(
                                  Filter(
                                      colCdsJobMaterialItems,
                                      appJobIDText = gblRecordJobCurrent.appJobIDText,
                                      IsBlank(Quantity) Or IsBlank(Color),
                                      Status <> gblOptionSets.JobMaterialItem.Status.Inactive
                                  )
                              ),
                              "[$-en-US]0"
                          ) & " materials item(s) are missing quantity or color information",
                          "Completed"
                      ),
                      Success: With(
                          {
                              tblJobMaterialItems: Filter(
                                  colCdsJobMaterialItems,
                                  appJobIDText = gblRecordJobCurrent.appJobIDText,
                                  Status <> gblOptionSets.JobMaterialItem.Status.Inactive
                              )
                          },
                          !IsEmpty(tblJobMaterialItems) And IsEmpty(
                              Filter(
                                  tblJobMaterialItems,
                                  IsBlank(Quantity) Or IsBlank(Color),
                                  Status <> gblOptionSets.JobMaterialItem.Status.Inactive
                              )
                          )
                      )
                  },
                  {
                      Item: "Elevation Photos",
                      Message: With(
                          {
                              tblJobPhotos: Filter(
                                  colCdsJobPhotos,
                                  colCdsJobPhotos[@Job].Job = gblRecordJobCurrent.Job,
                                  Status <> gblOptionSets.JobPhoto.Status.Inactive
                              )
                          },
                          If(
                              IsBlank(
                                  LookUp(
                                      tblJobPhotos,
                                      Type = gblOptionSets.Global.PhotoType.ElevationFront
                                      And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                  )
                              ) Or IsBlank(
                                  LookUp(
                                      tblJobPhotos,
                                      Type = gblOptionSets.Global.PhotoType.ElevationSide
                                      And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                  )
                              ) Or IsBlank(
                                  LookUp(
                                      tblJobPhotos,
                                      Type = gblOptionSets.Global.PhotoType.ElevationRear
                                      And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                  )
                              ),
                              With(
                                  {
                                      varMessagePhoto: "Missing elevation photos: " & If(
                                          IsBlank(
                                              LookUp(
                                                  tblJobPhotos,
                                                  Type = gblOptionSets.Global.PhotoType.ElevationFront
                                      And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                              )
                                          ),
                                          "front, "
                                      ) & If(
                                          IsBlank(
                                              LookUp(
                                                  tblJobPhotos,
                                                  Type = gblOptionSets.Global.PhotoType.ElevationSide
                                      And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                              )
                                          ),
                                          "side, "
                                      ) & If(
                                          IsBlank(
                                              LookUp(
                                                  tblJobPhotos,
                                                  Type = gblOptionSets.Global.PhotoType.ElevationRear
                                                  And Status <> gblOptionSets.JobPhoto.Status.Inactive
                                              )
                                          ),
                                          "rear, "
                                      )
                                  },
                                  Left(
                                      varMessagePhoto,
                                      Len(varMessagePhoto) - 2
                                  )
                              ),
                              "Completed"
                          )
                      ),
                      Success: With(
                          {
                              tblJobPhotos: Filter(
                                  colCdsJobPhotos,
                                  colCdsJobPhotos[@Job].Job = gblRecordJobCurrent.Job,
                                  Status <> gblOptionSets.JobPhoto.Status.Inactive
                              )
                          },
                          !IsBlank(
                              LookUp(
                                  tblJobPhotos,
                                  Type = gblOptionSets.Global.PhotoType.ElevationFront
                                  And Status <> gblOptionSets.JobPhoto.Status.Inactive
                              )
                          ) And !IsBlank(
                              LookUp(
                                  tblJobPhotos,
                                  Type = gblOptionSets.Global.PhotoType.ElevationSide
                                  And Status <> gblOptionSets.JobPhoto.Status.Inactive
                              )
                          ) And !IsBlank(
                              LookUp(
                                  tblJobPhotos,
                                  Type = gblOptionSets.Global.PhotoType.ElevationRear
                                  And Status <> gblOptionSets.JobPhoto.Status.Inactive
                              )
                          )
                      )
                  },
                  {
                      Item: "Documents",
                      Message: With(
                          {
                              varJobDocsNotCompleted: CountRows(
                                  Filter(
                                      colCdsJobDocuments,
                                      appJobIdText = gblRecordJobCurrent.appJobIDText,
                                      Completed = gblOptionSets.JobDocument.Completed.No
                                  )
                              )
                          },
                          If(
                              varJobDocsNotCompleted > 0,
                              varJobDocsNotCompleted & " required document(s) have not been signed for this job",
                              "Completed"
                          )
                      ),
                      Success: With(
                          {
                              varJobDocsNotCompleted: CountRows(
                                  Filter(
                                      colCdsJobDocuments,
                                      appJobIdText = gblRecordJobCurrent.appJobIDText,
                                      Completed = gblOptionSets.JobDocument.Completed.No
                                  )
                              )
                          },
                          varJobDocsNotCompleted = 0
                      )
                  },
                  {
                      Item: "Overview",
                      Message: With({varCountNotes: CountRows(Filter([!IsBlank(gblRecordJobCurrent.'Overview: Style Of Home'),!IsBlank(gblRecordJobCurrent.'Overview: Construction'),!IsBlank(gblRecordJobCurrent.'Overview: Exterior Covering'),!IsBlank(gblRecordJobCurrent.'Overview: Exterior Capping'),!IsBlank(gblRecordJobCurrent.'Overview: Existing Windows'),!IsBlank(gblRecordJobCurrent.'Overview: Special Equipment Needed'),!IsBlank(gblRecordJobCurrent.'Overview: Special Conditions'),!IsBlank(gblRecordJobCurrent.'Overview: Notes')], !Value))}, If(varCountNotes>0, varCountNotes&" note(s) have not been filled in", "Completed")),
                      Success: !IsBlank(gblRecordJobCurrent.'Overview: Style Of Home') And !IsBlank(gblRecordJobCurrent.'Overview: Construction') And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Covering') And !IsBlank(gblRecordJobCurrent.'Overview: Exterior Capping') And !IsBlank(gblRecordJobCurrent.'Overview: Existing Windows') And !IsBlank(gblRecordJobCurrent.'Overview: Special Equipment Needed') And !IsBlank(gblRecordJobCurrent.'Overview: Special Conditions') And !IsBlank(gblRecordJobCurrent.'Overview: Notes')
                  }
              )
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: =
            ShowScrollbar: =false
            TabIndex: =0
            TemplateFill: =Color.Transparent//If(txt_Homeowner_Dealer_1.Text=ThisItem.Value, gblAppStyles.Status.Neutral, gblAppStyles.Rolodex.Fill)
            TemplateSize: =64
            Visible: =!IsEmpty(gal_FinalSteps.AllItems)
            Width: =944
            X: =80
            Y: =210
          Children:
            - btn_Labor_Items__Quantity_1:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =Color.Transparent
                  BorderThickness: =0
                  Color: =gblAppStyles.Text.Color
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =gblAppColors.Primary.White
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =FontWeight.Normal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =5
                  RadiusBottomRight: =Self.RadiusBottomLeft
                  RadiusTopLeft: =Self.RadiusBottomLeft
                  RadiusTopRight: =Self.RadiusBottomLeft
                  Size: =gblAppStyles.Text.Size
                  Text: =ThisItem.Item
                  Width: =180
                  X: =106
                  Y: =7
            - btn_Labor_Items__Description_1:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =TextPosition.Left
                  BorderColor: =Color.Transparent
                  BorderStyle: =BorderStyle.None
                  BorderThickness: =0
                  Color: =gblAppStyles.Text.Color
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =Color.White
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =FontWeight.Normal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: =
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =5
                  RadiusBottomRight: =Self.RadiusBottomLeft
                  RadiusTopLeft: =Self.RadiusBottomLeft
                  RadiusTopRight: =Self.RadiusBottomLeft
                  Size: =gblAppStyles.Text.Size
                  Text: =ThisItem.Message
                  Width: =584
                  X: =301
                  Y: =7
            - btn_FinalSteps_Status_5:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =gblAppStyles.ActionsMenu.QuantityBorderThickness
                  Color: =Color.White//If(ThisItem.Completed, gblAppColors.Secondary.White,gblAppStyles.ActionsMenu.Color)

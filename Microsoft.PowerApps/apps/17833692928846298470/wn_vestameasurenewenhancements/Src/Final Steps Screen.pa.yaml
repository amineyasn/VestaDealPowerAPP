      - lbl_FinalSteps_Items__Header:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            OnSelect: =
            Text: ="        Status                   Items                       Message"
            Width: =944

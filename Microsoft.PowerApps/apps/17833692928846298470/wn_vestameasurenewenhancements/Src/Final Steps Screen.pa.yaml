                  Text: ="Finishing the job will change its status to completed and upload measurements information.  Are you sure you want to proceed?"
                  VerticalAlign: =VerticalAlign.Top
                  Width: =btn_FinalSteps_Confirm__Base.Width
                  X: =btn_FinalSteps_Confirm__Title.X
                  Y: =btn_FinalSteps_Confirm__Title.Y+btn_FinalSteps_Confirm__Title.Height
            - btn_FinalSteps_Confirm__OK:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisplayMode: =If(locBlockUserInput,DisplayMode.View, DisplayMode.Edit)
                  Fill: =gblAppStyles.Status.Success
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =ColorFade(Self.Fill, -10%)
                  OnSelect: |-
                    =// Block user input
                    UpdateContext({locBlockUserInput: true});
                    // Go to save screen and save only the current job
                    Set(
                        gblRecordJobCurrent,
                        Patch(
                            colCdsJobs,
                            LookUp(
                                colCdsJobs,
                                appJobIDText = gblRecordJobCurrent.appJobIDText
                            ),
                            {
                                Completed: gblOptionSets.Job.CompletedJob.Yes,
                                'Job Finished: Send Email?': gblOptionSets.Job.JobFinishedSendEmail.Yes,
                                'Job Package: Send Documents?': gblOptionSets.Job.JobPackageSendDocuments.Yes,
                                'Lead Test: Send Document?': If(
                                    tog_FinalSteps_SendEmail.Value,
                                    gblOptionSets.Job.LeadTestSendDocuments.Yes,
                                    gblOptionSets.Job.LeadTestSendDocuments.No
                                )
                            }
                        )
                    );
                    With(
                        {
                            varType: "colCdsJobs",
                            varRecordRef: gblRecordJobCurrent.Job
                        },
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    Set(gblTextClickedSaveScreen, "Jobs Screen");
                    Navigate(
                        'Saving Screen',
                        ScreenTransition.Fade,
                        {
                            locSaveText: "Saving job to Vesta Data"
                        }
                    );
                    UpdateContext({locBlockUserInput: false});
                  PressedBorderColor: =Self.Fill
                  PressedFill: =ColorFade(Self.Fill,-30%)
                  RadiusBottomLeft: =5
                  RadiusBottomRight: =5
                  RadiusTopLeft: =5
                  RadiusTopRight: =5
                  Size: =20
                  Text: ="OK"
                  Width: =164
                  X: =btn_FinalSteps_Confirm__Base.X+btn_FinalSteps_Confirm__Base.Width-Self.Width-30

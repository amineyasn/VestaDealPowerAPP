Screens:
  Add Note Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: =Reset(txt_AddNote_Note);
      OnVisible: =SetFocus(txt_AddNote_Note)
    Children:
      - cmp_AddNote_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Notes"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =App.Height-cmp_AddNote_Titlebar.Height
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =cmp_AddNote_Titlebar.Y+cmp_AddNote_Titlebar.Height
      - cmp_AddNote_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: =locRecordNoteCurrent.BackScreen
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - lbl_AddNote_Title__Title:
          Control: Label@2.5.1
          Properties:
            Align: =TextPosition.Left
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =gblAppStyles.Text.Font
            Height: =50
            PaddingRight: =8
            Size: =gblAppStyles.Text.SubtitleSize
            Text: ="Note"
            Width: =136
            X: =114
            Y: =175
      - txt_AddNote_Note:
          Control: Classic/TextInput@2.3.2
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            BorderStyle: =BorderStyle.None
            Color: =gblAppStyles.Text.Color
            Default: =locRecordNoteCurrent.Notes
            DisplayMode: |-
              =If(
                  gblRecordJobCurrent.Completed = 'Completed (Jobs)'.No,
                  DisplayMode.Edit,
                  DisplayMode.View
              )
            EnableSpellCheck: =true
            Font: =gblAppStyles.Text.Font
            Height: =385
            HintText: ="Write a note here"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            LineHeight: =1.5
            MaxLength: =2000
            Mode: =TextMode.MultiLine
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =16
            Width: =739
            X: =250
            Y: =175
      - lbl_AddNote_Title:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Segoe UI'
            Size: =gblAppStyles.Text.TitleSize
            Text: =If(!IsBlank(locRecordNoteCurrent.Notes),  "Edit Note",  "Add Note")
            Width: =664
            X: =180//cmp_Labor_Sidebar.X+cmp_Labor_Sidebar.Width+30
            Y: =cmp_AddNote_Titlebar.Y+cmp_AddNote_Titlebar.Height+30
      - ico_AddNote_Title:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Disabled
            Height: =49
            Icon: =Icon.Note
            Width: =49
            X: =110*1
            Y: =85*1
      - cmp_AddNote_Save:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.ArrowRight}
            IconColor: =Color.White
            IconFill: =If(gblRecordJobCurrent.Completed='Completed (Jobs)'.No, gblAppColors.Secondary.Green, gblAppStyles.Status.Disabled)
            NavigateScreen: =
            Text: =If(gblRecordJobCurrent.Completed='Completed (Jobs)'.No, "Save Note", "Close Note")
            Width: =221
            X: =767
            Y: =670
      - btn_AddNote_Save:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =cmp_AddNote_Save.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            OnSelect: "=// save note to the collection\nSwitch(\n    locRecordNoteCurrent.TableName,\n    //JOBS\n    \"Jobs\",\n    With(\n        {\n            varType: \"colCdsJobs\",\n            varRecordRef: locRecordNoteCurrent.GUID\n        },\n        Set(\n            gblRecordJobCurrent,\n            Patch(\n                colCdsJobs,\n                LookUp(\n                    colCdsJobs,\n                    Job = varRecordRef\n                ),\n                {'Overview: Notes': txt_AddNote_Note.Text}\n            )\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef= varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    );\n    // save local data\n \n    If(\n        gblAppLoadOffline,\n        SaveData(\n            colCdsJobs,\n            \"localCdsJobs\"\n        )\n    ),\n    //JOB ENTRIES\n    \"Job Entries\",\n    With(\n        {\n            varType: \"colCdsJobEntries\",\n            varRecordRef: locRecordNoteCurrent.GUID\n        },\n        Patch(\n            colCdsJobEntries,\n            LookUp(\n                colCdsJobEntries,\n                'Job Entry' = varRecordRef\n            ),\n            {Notes: txt_AddNote_Note.Text}\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef= varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    );\n    // save local data\n    If(\n        gblAppLoadOffline,\n        SaveData(\n            colCdsJobEntries,\n            \"localCdsJobEntries\"\n        )\n    ),\n    //JOB ENTRY SELECTIONS\n    \"Job Entry Selections\",\n    With(\n        {\n            varType: \"colCdsJobEntrySelections\",\n            varRecordRef: locRecordNoteCurrent.GUID\n        },\n        Set(\n            gblRecordJobEntrySelection,\n            Patch(\n                colCdsJobEntrySelections,\n                LookUp(\n                    colCdsJobEntrySelections,\n                    'Job Entry Selection' = varRecordRef\n                ),\n                {Notes: txt_AddNote_Note.Text}\n            )\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef= varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    );\n    // save local data\n    If(\n        gblAppLoadOffline,\n        SaveData(\n            colCdsJobEntrySelections,\n            \"localCdsJobEntrySelections\"\n        )\n    ),\n    //JOB LABOR ITEMS\n    \"Job Labor Items\",\n    With(\n        {\n            varType: \"colCdsJobLaborItems\",\n            varRecordRef: locRecordNoteCurrent.GUID\n        },\n        Patch(\n            colCdsJobLaborItems,\n            LookUp(\n                colCdsJobLaborItems,\n                'Job Labor Item' = locRecordNoteCurrent.GUID\n            ),\n            {Notes: txt_AddNote_Note.Text}\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef= varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    );\n    // save local data\n    If(\n        gblAppLoadOffline,\n        SaveData(\n            colCdsJobLaborItems,\n            \"localCdsJobLaborItems\"\n        )\n    ),\n    //JOB MATERIAL ITEMS\n    \"Job Material Items\",\n    With(\n        {\n            varType: \"colCdsJobMaterialItems\",\n            varRecordRef: locRecordNoteCurrent.GUID\n        },\n        Patch(\n            colCdsJobMaterialItems,\n            LookUp(\n                colCdsJobMaterialItems,\n                'Job Material Item' = locRecordNoteCurrent.GUID\n            ),\n            {Notes: txt_AddNote_Note.Text}\n        );\n        If(\n            IsBlank(\n                LookUp(\n                    colAUDRecords,\n                    Type = varType\n                    And RecordRef= varRecordRef\n                )\n            ),\n            Collect(\n                colAUDRecords,\n                {\n                    Type: varType,\n                    RecordRef: varRecordRef,\n                    Job: gblRecordJobCurrent.Job,\n                    Operation: \"U\"\n                }\n            )\n        )\n    );\n    // save local data\n    \n    If(\n        gblAppLoadOffline,\n        SaveData(\n            colCdsJobMaterialItems,\n            \"localCdsJobMaterialItems\"\n        )\n    )\n);\n// save local data\n\nIfError( // This line of code is added to hide the errors\nIf(\n    gblAppLoadOffline,\n    SaveData(\n        colAUDRecords,\n        \"localAUDRecords\"\n    )\n)\n,Blank())  // This line of code is added to hide the errors\n;\n// go back to the previous screen\nNavigate(locRecordNoteCurrent.BackScreen);\n"
            PressedBorderColor: =Self.Fill
            PressedFill: =Self.Fill
            Text: =""
            Visible: =cmp_AddNote_Save.Visible
            Width: =cmp_AddNote_Save.Width
            X: =cmp_AddNote_Save.X
            Y: =cmp_AddNote_Save.Y
      - cmp_AddNote_Delete:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Trash}
            IconColor: =Color.White
            IconFill: =gblAppStyles.Status.Danger
            NavigateScreen: =
            Text: ="Delete Note"
            Visible: =gblRecordJobCurrent.Completed='Completed (Jobs)'.No
            Width: =237
            X: =115
            Y: =670
      - btn_AddNote_Delete:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Font: =Font.'Open Sans'
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =Self.Fill
            OnSelect: |
              =// save note to the collection
              Switch(
                  locRecordNoteCurrent.TableName,
                  "Jobs",
                  With(
                      {
                          varType: "colCdsJobs",
                          varRecordRef: locRecordNoteCurrent.GUID
                      },
                      Patch(
                          colCdsJobs,
                          LookUp(
                              colCdsJobs,
                              Job = varRecordRef
                          ),
                          {'Notes (wn_notes)': Blank()}
                      );
                      If(
                          IsBlank(
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef= varRecordRef
                              )
                          ),
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "U"
                              }
                          )
                      )
                  );
                  // save local data
                  If(
                      gblAppLoadOffline,
                      SaveData(
                          colCdsJobs,
                          "localCdsJobs"
                      )
                  ),
                  "Job Entries",
                  With(
                      {
                          varType: "colCdsJobEntries",
                          varRecordRef: locRecordNoteCurrent.GUID
                      },
                      Patch(
                          colCdsJobEntries,
                          LookUp(
                              colCdsJobEntries,
                              'Job Entry' = varRecordRef
                          ),
                          {Notes: Blank()}
                      );
                      If(
                          IsBlank(
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef= varRecordRef
                              )
                          ),
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "U"
                              }
                          )
                      )
                  );
                  // save local data
                  If(
                      gblAppLoadOffline,
                      SaveData(
                          colCdsJobEntries,
                          "localCdsJobEntries"
                      )
                  ),
                  "Job Entry Selections",
                  With(
                      {
                          varType: "colCdsJobEntrySelections",
                          varRecordRef: locRecordNoteCurrent.GUID
                      },
                      Patch(
                          colCdsJobEntrySelections,
                          LookUp(
                              colCdsJobEntrySelections,
                              'Job Entry Selection' = varRecordRef
                          ),
                          {Notes: Blank()}
                      );
                      If(
                          IsBlank(
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef= varRecordRef
                              )
                          ),
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "U"
                              }
                          )
                      )
                  );
                  // save local data
                  If(
                      gblAppLoadOffline,
                      SaveData(
                          colCdsJobEntrySelections,
                          "localCdsJobEntrySelections"
                      )
                  ),
                  "Job Labor Items",
                  With(
                      {
                          varType: "colCdsJobLaborItems",
                          varRecordRef: locRecordNoteCurrent.GUID
                      },
                      Patch(
                          colCdsJobLaborItems,
                          LookUp(
                              colCdsJobLaborItems,
                              'Job Labor Item' = locRecordNoteCurrent.GUID
                          ),
                          {Notes: Blank()}
                      );
                      If(
                          IsBlank(
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef= varRecordRef
                              )
                          ),
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "U"
                              }
                          )
                      )
                  );
                  // save local data
                  If(
                      gblAppLoadOffline,
                      SaveData(
                          colCdsJobLaborItems,
                          "localCdsJobLaborItems"
                      )
                  ),
                  "Job Material Items",
                  With(
                      {
                          varType: "colCdsJobMaterialItems",
                          varRecordRef: locRecordNoteCurrent.GUID
                      },
                      Patch(
                          colCdsJobMaterialItems,
                          LookUp(
                              colCdsJobMaterialItems,
                              'Job Material Item' = locRecordNoteCurrent.GUID
                          ),
                          {Notes: Blank()}
                      );
                      If(
                          IsBlank(
                              LookUp(
                                  colAUDRecords,
                                  Type = varType
                                  And RecordRef= varRecordRef
                              )
                          ),
                          Collect(
                              colAUDRecords,
                              {
                                  Type: varType,
                                  RecordRef: varRecordRef,
                                  Job: gblRecordJobCurrent.Job,
                                  Operation: "U"
                              }
                          )
                      )
                  );
                  // save local data
                  If(
                      gblAppLoadOffline,
                      SaveData(
                          colCdsJobMaterialItems,
                          "localCdsJobMaterialItems"
                      )
                  )
              );
              // save local data
              If(
                  gblAppLoadOffline,
                  SaveData(
                      colAUDRecords,
                      "localAUDRecords"
                  )
              );
              // go back to the previous screen
              Navigate(locRecordNoteCurrent.BackScreen);
            PressedBorderColor: =Self.Fill
            PressedFill: =Self.Fill
            Text: =""
            Visible: =cmp_AddNote_Delete.Visible
            Width: =237
            X: =115
            Y: =670

Screens:
  Incorrect Version Screen:
    Properties:
      Fill: =gblAppColors.Primary.WhiteSmoke
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - img_IncorrectApp_Spinner:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =132
            Image: =Image_IssueSpinner
            Width: =132
            X: =(Parent.Width - Self.Width) / 2
            Y: =((Parent.Height - Self.Height) / 2) - 44
      - lbl_IncorrectApp_VestaMeasure:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =Color.Black
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Height: =88
            Size: =32
            Text: ="Vesta Measure"
            VerticalAlign: =VerticalAlign.Bottom
            Width: =1024
            Y: =img_IncorrectApp_Spinner.Y + img_IncorrectApp_Spinner.Height
      - lbl_IncorrectApp_MainText:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppColors.Secondary.Red
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            Height: =80
            Size: =20
            Text: ="Oops! Looks like you're not on the latest version"
            VerticalAlign: =VerticalAlign.Top
            Width: =1024
            Y: =lbl_IncorrectApp_VestaMeasure.Y + lbl_IncorrectApp_VestaMeasure.Height
      - icn_IncorrectVersion_PromptClose:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Info
            Icon: =Icon.ArrowRight
            Visible: =locShowPrompts
            X: =20
            Y: =196
      - lbl_IncorrectVersion_PromptClose:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Info
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =52
            PaddingLeft: =0
            Size: =20
            Text: ="Swipe to close, and re-open"
            VerticalAlign: =VerticalAlign.Top
            Visible: =locShowPrompts
            Width: =390
            X: =20
            Y: =260
      - inc_IncorrectVersion_PromptUpdate:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Success
            Icon: =Icon.ArrowUp
            Visible: =locShowPrompts
            X: =480
            Y: =40
      - lbl_IncorrectVersion_PromptUpdate:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Success
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =64
            Size: =20
            Text: ="If shown, click the prompt to update"
            Visible: =locShowPrompts
            Width: =480
            X: =544
            Y: =40
      - tmr_IncorrectVersion:
          Control: Timer@2.1.0
          Properties:
            AutoStart: =true
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Duration: =3000
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =0
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(Color.Transparent, -20%)
            OnTimerEnd: |-
              =UpdateContext({locShowPrompts: true})
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Width: =0

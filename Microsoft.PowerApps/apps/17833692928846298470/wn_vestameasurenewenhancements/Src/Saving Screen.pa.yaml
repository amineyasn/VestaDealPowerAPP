Screens:
  Saving Screen:
    Properties:
      Fill: =gblAppColors.Primary.WhiteSmoke
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =UpdateContext({locShowPopUp: ""});
        Clear(colSaveProgress);
        Clear(colProgressBar);
        Clear(colParentRecords);
      OnVisible: |
        =UpdateContext({locBoolean_ShowSavePrompt: false});
        If(
            gblAppAutoload,
            Select(btn_Saving_Start)
        );
    Children:
      - cmp_Saving_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: =
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - img_Saving_Spinner:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =132
            Image: =Image_SavingSpinner
            Visible: =true//gblAppAutoload
            Width: =132
            X: =(Parent.Width - Self.Width) / 2
            Y: =((Parent.Height - Self.Height) / 2) - 44
      - lbl_Saving_VestaMeasure:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =Color.Black
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Height: =88
            Size: =32
            Text: ="Vesta Measure"
            VerticalAlign: =VerticalAlign.Bottom
            Visible: =true//gblAppAutoload
            Width: =1024
            Y: =img_Saving_Spinner.Y + img_Saving_Spinner.Height
      - lbl_Saving_CurrentActivity:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppColors.Secondary.GrayMediumDark
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Height: =80
            Size: =20
            Text: =Last(colSaveProgress).ProgressText
            VerticalAlign: =VerticalAlign.Top
            Visible: =true//gblAppAutoload
            Width: =1024
            Y: =lbl_Saving_VestaMeasure.Y + lbl_Saving_VestaMeasure.Height
      - btn_Saving_SaveRecords:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =DisplayMode.Disabled
            Fill: =RGBA(255, 191, 0, 1)
            Font: =Font.'Open Sans'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: =
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Save Job"
            Visible: =!gblAppAutoload
            X: =20
            Y: =10
      - tmr_Saving_Navigate:
          Control: Timer@2.1.0
          Properties:
            AutoStart: =locStartTimer
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Duration: =1500
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =0
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =Color.Transparent
            OnTimerEnd: |
              =Navigate(
                  'Loading Screen',
                  ScreenTransition.Fade,
                  {locLoadingSkipLocal: true}
              );
              UpdateContext({locStartTimer: false});
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Width: =0
            X: =217
            Y: =10
      - con_Saving_Steps:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =708
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            LayoutOverflowY: =LayoutOverflow.Scroll
            PaddingLeft: =10
            PaddingRight: =10
            PaddingTop: =10
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =!gblAppAutoload
            Width: =230
            Y: =60
          Children:
            - btn_Saving_Start:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |-
                    =// Start
                    Collect(
                        colSaveProgress,
                        {
                            ProgressValue: 0,
                            ProgressText: "Saving Your Data"
                        }
                    );
                    Clear(colProgressBar);
                    ForAll(
                        Sequence(CountRows(colAUDRecords)+1),
                        Collect(
                            colProgressBar,
                            {Saved: false}
                        )
                    );
                    If(
                        Connection.Connected,
                        // Next Step
                        If(
                            gblAppAutoAdvance,
                            Select(btn_Saving_Add__JobRooms)
                        ),
                        UpdateContext({locShowPopUp: "Not Connected"})
                    )
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="Start"
                  Width: =Parent.Width - (2* Self.X)
                  X: =10
                  Y: =10
            - btn_Saving_Add__JobRooms:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =// Create Job Rooms
                    With(
                        {
                            // Get job rooms with add operation
                            varJobRooms:
                                Filter(
                                    colCdsJobRooms,
                                    'Job Room' in Filter(
                                        colAUDRecords,
                                        Type = "colCdsJobRooms",
                                        Operation = "A"
                                    ).RecordRef
                                )
                        },
                        If(
                            !IsEmpty(varJobRooms),
                            // Collect Progress Record
                            Collect(
                                colSaveProgress,
                                {
                                    ProgressValue: 1,
                                    ProgressText: "Creating Job Rooms"
                                }
                            );
                            Clear(colParentRecords);
                            ForAll(
                                // Filter records to be added
                                varJobRooms As tblRecordLoop,
                                With(
                                    {
                                        // Write new records to datasource, excluding certain columns
                                        varNewRecord: Patch(
                                            'Job Rooms',
                                            Defaults('Job Rooms'),
                                            First(
                                                DropColumns(
                                                    Table(tblRecordLoop),
                                                    appJobIdText,
                                                    appJobRoomIdText,
                                                    'Job Room'
                                                )
                                            )
                                        )
                                    },
                                    If(
                                        IsEmpty(Errors('Job Rooms')),
                                        Collect(
                                            colParentRecords,
                                            {
                                                Type: "colCdsJobRooms",
                                                OriginalGUID: tblRecordLoop.'Job Room',
                                                NewGUID: varNewRecord.'Job Room'
                                            }
                                        )
                                    )
                                )
                            );
                            // Update Child Records for new reference
                            Refresh('Job Rooms');       
                            ForAll(
                                colParentRecords,
                                With(
                                    {varParentRecord: LookUp('Job Rooms', 'Job Room'=colParentRecords[@NewGUID])},
                                    // Update Job Room GUID
                                    Patch(
                                        colCdsJobRooms,
                                        LookUp(colCdsJobRooms, 'Job Room'=colParentRecords[@OriginalGUID]),
                                        varParentRecord
                                    );
                                    // Update Child Records for new reference
                                    // Job Entries
                                    UpdateIf(
                                        colCdsJobEntries,
                                        'Job Room'.'Job Room' = colParentRecords[@OriginalGUID],
                                        {'Job Room': varParentRecord}
                                    );
                                    // Window Mulls
                                    UpdateIf(
                                        colCdsWindowMulls,
                                        'Job Room'.'Job Room' = colParentRecords[@OriginalGUID],
                                        {'Job Room': varParentRecord}
                                    )
                                );
                                // Remove from collection of records which would be processed
                                RemoveIf(
                                    colAUDRecords,
                                    And(
                                        Type = "colCdsJobRooms",
                                        RecordRef = colParentRecords[@OriginalGUID],
                                        Operation = "A"
                                    )
                                );
                            );
                            // update progress bar
                            Update(
                                colProgressBar,
                                LookUp(colProgressBar, Not(Saved)),
                                {Saved: true}
                            )
                        );
                        // Save Data
                        If(
                            gblAppLoadOffline,
                            SaveData(
                                colAUDRecords,
                                "localAUDRecords"
                            );
                            SaveData(
                                colCdsJobRooms,
                                "localCdsJobRooms"
                            );
                            SaveData(
                                colCdsJobEntries,
                                "localCdsJobEntries"
                            );
                            SaveData(
                                colCdsWindowMulls,
                                "localCdsWindowMulls"
                            );
                        )
                    );
                    // Next Step
                    If(
                        gblAppAutoAdvance,
                        Select(btn_Saving_Add__JobEntries)
                    );
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="+ Job Rooms"
                  Width: =Parent.Width - (2* Self.X)
                  X: =10
                  Y: =10
            - btn_Saving_Add__JobEntries:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |-
                    =// Create Job Entries
                    With(
                        {
                            varJobEntries:
                                Filter(
                                    colCdsJobEntries,
                                    'Job Entry' in Filter(
                                        colAUDRecords,
                                        Type = "colCdsJobEntries",
                                        Operation = "A"
                                    ).RecordRef,
                                    !('Job Room'.'Job Room' in Filter(colAUDRecords, Type="colCdsJobRooms").RecordRef),
                                    !('Window Mull'.'Window Mulls' in Filter(colAUDRecords, Type="colCdsWindowMulls").RecordRef)
                                )
                        },
                        If(
                            !IsEmpty(varJobEntries),
                            // Collect Progress Record
                            Collect(
                                colSaveProgress,
                                {
                                    ProgressValue: 2,
                                    ProgressText: "Creating Job Entries"
                                }
                            );
                            Clear(colParentRecords);
                            ForAll(
                                // For all records to be added, excluding columns which should not be used in Add
                                varJobEntries As tblRecordLoop,
                                With(
                                    { 
                                        // Write new records to datasource
                                        varNewRecord: Patch(
                                            'Job Entries',
                                            Defaults('Job Entries'),
                                            First(
                                                DropColumns(
                                                    Table(tblRecordLoop),
                                                    appFields,
                                                    appJobIdText,
                                                    appJobRoomIdText,
                                                    '''Window Choice''',
                                                    'Job Entry',
                                                    'Measurement (Sales)',
                                                    'Measurement (Tech)'
                                                )
                                            )
                                        )
                                    },
                                    If(
                                        IsEmpty(Errors('Job Entries')),
                                        Collect(
                                            colParentRecords,
                                            {
                                                Type: "colCdsJobEntries",
                                                OriginalGUID: tblRecordLoop.'Job Entry',
                                                NewGUID: varNewRecord.'Job Entry'
                                            }
                                        )
                                    );
                                    If(
                                        !IsEmpty(Errors('Job Entries')),
                                        Notify($"Job Entries: {First(Errors('Job Entries')).Error} {First(Errors('Job Entries')).Message} {First(Errors('Job Entries')).Column}")
                                    )
                                )
                            );
                            //// Update child records with new parent GUID 
                            Refresh('Job Entries');
                            ForAll(
                                colParentRecords,
                                With(
                                    {varParentRecord: LookUp('Job Entries', 'Job Entry'=colParentRecords[@NewGUID])},
                                    // Update job entries GUID
                                    Patch(
                                        colCdsJobEntries,
                                        LookUp(colCdsJobEntries, 'Job Entry'=colParentRecords[@OriginalGUID]),
                                        varParentRecord
                                    );
                                    // Job Entry Selections
                                    UpdateIf(
                                        colCdsJobEntrySelections,
                                        'Job Entry'.'Job Entry' = colParentRecords[@OriginalGUID],
                                        {'Job Entry': varParentRecord}
                                    );
                                    // Job Photos
                                    UpdateIf(
                                        colCdsJobPhotos,
                                        'Job Entry'.'Job Entry' = colParentRecords[@OriginalGUID],
                                        {'Job Entry': varParentRecord}
                                    );
                                    // Window Measurements
                                    UpdateIf(
                                        colCdsWindowMeasurements,
                                        'Job Entry'.'Job Entry' = colParentRecords[@OriginalGUID],
                                        {'Job Entry': varParentRecord}
                                    );
                                    // Window Mulls
                                    UpdateIf(
                                        colCdsWindowMeasurements,
                                        'Job Entry'.'Job Entry' = colParentRecords[@OriginalGUID],
                                        {'Job Entry': varParentRecord}
                                    );
                                    // Remove from list of new records
                                    RemoveIf(
                                        colAUDRecords,
                                        And(
                                            Type = "colCdsJobEntries",
                                            RecordRef = colParentRecords[@OriginalGUID],
                                            Operation = "A"
                                        )
                                    )
                                )
                            );
                            // update progress bar
                            Update(
                                colProgressBar,
                                LookUp(colProgressBar, Not(Saved)),
                                {Saved: true}
                            )
                        );
                        // Save Data
                        IfError( // This line of code is added to hide the errors

                        If(
                            gblAppLoadOffline,
                            SaveData(
                                colAUDRecords,
                                "localAUDRecords"
                            );
                            SaveData(
                                colCdsJobEntries,
                                "localCdsJobEntries"
                            );
                            SaveData(
                                colCdsJobEntrySelections,
                                "localCdsJobEntrySelections"
                            );
                            SaveData(
                                colCdsJobPhotos,
                                "localCdsJobPhotos"
                            );
                            SaveData(
                                colCdsWindowMeasurements,
                                "localCdsWindowMeasurements"
                            );
                        )
                        ,Blank())  // This line of code is added to hide the errors
                    );
                    // Next Step
                    If(
                        gblAppAutoAdvance,
                        Select(btn_Saving_Add__WindowMulls)
                    );
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="+ Job Entries"
                  Width: =Parent.Width - (2* Self.X)
                  X: '=10  '
                  Y: =60
            - btn_Saving_Add__WindowMulls:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =// Create Window Mulls
                    With(
                        {
                            // Get window mulls with add operation
                            varWindowMulls:
                            Filter(
                                colCdsWindowMulls,
                                'Window Mulls' in Filter(
                                    colAUDRecords,
                                    Type = "colCdsWindowMulls",
                                    Operation = "A"
                                ).RecordRef,
                                !('Job Room'.'Job Room' in Filter(colAUDRecords, Type="colCdsJobRooms").RecordRef)
                            )
                        },
                        If(
                            !IsEmpty(varWindowMulls),
                            // Collect Progress Record
                            Collect(
                                colSaveProgress,
                                {
                                    ProgressValue: 2,
                                    ProgressText: "Creating Window Mulls"
                                }
                            );
                            Clear(colParentRecords);
                            // Process Add (Create) Records
                            ForAll(
                                // Filter records to be added
                                varWindowMulls As tblRecordLoop,
                                With(
                                    {
                                        // Write new records to datasource, excluding certain columns
                                        varNewRecord: Patch(
                                            'Window Mulls',
                                            Defaults('Window Mulls'),
                                            First(
                                                DropColumns(
                                                    Table(tblRecordLoop),
                                                    'Window Mulls',
                                                    appJobRoomIdText
                                                )
                                            )
                                        )
                                    },
                                    If(
                                        IsEmpty(Errors('Window Mulls')),
                                        Collect(
                                            colParentRecords,
                                            {
                                                Type: "colCdsWindowMulls",
                                                OriginalGUID: tblRecordLoop.'Window Mulls',
                                                NewGUID: varNewRecord.'Window Mulls'
                                            }
                                        )
                                    )
                                )
                            );
                            // Update Child Records for new reference
                            Refresh('Window Mulls');       
                            ForAll(
                                colParentRecords,
                                With(
                                    {varParentRecord: LookUp('Window Mulls', 'Window Mulls'=colParentRecords[@NewGUID])},
                                    // Update Window Mulls GUID
                                    Patch(
                                        colCdsWindowMulls,
                                        LookUp(colCdsWindowMulls, 'Window Mulls'=colParentRecords[@OriginalGUID]),
                                        varParentRecord
                                    );
                                    // Job Entries
                                    UpdateIf(
                                        colCdsJobEntries,
                                        'Window Mull'.'Window Mulls'=colParentRecords[@OriginalGUID],
                                        {'Window Mull': varParentRecord}
                                    );
                                    // Window Measurements
                                    UpdateIf(
                                        colCdsWindowMeasurements,
                                        'Window Mull'.'Window Mulls'=colParentRecords[@OriginalGUID],
                                        {'Window Mull': varParentRecord}
                                    );
                                    // Remove from collection of records which would be processed
                                    RemoveIf(
                                        colAUDRecords,
                                        And(
                                            Type = "colCdsWindowMulls",
                                            RecordRef = colParentRecords[@OriginalGUID],
                                            Operation = "A"
                                        )
                                    )
                                );
                                // update progress bar
                                Update(
                                    colProgressBar,
                                    LookUp(colProgressBar, Not(Saved)),
                                    {Saved: true}
                                )
                            );
                            // Save Data
                            If(
                                gblAppLoadOffline,
                                SaveData(
                                    colAUDRecords,
                                    "localAUDRecords"
                                );
                                SaveData(
                                    colCdsWindowMulls,
                                    "localCdsWindowMulls"
                                );
                                SaveData(
                                    colCdsJobEntries,
                                    "localCdsJobEntries"
                                );
                                SaveData(
                                    colCdsWindowMeasurements,
                                    "localCdsWindowMeasurements"
                                );
                            )
                        )
                    );
                    // Next Step
                    If(
                        gblAppAutoAdvance,
                        Select(btn_Saving_Add__JobEntrySelections)
                    );
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="+ Window Mulls"
                  Width: =Parent.Width - (2* Self.X)
                  X: =10
                  Y: =10
            - btn_Saving_Add__JobEntrySelections:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |-
                    =// Create Job Entry Selections
                    With(
                        {
                            varJobEntrySelections:
                                Filter(
                                    colCdsJobEntrySelections,
                                    'Job Entry Selection' in Filter(
                                        colAUDRecords,
                                        Type = "colCdsJobEntrySelections",
                                        Operation = "A"
                                    ).RecordRef,
                                    !('Job Entry'.'Job Entry' in Filter(colAUDRecords, Type="colCdsJobEntries").RecordRef)
                                )
                        },
                        If(
                            !IsEmpty(varJobEntrySelections),
                            // Collect Progress Record
                            Collect(
                                colSaveProgress,
                                {
                                    ProgressValue: 4,
                                    ProgressText: "Creating Job Entry Selections"
                                }
                            );
                            Clear(colParentRecords);
                            ForAll(
                                // For all records to be added, excluding columns which should not be used in Add
                                varJobEntrySelections As tblRecordLoop,
                                With(
                                    {
                                        // Write new records to datasource
                                        varNewRecord: Patch(
                                            'Job Entry Selections',
                                            Defaults('Job Entry Selections'),
                                            First(
                                                DropColumns(
                                                    Table(tblRecordLoop),
                                                    appAttributeName,
                                                    'Job Entry Selection'
                                                )
                                            )
                                        )
                                    },
                                    With(
                                        {varErrors: Errors('Job Entry Selections')}, 
                                        If(
                                            !IsEmpty(varErrors),
                                            Notify(
                                                First(varErrors).Error&Char(10)&
                                                First(varErrors).Record.'Job Entry Selection'&Char(10)&
                                                First(varErrors).Column&Char(10)&
                                                First(varErrors).Message
                                            )
                                        )
                                    );
                                    If(
                                        IsEmpty(Errors('Job Entry Selections')),
                                        Collect(
                                            colParentRecords,
                                            {
                                                Type: "colCdsJobEntrySelections",
                                                OriginalGUID: tblRecordLoop.'Job Entry Selection',
                                                NewGUID: varNewRecord.'Job Entry Selection'
                                            }
                                        )
                                    );
                                    If(
                                        !IsEmpty(Errors('Job Entry Selections')),
                                        Notify($"Job Entry Selections: {First(Errors('Job Entry Selections')).Error} {First(Errors('Job Entry Selections')).Message} {First(Errors('Job Entry Selections')).Column}")
                                    )
                                )
                            );
                            ForAll(
                                colParentRecords,
                                With(
                                    {varParentRecord: LookUp('Job Entry Selections', 'Job Entry Selection'=colParentRecords[@NewGUID])},
                                    // Update job entry selection GUID
                                    Patch(
                                        colCdsJobEntrySelections,
                                        LookUp(colCdsJobEntrySelections, 'Job Entry Selection'=colParentRecords[@OriginalGUID]),
                                        varParentRecord
                                    );
                                    // Remove from list of new records
                                    RemoveIf(
                                        colAUDRecords,
                                        And(
                                            Type = "colCdsJobEntrySelections",
                                            RecordRef = colParentRecords[@OriginalGUID],
                                            Operation = "A"
                                        )
                                    );
                                    // update progress bar
                                    Update(
                                        colProgressBar,
                                        LookUp(colProgressBar, Not(Saved)),
                                        {Saved: true}
                                    )
                                )
                            );
                            // Save Data
                            If(
                                gblAppLoadOffline,
                                SaveData(
                                    colAUDRecords,
                                    "localAUDRecords"
                                );
                                SaveData(
                                    colCdsJobEntrySelections,
                                    "localCdsJobEntrySelections"
                                )
                            );
                        )
                    );
                    If(
                        gblAppAutoAdvance,
                        Select(btn_Saving_Add__JobLaborItems)
                    );
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="+ JE Selections"
                  Width: =Parent.Width - (2* Self.X)
                  X: =10
                  Y: =50
            - btn_Saving_Add__JobLaborItems:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)

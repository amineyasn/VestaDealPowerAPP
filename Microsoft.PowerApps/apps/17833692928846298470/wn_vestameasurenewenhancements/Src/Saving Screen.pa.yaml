                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =// Create Job Photos
                    With(
                        {
                            varJobPhotos:
                                Filter(
                                    colCdsJobPhotos,
                                    'Job Photo' in Filter(
                                        colAUDRecords,
                                        Type = "colCdsJobPhotos",
                                        Operation = "A"
                                    ).RecordRef
                                )
                        },
                        If(
                            !IsEmpty(varJobPhotos),
                            // Collect Progress Record
                            Collect(
                                colSaveProgress,
                                {
                                    ProgressValue: 7,
                                    ProgressText: "Creating Job Photos"
                                }
                            );
                            Clear(colParentRecords);
                            // Process Add (Create) Records
                            ForAll(
                                // Filter records to be added
                                varJobPhotos As tblRecordLoop,
                                With(
                                    {
                                        // Write new records to datasource, excluding certain columns
                                        varNewRecord: Patch(
                                            'Job Photos',
                                            Defaults('Job Photos'),
                                            First(
                                                DropColumns(
                                                    Table(tblRecordLoop),
                                                    'Job Photo'
                                                )
                                            )
                                        )
                                    },
                                    If(
                                        IsEmpty(Errors('Job Photos')),
                                        Collect(
                                            colParentRecords,
                                            {
                                                Type: "colCdsJobPhotos",
                                                OriginalGUID: tblRecordLoop.'Job Photo',
                                                NewGUID: varNewRecord.'Job Photo'
                                            }
                                        )
                                    );
                                    If(
                                        !IsEmpty(Errors('Job Photos')),
                                        Notify($"Job Photos: {First(Errors('Job Photos')).Error} {First(Errors('Job Photos')).Message} {First(Errors('Job Photos')).Column}")
                                    )
                                )
                            );
                            ForAll(
                                colParentRecords,
                                // Update job photos GUID
                                Patch(
                                    colCdsJobPhotos,
                                    LookUp(colCdsJobPhotos, 'Job Photo'=colParentRecords[@OriginalGUID]),
                                    LookUp('Job Photos', 'Job Photo'=colParentRecords[@NewGUID])
                                );
                                    // Remove from collection of records which would be processed
                                    RemoveIf(
                                        colAUDRecords,
                                        And(
                                            Type = "colCdsJobPhotos",
                                            RecordRef = colParentRecords[@OriginalGUID],
                                            Operation = "A"
                                        )
                                );
                                // update progress bar
                                Update(
                                    colProgressBar,
                                    LookUp(colProgressBar, Not(Saved)),
                                    {Saved: true}
                                )
                            );
                            // Save Data
                            If(
                                gblAppLoadOffline,
                                SaveData(
                                    colAUDRecords,
                                    "localAUDRecords"
                                );
                                SaveData(
                                    colCdsJobPhotos,
                                    "localCdsJobPhotos"
                                )
                            )
                        )
                    );
                    // Next Step
                    If(
                        gblAppAutoAdvance,
                        Select(btn_Saving_Update__JobPhotos)
                    );
                  PaddingLeft: =20
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="+ Job Photos"
                  Width: =Parent.Width - (2* Self.X)
                  X: =10
                  Y: =10

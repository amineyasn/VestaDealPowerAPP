                  Font: =gblAppStyles.Text.TitleFont
                  FontWeight: =FontWeight.Lighter
                  Height: =150
                  HoverFill: =If(!(gal_Options_Selected.Selected.'Job Entry Option'=ThisItem.'Job Entry Option'), gblAppStyles.Card.HoverFill)
                  OnSelect: =Select(Parent)
                  PaddingLeft: =15
                  PaddingRight: =15
                  Size: =gblAppStyles.Card.TitleSize
                  Text: =ThisItem.Name
                  Width: =184
                  X: =15
                  Y: =15

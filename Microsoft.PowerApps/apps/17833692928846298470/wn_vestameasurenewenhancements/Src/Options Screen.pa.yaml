Screens:
  Options Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =// clear variables
        UpdateContext({locLoadingCompleted: true})
      OnVisible: |-
        =Clear(colJobEntryOptionHierarchy);
        UpdateContext(
            {
                locLoopCounter: 0,
                locLoopRepeat: true,
                locJobEntryRecord: LookUp(
                    AddColumns(
                        colCdsJobEntryOptions,
                        RowNumber,
                        locLoopCounter
                    ),
                    'Job Entry Option' = gblRecordJobEntryOption_Hierarchy.'Job Entry Option'
                ),
                locLoadingCompleted: false
            }
        );
    Children:
      - gal_Options_Selection:
          Control: Gallery@2.15.0
          Variant: Vertical
          Group: grp_Options_Select
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            Default: |-
              =LookUp(
                  colCdsJobEntryOptions,
                  'Job Entry Option' = LookUp(
                      colJobEntryOptionHierarchy,
                      RowNumber = gal_Options_Selected.Selected.RowNumber,
                      'Job Entry Option'
                  )
              )
            DelayItemLoading: =false
            Height: =615
            Items: |-
              =Filter(
                  colCdsJobEntryOptions,
                  'Parent Option'.'Job Entry Option' = gblRecordJobEntryOption_Hierarchy.'Parent Option'.'Job Entry Option'
              )
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |-
              =//Remove any row numbers lower than the current position
              ClearCollect(
                  colJobEntryOptionHierarchy,
                  Filter(
                      colJobEntryOptionHierarchy,
                      RowNumber >= gblRecordJobEntryOption_Hierarchy.RowNumber
                  )
              );
              Patch(
                  colJobEntryOptionHierarchy,
                  Last(
                      Sort(
                          colJobEntryOptionHierarchy,
                          RowNumber,
                          SortOrder.Descending
                      )
                  ),
                  ThisItem
              );
              // Add new row or update final row of left menu collection
              If(
                  Last(
                      Sort(
                          colJobEntryOptionHierarchy,
                          RowNumber,
                          SortOrder.Descending
                      )
                  ).Type <> gblOptionSets.JobEntryOption.Type.Value,
                  Patch(
                      colJobEntryOptionHierarchy,
                      Defaults(colJobEntryOptionHierarchy),
                      {RowNumber: gblRecordJobEntryOption_Hierarchy.RowNumber - 1}
                  )
              );
              // Go to the next step in the heirarchy
              If(
                  ThisItem.Type <> gblOptionSets.JobEntryOption.Type.Value,
                  Set(
                      gblRecordJobEntryOption_Hierarchy,
                      LookUp(
                          AddColumns(
                              colCdsJobEntryOptions,
                              RowNumber,
                              gblRecordJobEntryOption_Hierarchy.RowNumber - 1
                          ),
                          'Parent Option'.'Job Entry Option' = ThisItem.'Job Entry Option'
                      )
                  )
              );
              If(
                  ThisItem.Type = gblOptionSets.JobEntryOption.Type.Value,
                  UpdateContext(
                      {
                          locSelectedValue: LookUp(
                              colCdsJobEntryOptions,
                              colCdsJobEntryOptions[@'Job Entry Option'] = ThisItem.'Job Entry Option'
                          )
                      }
                  );
                  UpdateContext({locShowSaveButton: true});
              );
              Reset(gal_Options_Selected)
            TabIndex: =0
            TemplatePadding: =0
            TemplateSize: =180
            Width: =643
            WrapCount: =3
            X: =356
            Y: =153
          Children:
            - btn_Options_Selection:
                Control: Classic/Button@2.2.0
                Properties:
                  AutoDisableOnSelect: =false
                  BorderColor: =gblAppColors.Secondary.GrayMedium
                  BorderThickness: =1
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =If(gal_Options_Selected.Selected.'Job Entry Option'=ThisItem.'Job Entry Option', gblAppStyles.Status.Neutral, gblAppStyles.Card.Fill)
                  FocusedBorderThickness: =1
                  Font: =Font.'Open Sans'
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =ColorFade(Self.Fill,15%)
                  OnSelect: =Select(Parent)
                  PaddingRight: =3.75
                  PaddingTop: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: =ColorFade(Self.Fill,30%)
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =11.24
                  Text: =
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2
                  Y: =(Parent.TemplateHeight-Self.Height)/2
            - lbl_Options_Selection:
                Control: Label@2.5.1
                Properties:
                  Align: =LayoutAlignItems.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =If(gal_Options_Selected.Selected.'Job Entry Option'=ThisItem.'Job Entry Option', gblAppColors.Secondary.White,gblAppStyles.Card.TitleColor)

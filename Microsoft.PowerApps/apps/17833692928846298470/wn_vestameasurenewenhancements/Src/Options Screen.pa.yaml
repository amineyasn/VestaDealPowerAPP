      - tmr_Options_PopulateCollection:
          Control: Timer@2.1.0
          Properties:
            AutoStart: =locLoopRepeat
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Duration: =10
            Fill: =RGBA(56, 96, 178, 1)
            Font: =Font.'Open Sans'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnTimerEnd: "=// Increment Counter, Stop Timer (Repeat)\nUpdateContext(\n    {\n        locLoopCounter: locLoopCounter + 1,\n        locLoopRepeat: false\n    }\n);\n// Collect Current Option (either initial Value,or last loop)\nCollect(\n    colJobEntryOptionHierarchy,\n    locJobEntryRecord\n);\nPatch(\n    colJobEntryOptionHierarchy,\n    locJobEntryRecord,\n    {RowNumber: locLoopCounter}\n);\n// Lookup Parent (next) Option for the Current Option\nUpdateContext(\n    {\n        locJobEntryRecord_Next: LookUp(\n            colCdsJobEntryOptions,\n            'Job Entry Option' = locJobEntryRecord.'Parent Option'.'Job Entry Option'\n        )\n    }\n);\n// If we find a parent, then set it as the 'Current' Option for next loop, and restart timer (loop)\nIf(\n    !IsBlankOrError(locJobEntryRecord_Next) Or locLoopCounter > 20,\n    UpdateContext({locJobEntryRecord: locJobEntryRecord_Next});\n    Reset(tmr_Options_PopulateCollection);\n    UpdateContext({locLoopRepeat: true}),\n    // Else,no parent found,end looping\n    Reset(tmr_Options_PopulateCollection);\n    UpdateContext({locLoopRepeat: false});\n    // focus on last record\n    If(\n        Last(\n            Sort(\n                colJobEntryOptionHierarchy,\n                RowNumber,\n                SortOrder.Descending\n            )\n        ).Type = gblOptionSets.JobEntryOption.Type.Attribute,\n        Patch(\n            colJobEntryOptionHierarchy,\n            Defaults(colJobEntryOptionHierarchy),\n            {RowNumber: 0}\n        );\n        Set(\n            gblRecordJobEntryOption_Hierarchy,\n            LookUp(\n                AddColumns(\n                    colCdsJobEntryOptions,\n                    RowNumber,\n                    0\n                ),\n                'Parent Option'.'Job Entry Option' = gblRecordJobEntryOption_Hierarchy.'Job Entry Option'\n            )\n        ),\n        Set(\n            gblRecordJobEntryOption_Hierarchy,\n            Last(\n                Sort(\n                    colJobEntryOptionHierarchy,\n                    RowNumber,\n                    SortOrder.Descending\n                )\n            )\n        );\n        // TEST //\n        If(\n            gblRecordJobEntryOption_Hierarchy.Type = gblOptionSets.JobEntryOption.Type.Value,\n            UpdateContext(\n            {\n                locSelectedValue: LookUp(\n                    colCdsJobEntryOptions,\n                    colCdsJobEntryOptions[@'Job Entry Option'] = gblRecordJobEntryOption_Hierarchy.'Job Entry Option'\n                )\n            }\n        )\n        // TEST //\n    );\n    UpdateContext({locShowSaveButton: true});\n    );\n    UpdateContext({locLoadingCompleted: true});\n    \n);\n"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Repeat: =locLoopRepeat
            Text: =Self.Value
            Visible: =false
            X: =864
            Y: =728

Screens:
  Measure Window Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |
        =UpdateContext(
            {
                locBlockUserInput: false,
                locBlockTimerStart: false,
                locClickedWindowActionsMenu: false,
                locDeletedWindowMeasure: false,
                locShowMeasurement: "",
                locShowWindowActionsMenu: false
            }
        );
        Reset(tog_Measure_Exception);
      OnVisible: |-
        =If(
            locDeletedWindowMeasure,
            Select(gal_Measure_Select,2,btn_Measure_Select__Status);
            UpdateContext({locDeletedWindowMeasure: false});
        );
        ClearCollect(
            colNotCompletedWindows,
            Filter(
                colCdsWindowMeasurements,
                'Job Entry'.'Job Entry'=gblRecordJobEntryCurrent_.'Job Entry',
                !Completed,
                Type = gblOptionSets.WindowMeasurement.Type.Tech,
                Status <> gblOptionSets.WindowMeasurement.Status.Inactive
            )
        );
        // clear variables
        UpdateContext(
            {
                locShowMeasurement: ""
            }
        );
        //reset screen
        Reset(gal_Measure_WidthWhole);
        Reset(gal_Measure_WidthFraction);
        Reset(gal_Measure_HeightWhole);
        Reset(gal_Measure_HeightFraction);
    Children:
      - tmr_Measure_BlockUserInput:
          Control: Timer@2.1.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Duration: =150
            Fill: =RGBA(56, 96, 178, 1)
            Font: =Font.'Open Sans'
            Height: =28
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnTimerEnd: |-
              =UpdateContext({locBlockUserInput: false});
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Start: =locBlockUserInput And !locBlockTimerStart
            Visible: =false
            Width: =40
            X: =697
            Y: =724
      - cmp_Measure_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Project"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =708
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =60
      - cmp_Measure_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Rooms Screen'
            Color: =Color.White
            Context: |-
              =$"{gblRecordJobEntryCurrent_.'Room: Type'}, {gblRecordJobEntryCurrent_.'Room: Floor'}"
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - cmp_Measure_AdvanceButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.ArrowRight}
            IconColor: =Color.White
            IconFill: =If(gblRecordJobEntryCurrent_.Completed, gblAppColors.Secondary.GrayMedium, gblAppColors.Secondary.Green)
            NavigateScreen: =App.ActiveScreen
            Text: ="Go to Measures"
            Width: =257
            X: =Parent.Width - Self.Width - gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
      - btn_Measure_AdvanceButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =cmp_Measure_AdvanceButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Color.Transparent
            HoverFill: =Color.Transparent
            OnSelect: "=\n\n\n// assign tech measurement name\nWith(\n    {\n        varType: \"colCdsWindowMeasurements\",\n        varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'\n    }, \n   \n    Patch(\n        colCdsWindowMeasurements,\n        LookUp(colCdsWindowMeasurements, 'Window Measurement' = varRecordRef),\n        {\n            'Exception?': If(\n                tog_Measure_Exception.Value,\n                gblOptionSets.WindowMeasurement.Exception.Yes,\n                gblOptionSets.WindowMeasurement.Exception.No\n            ),\n            Name: Left(\n                Concatenate(\n                    \"Tech \",\n                    If(btn_Measure_Width.Text=\"Tap to select\", \"0\" , btn_Measure_Width.Text),\n                    \" x \",\n                    If(btn_Measure_Height.Text=\"Tap to select\", \"0\" , btn_Measure_Height.Text)\n                ),\n                50\n            ),\n            Width: gblMeasurementWidthWhole + gblMeasurementWidthFraction,\n            Height: gblMeasurementHeightWhole + gblMeasurementHeightFraction,\n            'United Inches (UI)': RoundUp(\n                    gblMeasurementWidthWhole + gblMeasurementWidthFraction + gblMeasurementHeightWhole + gblMeasurementHeightFraction,\n                    0\n            )\n        }\n    );\n    If(\n        IsBlank(\n            LookUp(\n                colAUDRecords,\n                Type = varType\n                And RecordRef = varRecordRef\n            )\n        ),\n        Collect(\n            colAUDRecords,\n            {\n                Type: varType,\n                RecordRef: varRecordRef,\n                Job: gblRecordJobCurrent.Job,\n                Operation: \"U\"\n            }\n        )\n    );\n    // update project side menu\n    Patch(\n        colProjectSidebar,\n        gblProjectSidebarItemCurrent,\n        {\n            Description: \"Tech Measurement\",\n            Title: $\"{btn_Measure_Width.Text} x {btn_Measure_Height.Text}\"\n        }\n    );\n    Set(\n        gblProjectSidebarItemCurrent,\n        LookUp(\n            colProjectSidebar,\n            ID=gblProjectSidebarItemCurrent.ID\n        )\n    );\n);\n\n\n// save local data\n\nIfError( // This line of code is added to hide the errors\n\nIf(\n    gblAppLoadOffline,\n    SaveData(\n        colAUDRecords,\n        \"localAUDRecords\"\n    );\n    SaveData(\n        colCdsWindowMeasurements,\n        \"localCdsWindowMeasurements\"\n    )\n)\n\n,Blank()) // This line of code is added to hide the errors\n;\nNavigate('Measurements Screen');\n"
            PressedBorderColor: =Self.Fill
            PressedColor: =Color.Transparent
            PressedFill: =Color.Transparent
            Text: |-
              =With({wCountRows: CountRows(colAddMaterialItems)}, "Add "&wCountRows&" Item"&If(wCountRows>1, "s"))
            Visible: =cmp_Measure_AdvanceButton.Visible
            Width: =cmp_Measure_AdvanceButton.Width
            X: =cmp_Measure_AdvanceButton.X*1
            Y: =cmp_Measure_AdvanceButton.Y*1
      - con_Measure_Height:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =CountRows(colMeasurementFractions)* (gal_Measure_HeightFraction.TemplateHeight + gal_Measure_HeightFraction.TemplatePadding)+ gal_Measure_HeightFraction.TemplatePadding
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width * .25
            X: =714
            Y: =165
          Children:
            - gal_Measure_HeightWhole:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Default: |-
                    =With(
                        {
                            varDefault: Switch(
                                locShowMeasurement,
                                "Height",
                                LookUp(
                                    colMeasureHeight,
                                    tblValue = RoundUp(
                                        ((Max(
                                            colMeasureHeight,
                                            tblValue
                                        ) + Min(
                                            colMeasureHeight,
                                            tblValue
                                        )) / 2),
                                        0
                                    )
                                ),
                                "Max Projection",
                                First(colMeasureMaxProjection),
                                "Wall Thickness",
                                First(colMeasureWallThickness)
                            ),
                            varActualTech: Switch(
                                locShowMeasurement,
                                "Height",
                                LookUp(
                                    colMeasureHeight,
                                    tblValue = gblMeasurementHeightWhole
                                ),
                                "Max Projection",
                                LookUp(
                                    colMeasureMaxProjection,
                                    tblValue = gblMeasurementMaxProjectionWhole
                                ),
                                "Wall Thickness",
                                LookUp(
                                    colMeasureWallThickness,
                                    tblValue = gblMeasurementWallThicknessWhole
                                )
                            ),
                            varActualSales: Switch(
                                locShowMeasurement,
                                "Height",
                                LookUp(
                                    colMeasureHeight,
                                    tblValue = RoundDown(
                                        gblRecordWindowMeasurement_Sales.Height,
                                        0
                                    )
                                ),
                                Blank()
                            )
                        },
                        Coalesce(
                            varActualTech,
                            varActualSales,
                            varDefault
                        )
                    )
                  DelayItemLoading: =false
                  FocusedBorderColor: =Color.Transparent
                  Height: =Parent.Height
                  Items: |-
                    =If(
                        tog_Measure_Exception.Value,
                        ForAll(
                            Sequence(300),
                            {tblValue: Value}
                        ),
                        Switch(
                            locShowMeasurement,
                            "Height",
                            Filter(
                                colMeasureHeight,
                                tblValue < (gblMeasurementMaxUI - RoundUp(
                                    gblMeasurementWidthWhole + gblMeasurementWidthFraction,
                                    0
                                ))
                            ),
                            "Max Projection",
                            colMeasureMaxProjection,
                            "Wall Thickness",
                            colMeasureWallThickness
                        )
                    )
                  LoadingSpinner: =LoadingSpinner.None
                  NavigationStep: =8
                  OnSelect: |
                    =// block user input
                    UpdateContext({locBlockTimerStart: true});
                    UpdateContext({locBlockUserInput: true});
                    Switch(
                        locShowMeasurement,
                        "Height",
                        Set(
                            gblMeasurementHeightWhole,
                            ThisItem.tblValue
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                Name: Left(
                                    Concatenate(
                                        "Tech ",
                                        If(btn_Measure_Width.Text="Tap to select", "0" , btn_Measure_Width.Text),
                                        " x ",
                                        If(btn_Measure_Height.Text="Tap to select", "0" , btn_Measure_Height.Text)
                                        ),
                                    50
                                ),
                                Height: gblMeasurementHeightWhole + gblMeasurementHeightFraction,
                                'United Inches (UI)': RoundUp(
                                        gblMeasurementWidthWhole + gblMeasurementWidthFraction + gblMeasurementHeightWhole + gblMeasurementHeightFraction,
                                        0
                                )
                            }
                        ),
                        "Max Projection",
                        Set(
                            gblMeasurementMaxProjectionWhole,
                            ThisItem.tblValue
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                'Max Projection': gblMeasurementMaxProjectionWhole + gblMeasurementMaxProjectionFraction
                            }
                        ),
                        "Wall Thickness",
                        Set(
                            gblMeasurementWallThicknessWhole,
                            ThisItem.tblValue
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                'Wall Thickness': gblMeasurementWallThicknessWhole + gblMeasurementWallThicknessFraction
                            }
                        )
                    );
                    With(
                        {
                            varType: "colCdsWindowMeasurements",
                            varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'
                        },
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                            colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // save local data

                    IfError( // This line of code is added to hide the errors
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsWindowMeasurements,
                            "localCdsWindowMeasurements"
                        )
                    )
                    ,Blank())  // This line of code is added to hide the errors

                    ;
                    UpdateContext({locShowMeasurement: "", locBlockUserInput: false, locBlockTimerStart: false});
                  ShowNavigation: =true
                  ShowScrollbar: =false
                  TabIndex: =0
                  TemplateFill: |-
                    =If(
                        Switch(
                            locShowMeasurement,
                            "Height",
                            LookUp(colMeasureHeight, tblValue=gblMeasurementHeightWhole, tblValue),
                            "Max Projection",
                            LookUp(colMeasureMaxProjection, tblValue=gblMeasurementMaxProjectionWhole, tblValue),
                            "Wall Thickness",
                            LookUp(colMeasureWallThickness, tblValue=gblMeasurementWallThicknessWhole, tblValue)
                        )=ThisItem.tblValue,
                        RGBA(
                            0,
                            0,
                            0,
                            0.4
                        ),
                        RGBA(
                            0,
                            0,
                            0,
                            .1
                        )
                    )
                  TemplatePadding: =10
                  TemplateSize: =44
                  Width: =Parent.Width * .55
                  X: =0*0
                  Y: =0*0
                Children:
                  - lbl_Measure_HeightWhole:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =Parent.TemplateHeight
                        OnSelect: =Select(Parent)
                        Size: =28
                        Text: =ThisItem.tblValue
                        Width: =Parent.TemplateWidth
                        X: =0*0
                        Y: =0*0
            - gal_Measure_HeightFraction:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Default: |-
                    ={
                        valIncrement: 0,
                        valLabel: "0"
                    }
                  DelayItemLoading: =false
                  FocusedBorderColor: =Color.Transparent
                  Height: =Parent.Height
                  Items: |-
                    =

                    If(
                        tog_Measure_Exception.Value,
                        colMeasurementFractions,
                        Filter(
                            colMeasurementFractions,
                            valIncrement <= (gblMeasurementMaxUI - ( gblMeasurementHeightWhole + gblMeasurementWidthFraction + gblMeasurementWidthWhole))
                        )
                    )
                  LoadingSpinner: =LoadingSpinner.None
                  NavigationStep: =8
                  OnSelect: |+
                    =// block user input
                    UpdateContext({locBlockTimerStart: true});
                    UpdateContext({locBlockUserInput: true});
                    Switch(
                        locShowMeasurement,
                        "Height",
                        Set(
                            gblMeasurementHeightFraction,
                            ThisItem.valIncrement
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                Name: Left(
                                    Concatenate(
                                        "Tech ",
                                        If(btn_Measure_Width.Text="Tap to select", "0" , btn_Measure_Width.Text),
                                        " x ",
                                        If(btn_Measure_Height.Text="Tap to select", "0" , btn_Measure_Height.Text)
                                        ),
                                    50
                                ),
                                Height: gblMeasurementHeightWhole + gblMeasurementHeightFraction,
                                'United Inches (UI)': RoundUp(
                                        gblMeasurementWidthWhole + gblMeasurementWidthFraction + gblMeasurementHeightWhole + gblMeasurementHeightFraction,
                                        0
                                )
                            }
                        ),
                        "Max Projection",
                        Set(
                            gblMeasurementMaxProjectionFraction,
                            ThisItem.valIncrement
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                'Max Projection': gblMeasurementMaxProjectionWhole + gblMeasurementMaxProjectionFraction
                            }
                        ),
                        "Wall Thickness",
                        Set(
                            gblMeasurementWallThicknessFraction,
                            ThisItem.valIncrement
                        );
                        Patch(
                            colCdsWindowMeasurements,
                            LookUp(colCdsWindowMeasurements, 'Window Measurement' = gblRecordWindowMeasurement_Tech.'Window Measurement'),
                            {
                                'Wall Thickness': gblMeasurementWallThicknessWhole + gblMeasurementWallThicknessFraction
                            }
                        )
                    );
                    With(
                        {
                            varType: "colCdsWindowMeasurements",
                            varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'
                        },
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                            colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // save local data
                    IfError( // This line of code is added to hide the errors

                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsWindowMeasurements,
                            "localCdsWindowMeasurements"
                        )
                    )
                    ,Blank())  // This line of code is added to hide the errors
                    ;
                    UpdateContext({locShowMeasurement: "", locBlockUserInput: false, locBlockTimerStart: false});

                  ShowScrollbar: =false
                  TabIndex: =0
                  TemplateFill: |-
                    =If(
                        Switch(
                            locShowMeasurement,
                            "Height",
                            LookUp(colMeasurementFractions, valIncrement=gblMeasurementHeightFraction, valLabel),
                            "Max Projection",
                            LookUp(colMeasurementFractions, valIncrement=gblMeasurementMaxProjectionFraction, valLabel),
                            "Wall Thickness",
                            LookUp(colMeasurementFractions, valIncrement=gblMeasurementWallThicknessFraction, valLabel)
                        )=ThisItem.valLabel,
                        RGBA(
                            0,
                            0,
                            0,
                            0.4
                        ),
                        RGBA(
                            0,
                            0,
                            0,
                            .1
                        )
                    )
                  TemplatePadding: =10
                  TemplateSize: =44
                  Width: =Parent.Width *.4
                  X: =Parent.Width *.6
                  Y: =0*0
                Children:
                  - lbl_Measure_HeightFraction:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =Parent.TemplateHeight
                        OnSelect: =Select(Parent)
                        Size: =18
                        Text: =ThisItem.valLabel
                        Width: =Parent.TemplateWidth
                        X: =0*0
                        Y: =0*0
            - lbl_Measure_HeightCover:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =gblAppColors.Secondary.GrayLight
                  Font: =Font.'Open Sans'
                  Height: =con_Measure_Height.Height
                  Text: =""
                  Visible: =locBlockUserInput Or locShowMeasurement in ["","Width", "Jamb Depth", "Soffit Depth"]
                  Width: =con_Measure_Height.Width
      - con_Measure_Width:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =gblAppColors.Secondary.GrayLight
            Height: =CountRows(colMeasurementFractions)* (gal_Measure_WidthFraction.TemplateHeight + gal_Measure_WidthFraction.TemplatePadding)+ gal_Measure_WidthFraction.TemplatePadding
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width * .25
            X: =370
            Y: =165
          Children:
            - gal_Measure_WidthWhole:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:

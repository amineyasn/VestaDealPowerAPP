      - con_Photos_Remove:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =gblAppColors.Secondary.GrayLight
            Height: =708
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =locShowDelete
            Width: =1024
            Y: =60
          Children:
            - cmp_PhotoDelete_Delete:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Trash}
                  IconColor: =Color.White
                  IconFill: =gblAppStyles.Status.Danger
                  NavigateScreen: =
                  Text: ="Delete"
                  Width: =180
                  X: =587
                  Y: =20
            - btn_PhotoDelete_Delete:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =Font.'Open Sans'
                  Height: =cmp_PhotoDelete_Delete.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: |-
                    =UpdateContext({locBlockUserInput: true});
                    With(
                        {
                            varType: "colCdsJobPhotos",
                            varRecordRef: locPhotoRecord.'Job Photo'
                        },
                        If(
                            varRecordRef in Filter(
                                colAUDRecords,
                                Type = "colCdsJobPhotos"
                            ).RecordRef,
                            // if photo was created on local device
                            Remove(
                                colCdsJobPhotos,
                                LookUp(
                                    colCdsJobPhotos,
                                    'Job Photo' = varRecordRef
                                )
                            );
                            Remove(
                                colAUDRecords,
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                    And Operation = "A"
                                )
                            ),
                            // if photo was downloaded from the server
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "D"
                                }
                            );
                            UpdateIf(
                                colCdsJobPhotos,
                                'Job Photo' in Filter(
                                    colAUDRecords,
                                    Type = varType,
                                    Operation = "D").RecordRef,
                                {
                                    Status: gblOptionSets.JobPhoto.Status.Inactive,
                                    'Status Reason': gblOptionSets.JobPhoto.StatusReason.Inactive
                                }
                            )
                        )
                    );
                    // save local data
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colCdsJobPhotos,
                            "localCdsJobPhotos"
                        );
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                    );
                    UpdateContext(
                        {
                            locShowDelete: false,
                            locShowReview: false,
                            locBlockUserInput: false
                        }
                    )
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  Text: =""
                  Width: =180
                  X: =587
                  Y: =20
            - cmp_PhotoDelete_Cancel:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Cancel}
                  IconColor: =Color.White
                  IconFill: =gblAppStyles.Status.Disabled

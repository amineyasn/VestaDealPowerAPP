                  BorderColor: =
                  BorderThickness: =0
                  Color: |-
                    =If(IsBlank(gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Component'), gblAppColors.Secondary.GrayMediumDark ,gblAppStyles.Text.Color)

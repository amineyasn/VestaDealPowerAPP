Screens:
  Lead Test Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |+
        =// revert to previous job entries & window mulls collections if the user cancels
        If(
            !locLeadTestsSave,
            ClearCollect(
                colCdsJobEntries,
                colJobEntriesCancel
            );
            ClearCollect(
                colCdsJobs,
                colJobsCancel
            );
            ClearCollect(
                colAUDRecords,
                colAUDRecordsCancel
            );
        );
        // reset variables
        UpdateContext(
            {
                locComponentExteriorInterior: Blank(),
                locComponentSelected: Blank(),
                locComponentIsCustomValue: false,
                locShowLeadTestSummary: false
            }
        );
      OnVisible: |-
        =// save data to revert if changes cancelled
        ClearCollect(
            colJobEntriesCancel,
            colCdsJobEntries
        );
        ClearCollect(
            colJobsCancel,
            colCdsJobs
        );
        ClearCollect(
            colAUDRecordsCancel,
            colAUDRecords
        );
        // reset variables
        UpdateContext({locLeadTestsSave: false});
    Children:
      - cmp_LeadTest_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Measure Window Screen'
            Color: =Color.White
            Context: |-
              =$"{gblRecordJobEntryCurrent_.'Room: Type'}, {gblRecordJobEntryCurrent_.'Room: Floor'}"
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - cmp_LeadTest_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Project"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =708
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =60
      - con_LeadTest_Main:
          Control: GroupContainer@1.3.0
          Variant: ManualLayout
          Properties:
            BorderColor: =
            DropShadow: =DropShadow.None
            Height: =708
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =694
            X: =330
            Y: =60
          Children:
            - cmp_LeadTest_AdvanceButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Check}
                  IconColor: =Color.White
                  IconFill: =Color.Green
                  NavigateScreen: =App.ActiveScreen
                  Text: ="Save Tests"
                  Width: =221
                  X: =414
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
            - cmp_LeadTest_DeleteButton:
                Control: CanvasComponent
                ComponentName: cmp_AdvanceButton
                Properties:
                  ButtonFill: =Color.White
                  Color: =Color.Black
                  Fill: =Color.Transparent
                  Height: =60
                  Icon: |-
                    ={Value: Icon.Cancel}
                  IconColor: =Color.White
                  IconFill: =gblAppColors.Secondary.Red
                  NavigateScreen: =App.ActiveScreen
                  Text: ="Delete Test"
                  Visible: =!(btn_LeadTest_Exterior__Component.Text="select component" And btn_LeadTest_Interior__Component.Text="select component")
                  Width: =235
                  X: =gblAppStyles.Padding.ButtonMargin
                  Y: =Parent.Height - Self.Height - gblAppStyles.Padding.ButtonMargin
            - btn_LeadTest_AdvanceButton:
                Control: Classic/Button@2.2.0
                Properties:
                  AutoDisableOnSelect: =false
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =RGBA(0, 0, 0, 0)
                  DisabledColor: =RGBA(0, 0, 0, 0)
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =cmp_LeadTest_AdvanceButton.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |
                    =With(
                        {
                            varType: "colCdsWindowMeasurements",
                            varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'
                        },
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // save local data
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsJobEntries,
                            "localCdsWindowMeasurements"
                        )
                    );
                    // enable save
                    UpdateContext({locLeadTestsSave: true});
                    // next screen
                    Back();
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: |-
                    =Blank()//With({wCountRows: CountRows(colAddLaborItems)}, "Add "&wCountRows&" Item"&If(wCountRows>1, "s"))
                  Visible: =cmp_LeadTest_AdvanceButton.Visible
                  Width: =cmp_LeadTest_AdvanceButton.Width
                  X: =cmp_LeadTest_AdvanceButton.X
                  Y: =cmp_LeadTest_AdvanceButton.Y
            - btn_LeadTest_DeleteButton:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =RGBA(0, 0, 0, 0)
                  DisabledColor: =RGBA(0, 0, 0, 0)
                  DisabledFill: =Color.Transparent
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =cmp_LeadTest_DeleteButton.Height
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: |-
                    =// update job entry record
                    With(
                        {
                            varType: "colCdsWindowMeasurements",
                            varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'
                        },
                        Set(
                            gblRecordWindowMeasurement_Tech,
                            Patch(
                                colCdsWindowMeasurements,
                                LookUp(
                                    colCdsWindowMeasurements,
                                    'Window Measurement' = varRecordRef
                                ),
                                {
                                    'Lead Test: Exterior Component': Blank(),
                                    'Lead Test: Exterior Swab Number': Blank(),
                                    'Lead Test: Exterior Result': Blank(),
                                    'Lead Test: Interior Component': Blank(),
                                    'Lead Test: Interior Swab Number': Blank(),
                                    'Lead Test: Interior Result': Blank()
                                }
                            )
                        );
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                    // save local data
                    If(
                        gblAppLoadOffline,
                        SaveData(
                            colAUDRecords,
                            "localAUDRecords"
                        );
                        SaveData(
                            colCdsJobEntries,
                            "localCdsWindowMeasurements"
                        )
                    );
                    // reset controls
                    Reset(txt_LeadTest_Exterior__Swab);
                    Reset(tog_LeadTest_Exterior__Result);
                    Reset(txt_LeadTest_Interior__Swab);
                    Reset(tog_LeadTest_Interior__Result);
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: |-
                    =Blank()//With({wCountRows: CountRows(colAddLaborItems)}, "Add "&wCountRows&" Item"&If(wCountRows>1, "s"))
                  Visible: =cmp_LeadTest_DeleteButton.Visible
                  Width: =cmp_LeadTest_DeleteButton.Width
                  X: =cmp_LeadTest_DeleteButton.X
                  Y: =cmp_LeadTest_DeleteButton.Y
            - lbl_LeadTest_Subtitle:
                Control: Label@2.5.1

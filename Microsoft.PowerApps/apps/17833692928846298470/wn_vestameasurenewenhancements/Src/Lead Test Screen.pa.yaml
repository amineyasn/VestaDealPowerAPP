                        },
                        If(
                            IsBlank(
                                LookUp(
                                    colAUDRecords,
                                    Type = varType
                                    And RecordRef = varRecordRef
                                )
                            ),
                            Collect(
                                colAUDRecords,
                                {
                                    Type: varType,
                                    RecordRef: varRecordRef,
                                    Job: gblRecordJobCurrent.Job,
                                    Operation: "U"
                                }
                            )
                        )
                    );
                  OnUncheck: =
                  PressedBorderColor: =Color.Transparent
                  TrueFill: =gblAppStyles.Status.Danger
                  TrueText: ="Yes"
                  Width: =127
                  X: =188
                  Y: =355

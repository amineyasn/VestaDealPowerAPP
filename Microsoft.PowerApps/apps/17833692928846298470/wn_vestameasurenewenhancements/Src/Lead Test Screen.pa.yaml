                                    And IsBlank(gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Swab Number'),
                                    gblRecordJobCurrent.'Lead Test: Last Swab Number',
                                    gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Swab Number'
                                ),
                                'Lead Test: Exterior Result': If(
                                    IsBlank(gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Result'),
                                    gblOptionSets.JobEntry.LeadTestResult.No,
                                    gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Result'

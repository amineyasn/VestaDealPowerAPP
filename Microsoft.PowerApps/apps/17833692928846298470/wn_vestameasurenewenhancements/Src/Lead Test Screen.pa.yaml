            - tog_LeadTest_Exterior__Result:
                Control: Classic/Toggle@2.1.0
                Properties:
                  AccessibleLabel: ="abc"
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =Color.Transparent
                  Default: |-
                    =gblRecordWindowMeasurement_Tech.'Lead Test: Exterior Result'=gblOptionSets.JobEntry.LeadTestResult.Yes
                  DisabledColor: =Color.Transparent
                  DisplayMode: '=If(btn_LeadTest_Exterior__Component.Text="select component", DisplayMode.Disabled, DisplayMode.Edit) '
                  FalseText: ="No"
                  FocusedBorderColor: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =38
                  LabelPaddingRight: =15
                  OnCheck: =
                  OnSelect: |-
                    =If(
                        Self.Value,
                        // When toggle is set to Yes
                        Set(
                            gblRecordWindowMeasurement_Tech,
                            Patch(
                                colCdsWindowMeasurements,
                                LookUp(
                                    colCdsWindowMeasurements,
                                    'Window Measurement' = gal_LeadTest_Select.Selected.ID
                                ),
                                {'Lead Test: Exterior Result': gblOptionSets.WindowMeasurement.LeadTestResult.Yes}
                            )
                        ),
                        // When toggle is set to No
                        Set(
                            gblRecordWindowMeasurement_Tech,
                            Patch(
                                colCdsWindowMeasurements,
                                LookUp(
                                    colCdsWindowMeasurements,
                                    'Window Measurement' = gal_LeadTest_Select.Selected.ID
                                ),
                                {'Lead Test: Exterior Result': gblOptionSets.WindowMeasurement.LeadTestResult.No} 

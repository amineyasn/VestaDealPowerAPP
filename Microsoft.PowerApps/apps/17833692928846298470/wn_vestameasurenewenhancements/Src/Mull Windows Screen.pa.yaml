Screens:
  Mull Windows Screen:
    Properties:
      Fill: =gblAppColors.Secondary.GrayLight
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: =Clear(colProjectSidebarWindowMulls)
    Children:
      - cmp_Mull_Sidebar:
          Control: CanvasComponent
          ComponentName: cmp_Sidebar
          Properties:
            Color: =gblAppColors.Secondary.White
            Default: ="Project"
            Fill: =gblAppColors.Primary.BlueDark
            Height: =708
            HoverFill: =gblAppStyles.Sidebar.HoverFill
            IconSize: =35
            Items: =colSidebarItems
            SelectedColor: =gblAppStyles.Sidebar.SelectedColor
            SelectedFill: =gblAppStyles.Sidebar.SelectedFill
            TemplateSize: =80
            TitleSize: =9
            Width: =80
            X: =0.00
            Y: =60
      - cmp_Mull_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: ='Measure Window Screen'
            Color: =Color.White
            Context: |-
              =$"{gblRecordJobEntryCurrent_.'Room: Type'}, {gblRecordJobEntryCurrent_.'Room: Floor'}"
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - gal_Mull_Selection:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            Default: |-
              =LookUp(
                  colCdsWindowMulls,
                  'Window Mulls' = gblRecordWindowMeasurement_Tech.'Window Mull'.'Window Mulls'
              )
            DelayItemLoading: =false
            Height: =498
            Items: |-
              =With(
                  {
                      varWindowMulls: Sort(
                          Filter(
                              colCdsWindowMulls,
                              Job.Job = gblRecordJobCurrent.Job,
                              //'Job Entry'.'Job Entry' = gblRecordJobEntryCurrent_.'Job Entry',  <-- Remove this line
                              Status <> gblOptionSets.WindowMull.Status.Inactive
                          ),
                          'Sequence Number',
                          SortOrder.Ascending
                      )
                  },
                  If(
                      IsEmpty(varWindowMulls),
                      FirstN(
                          Ungroup(
                              Table(
                                  {MyTables: Table({Result: Blank()})},
                                  {MyTables: varWindowMulls}
                              ),
                              MyTables
                          ),
                          1
                      ),
                      Ungroup(
                          Table(
                              {MyTables: Table({Result: Blank()})},
                              {MyTables: varWindowMulls}
                          ),
                          MyTables
                      )
                  )
              )
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |
              =// update the window measurement with new mull
              With(
                  {
                      varType: "colCdsWindowMeasurements",
                      varRecordRef: gblRecordWindowMeasurement_Tech.'Window Measurement'
                  },
                  Set(
                      gblRecordWindowMeasurement_Tech,
                      Patch(
                          colCdsWindowMeasurements,
                          LookUp(
                              colCdsWindowMeasurements,
                              'Window Measurement' = varRecordRef
                          ),
                          {
                              'Window Mull': LookUp(
                                  colCdsWindowMulls,
                                  colCdsWindowMulls[@'Window Mulls'] = ThisItem.wn_windowmullsid
                              )
                          }
                      )
                  );
                  If(
                      IsBlank(
                          LookUp(
                              colAUDRecords,
                              Type = varType
                              And RecordRef = varRecordRef
                          )
                      ),
                      Collect(
                          colAUDRecords,
                          {
                              Type: varType,
                              RecordRef: varRecordRef,
                              Job: gblRecordJobCurrent.Job,
                              Operation: "U"
                          }
                      )
                  )
              );
              UpdateContext({locShowSaveButton: true});
              Reset(gal_Mull_Selected);
              Reset(gal_Mull_Selection);
            TabIndex: =0
            TemplatePadding: =0
            TemplateSize: =180
            Width: =650
            WrapCount: =3
            X: =356
            Y: =140
          Children:
            - btn_Mull_Selection:
                Control: Classic/Button@2.2.0
                Properties:
                  AutoDisableOnSelect: =false
                  BorderColor: =gblAppColors.Secondary.GrayMedium
                  BorderThickness: =1
                  Color: |-
                    =If(
                        gblRecordWindowMeasurement_Tech.'Window Mull'.'Sequence Number' = ThisItem.wn_sequencenumber,
                        gblAppColors.Secondary.White,
                        gblAppStyles.Text.Color
                    )
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: |-
                    =If(
                        gblRecordWindowMeasurement_Tech.'Window Mull'.'Sequence Number' = ThisItem.wn_sequencenumber,
                        gblAppStyles.Status.Neutral,
                        Color.White
                    )
                  FocusedBorderThickness: =1
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.TemplateHeight-(gblAppStyles.Card.MarginLeft*2)
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: |-
                    =If(
                        gblRecordJobEntryCurrent_.'Window Mull'.'Window Mulls'=ThisItem.wn_windowmullsid,
                        Self.Fill,
                        gblAppStyles.Card.HoverFill
                    )
                  OnSelect: =Select(Parent)
                  PaddingRight: =3.75
                  PressedBorderColor: =Self.BorderColor
                  PressedFill: |-
                    =If(
                        gblRecordJobEntryCurrent_.'Window Mull'.'Window Mulls'=ThisItem.wn_windowmullsid,
                        Self.Fill,
                        gblAppStyles.Card.PressedFill
                    )
                  RadiusBottomLeft: =gblAppStyles.Card.Radius
                  RadiusBottomRight: =gblAppStyles.Card.Radius
                  RadiusTopLeft: =gblAppStyles.Card.Radius
                  RadiusTopRight: =gblAppStyles.Card.Radius
                  Size: =24
                  Text: =If(ThisItem.wn_sequencenumber=Blank(), "None", ThisItem.wn_sequencenumber)
                  Width: =Parent.TemplateWidth-(gblAppStyles.Card.MarginLeft*2)
                  X: =(Parent.TemplateWidth-Self.Width)/2
                  Y: =(Parent.TemplateHeight-Self.Height)/2
      - lbl_Mull_Actions__Background:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#faf9f8")
            Font: =Font.'Open Sans'
            Height: =708
            Text: =""
            Width: =250
            X: =80
            Y: =60
      - cmp_Mull_AdvanceButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Check}
            IconColor: =Color.White
            IconFill: =gblAppColors.Secondary.Green
            NavigateScreen: =App.ActiveScreen
            Text: ="Save Mulls"
            Width: =214
            X: =Parent.Width-Self.Width-gblAppStyles.Padding.ButtonMargin
            Y: =Parent.Height-Self.Height-gblAppStyles.Padding.ButtonMargin
      - btn_Mull_AdvanceButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Transparent
            DisabledBorderColor: =Color.Transparent
            DisabledColor: =Color.Transparent
            DisabledFill: =Color.Transparent
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            Height: =cmp_Mull_AdvanceButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Color.Transparent
            HoverFill: =Color.Transparent
            OnSelect: |-
              =// save local changes
              If(
                  gblAppLoadOffline,
                  SaveData(
                      colAUDRecords,
                      "localAUDRecords"
                  );
                  SaveData(
                      colCdsWindowMeasurements,
                      "localCdsWindowMeasurements"
                  );
                  SaveData(
                      colCdsWindowMulls,
                      "localCdsWindowMulls"
                  )
              );
              // next screen
              Navigate('Measure Window Screen');
            PressedBorderColor: =Self.Fill
            PressedColor: =Color.Transparent
            PressedFill: =Color.Transparent
            Text: =""
            Visible: =locShowSaveButton
            Width: =cmp_Mull_AdvanceButton.Width
            X: =cmp_Mull_AdvanceButton.X
            Y: =cmp_Mull_AdvanceButton.Y
      - cmp_Mull_RemoveButton:
          Control: CanvasComponent
          ComponentName: cmp_AdvanceButton
          Properties:
            ButtonFill: =Color.White
            Color: =Color.Black
            Fill: =Color.Transparent
            Height: =60
            Icon: |-
              ={Value: Icon.Cancel}
            IconColor: =Color.White
            IconFill: =gblAppColors.Secondary.Red
            NavigateScreen: =App.ActiveScreen
            Text: ="Delete Mull"
            Visible: =!(gblRecordWindowMeasurement_Tech.'Window Mull'.'Sequence Number'=Blank())
            Width: =220
            X: =376
            Y: =Parent.Height-Self.Height-gblAppStyles.Padding.ButtonMargin
      - btn_Mull_RemoveButton:
          Control: Classic/Button@2.2.0
          Properties:
            AutoDisableOnSelect: =false
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Transparent
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            DisabledColor: =RGBA(0, 0, 0, 0)
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            Height: =cmp_Mull_RemoveButton.Height
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Color.Transparent
            HoverFill: =Color.Transparent
            OnSelect: |+
              =With(
                  {
                      varType: "colCdsWindowMulls",
                      varRecordRef: gblRecordWindowMeasurement_Tech.'Window Mull'.'Window Mulls'
                  },
                  If(
                      varRecordRef in Filter(
                          colAUDRecords,
                          Type = varType,
                          Operation = "A"
                      ).RecordRef,
                      // if window mull was created on local device
                      Remove(
                          colCdsWindowMulls,
                          LookUp(
                              colCdsWindowMulls,
                              'Window Mulls' = varRecordRef
                          )
                      );
                      Remove(
                          colAUDRecords,
                          LookUp(
                              colAUDRecords,
                              Type = varType
                              And RecordRef = varRecordRef
                              And Operation = "A"
                          )
                      ),
                      // if window mull was downloaded from the server
                      Patch(
                          colCdsWindowMulls,
                          LookUp(
                              colCdsWindowMulls,
                              'Window Mulls' = varRecordRef
                          ),
                          {
                              Status: gblOptionSets.WindowMull.Status.Inactive,
                              'Status Reason': gblOptionSets.WindowMull.StatusReason.Inactive
                          }
                      );
                      Collect(
                          colAUDRecords,
                          {
                              Type: varType,
                              RecordRef: varRecordRef,
                              Job: gblRecordJobCurrent.Job,
                              Operation: "D"
                          }
                      );
                  );
                  With(
                      {
                          varType: "colCdsWindowMeasurements",
                          varWindowMeasurementsRemoveMull: Filter(
                              colCdsWindowMeasurements,
                              'Window Mull'.'Window Mulls' = varRecordRef
                          ).'Window Measurement'
                      },
                      ForAll(
                          varWindowMeasurementsRemoveMull,
                          Patch(
                              colCdsWindowMeasurements,
                              LookUp(colCdsWindowMeasurements, 'Window Measurement' = varWindowMeasurementsRemoveMull[@'Window Measurement']),
                              {'Window Mull': Blank()}
                          );
                          If(
                              IsBlank(
                                  LookUp(
                                      colAUDRecords,
                                      Type = varType
                                      And RecordRef = varWindowMeasurementsRemoveMull[@'Window Measurement']
                                  )
                              ),
                              Collect(
                                  colAUDRecords,
                                  {
                                      Type: varType,
                                      RecordRef: varWindowMeasurementsRemoveMull[@'Window Measurement'],
                                      Job: gblRecordJobCurrent.Job,
                                      Operation: "U"
                                  }
                              )
                          )
                      )
                  )
              );

              // show the save button
              UpdateContext({locShowSaveButton: true});
              Reset(gal_Mull_Selected);
              Reset(gal_Mull_Selection);
            PressedBorderColor: =Self.Fill
            PressedColor: =Color.Transparent
            PressedFill: =Color.Transparent
            Text: =""
            Visible: =cmp_Mull_RemoveButton.Visible
            Width: =cmp_Mull_RemoveButton.Width
            X: =cmp_Mull_RemoveButton.X
            Y: =cmp_Mull_RemoveButton.Y
      - lbl_Mull_AddMull:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Segoe UI'
            Size: =gblAppStyles.Text.SubtitleSize
            Text: ="New Mull"
            Width: =117
            X: =872
            Y: =91
      - ico_Mull_AddMull:
          Control: Classic/Icon@2.5.0
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppStyles.Status.Neutral
            FocusedBorderColor: =Color.Transparent
            Height: =39
            Icon: =Icon.Add
            OnSelect: |
              =// create the a new mull with the next available number in the sequence
              With(
                  {
                      varType: "colCdsWindowMulls",
                      varRecordRef: GUID(),
                      varSequenceNumber: Coalesce(
                      Max(
                          Filter(
                              colCdsWindowMulls,
                              Job.Job = gblRecordJobCurrent.Job,
                              Status <> gblOptionSets.WindowMull.Status.Inactive
                          ),
                          'Sequence Number'
                      ) + 1,
                      1
                  )
                  },
                  UpdateContext(
                      {
                          locWindowMullNew: Patch(
                              colCdsWindowMulls,
                              Defaults(colCdsWindowMulls),
                              {
                                  Name: Text(varSequenceNumber),
                                  'Window Mulls': varRecordRef,
                                  Job: LookUp(
                                      colCdsJobs,
                                      Job = gblRecordJobCurrent.Job
                                  ),
                                  //'Job Entry': gblRecordJobEntryCurrent_, <-- Remove this line
                                  'Sequence Number': varSequenceNumber
                              }
                          )
                      }
                  );
                  Collect(
                      colAUDRecords,
                      {
                          Type: varType,
                          RecordRef: varRecordRef,
                          Job: gblRecordJobCurrent.Job,
                          Operation: "A"
                      }
                  )
              );
              // update the job entry with new mull
              With(
                  {
                      varType: "colCdsWindowMeasurements",
                      varRecordRef: gal_Mull_Selected.Selected.ID
                  },
                  Set(
                      gblRecordWindowMeasurement_Tech,
                      Patch(
                          colCdsWindowMeasurements,
                          LookUp(
                              colCdsWindowMeasurements,
                              'Window Measurement' = varRecordRef
                          ),
                          {'Window Mull': locWindowMullNew}
                      )
                  );
                  If(
                      IsBlank(
                          LookUp(
                              colAUDRecords,
                              Type = varType And RecordRef = varRecordRef
                          )
                      ),
                      Collect(
                          colAUDRecords,
                          {
                              Type: varType,
                              RecordRef: varRecordRef,
                              Job: gblRecordJobCurrent.Job,
                              Operation: "U"
                          }
                      )
                  )
              );
              Reset(gal_Mull_Selected);
              UpdateContext({locShowSaveButton: true});
            PaddingRight: =108
            TabIndex: =0
            Width: =160
            X: =816
            Y: =91
      - gal_Mull_Selected:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            AccessibleLabel: ="abc"
            BorderColor: =Color.Transparent
            Default: =gblProjectSidebarItemCurrent
            DelayItemLoading: =false
            Fill: =gblAppStyles.ActionsMenu.Fill
            FocusedBorderColor: =Color.Transparent
            FocusedBorderThickness: =0.01
            Height: =708
            Items: =colProjectSidebarWindowMulls
            LoadingSpinner: =LoadingSpinner.None
            OnSelect: |-
              =// set current job entry
              Set(
                  gblProjectSidebarItemCurrent,
                  ThisItem
              );
              Set(
                  gblRecordWindowMeasurement_Tech,
                  LookUp(
                      colCdsWindowMeasurements,
                      'Window Measurement' = gblProjectSidebarItemCurrent.ID
                  )
              );
              // reset controls
              Reset(gal_Mull_Selection);
            ShowScrollbar: =false
            TabIndex: =0
            TemplateFill: |-
              =If(
                  gblProjectSidebarItemCurrent.ID = ThisItem.ID,
                  ColorFade(
                      gal_LeadTest_Select.Fill,
                      -5%
                  ),
                  Color.Transparent
              )
            TemplatePadding: =0
            TemplateSize: =72
            Width: =250
            X: =80
            Y: =60
          Children:
            - con_Mull_Select:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =Color.DarkGray
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =72
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =250
                Children:
                  - lbl_Mull_Select__Title:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DisplayMode: =If(ThisItem.Category="Window Measurement", DisplayMode.Edit, DisplayMode.Disabled)
                        Font: =Font.'Open Sans'
                        Height: =22
                        PaddingLeft: =66
                        Size: =12
                        Text: =ThisItem.Title
                        Width: =Parent.Width
                  - lbl_Mull_Select__Description:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DisplayMode: =If(ThisItem.Category="Window Measurement", DisplayMode.Edit, DisplayMode.Disabled)
                        Font: =Font.'Open Sans'
                        Height: =18
                        PaddingLeft: =66
                        Size: =9
                        Text: =ThisItem.Description
                        Visible: =!IsBlank(ThisItem.Description)
                        Width: =Parent.Width
                        Y: =22
                  - lbl_Mull_Select__Lead:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DisplayMode: =If(ThisItem.Category="Window Measurement", DisplayMode.Edit, DisplayMode.Disabled)
                        Font: =Font.'Open Sans'
                        Height: =18
                        PaddingLeft: =66
                        Size: =9
                        Text: |-
                          =With(
                              {
                                  varRecordWindowMeasurement: If(
                                      ThisItem.Category="Window Measurement",
                                      LookUp(
                                          colCdsWindowMeasurements,
                                          'Window Measurement'=ThisItem.ID
                                      ),
                                      Blank()
                                  )
                              },
                              If(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number'),
                                  "Mull " & varRecordWindowMeasurement.'Window Mull'.'Sequence Number'
                              )
                              &
                              If(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number')
                                  And !IsBlank(varRecordWindowMeasurement.'Lead Test: Exterior Result'),
                                  ", "
                              )
                              &
                              If(
                                  varRecordWindowMeasurement.'Lead Test: Exterior Result'=gblOptionSets.JobEntry.LeadTestResult.Yes
                                  Or varRecordWindowMeasurement.'Lead Test: Interior Result'=gblOptionSets.JobEntry.LeadTestResult.Yes,
                                  "Contains Lead",
                                  varRecordWindowMeasurement.'Lead Test: Exterior Result'=gblOptionSets.JobEntry.LeadTestResult.No
                                  Or varRecordWindowMeasurement.'Lead Test: Interior Result'=gblOptionSets.JobEntry.LeadTestResult.No,
                                  "No Lead",
                                  Blank()
                              )
                          )
                        Visible: |-
                          =With(
                              {
                                  varRecordWindowMeasurement: If(
                                      ThisItem.Category="Window Measurement",
                                      LookUp(
                                          colCdsWindowMeasurements,
                                          'Window Measurement'=ThisItem.ID
                                      ),
                                      Blank()
                                  )
                              },
                              Or(
                                  !IsBlank(varRecordWindowMeasurement.'Window Mull'.'Sequence Number'),
                                  !IsBlank(varRecordWindowMeasurement.'Lead Test: Exterior Result')
                              )
                          )
                        Width: =Parent.Width
                        Y: =39
            - ico_Mull_Select__Image:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisabledFill: =Color.Transparent
                  Height: =64
                  Image: |-
                    =ThisItem.Image
                    /*
                    LookUp(
                        colCdsWindowStyles,
                        LookUp(
                            colCdsWindowChoices,
                            colCdsWindowChoices[@'Window Choice'] = ThisItem.'Window Choice'.'Window Choice',
                            Style
                        ).'Window Style' = colCdsWindowStyles[@'Window Style']
                    ).Thumbnail.Value
                    */
                  PaddingBottom: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingLeft: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingRight: =If(ThisItem.Type="Window Choice", 6, 15)
                  PaddingTop: =If(ThisItem.Type="Window Choice", 6, 15)
                  Width: =64
                  X: =0*1
                  Y: =(Parent.TemplateHeight-Self.Height)/2
            - btn_Mull_Select__Status:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =gblAppStyles.ActionsMenu.QuantityBorderThickness
                  Color: =Color.White//If(ThisItem.Completed, gblAppColors.Secondary.White,gblAppStyles.ActionsMenu.Color)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisabledFill: =gblAppStyles.Status.Success
                  Fill: =gblAppStyles.Status.Success
                  FocusedBorderColor: =Color.Transparent
                  FocusedBorderThickness: =0.01
                  Font: =gblAppStyles.Text.Font
                  FontWeight: =gblAppStyles.ActionsMenu.QuantityFontWeight
                  Height: =17
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Self.Color
                  HoverFill: =Self.Fill
                  OnSelect: =Select(Parent)
                  PressedBorderColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =180
                  RadiusBottomRight: =Self.RadiusBottomLeft
                  RadiusTopLeft: =Self.RadiusBottomLeft
                  RadiusTopRight: =Self.RadiusBottomLeft
                  Size: =8
                  Text: =Blank()//ThisItem.Quantity
                  Visible: |-
                    =And(
                        ThisItem.Category="Window Measurement",
                        LookUp(
                            colCdsWindowMeasurements,
                            'Window Measurement'=ThisItem.ID,
                            Completed
                        ) = gblOptionSets.WindowMeasurement.Completed.Yes
                    )
                  Width: =17
                  X: =35
                  Y: =gblAppStyles.ActionsMenu.QuantityY*1+3
            - img_Mull_Select__Status:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =14
                  Image: ='icons8-checkmark'
                  Visible: |-
                    =And(
                        ThisItem.Category="Window Measurement",
                        LookUp(
                            colCdsWindowMeasurements,
                            'Window Measurement'=ThisItem.ID,
                            Completed
                        ) = gblOptionSets.WindowMeasurement.Completed.Yes
                    )
                  Width: =18
                  X: =35
                  Y: =45*1
            - btn_Mull_Select__Overlay:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.Transparent
                  DisabledBorderColor: =Color.Transparent
                  DisabledColor: =Color.Transparent
                  DisabledFill: =Color.Transparent
                  DisplayMode: =If(ThisItem.Category="Window Measurement", DisplayMode.Edit, DisplayMode.View)
                  Fill: =Color.Transparent
                  Font: =Font.'Open Sans'
                  Height: =72
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =Color.Transparent
                  HoverFill: =Color.Transparent
                  OnSelect: =Select(Parent)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Color.Transparent
                  PressedFill: =Color.Transparent
                  Text: =""
                  Width: =250

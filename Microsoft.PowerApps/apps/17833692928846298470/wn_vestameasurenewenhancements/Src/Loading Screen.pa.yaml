                                    ),
                                    varJobEntryOptionsChunk2: Sort(
                                        Filter(
                                            'Job Entry Options',
                                            'Job Entry Options (Views)'.'Hierarchy Step Job Entry Options'
                                        ),
                                        'Job Entry Option',
                                        SortOrder.Descending
                                    )
                                },
                                Collect(
                                    colCdsJobEntryOptions_HierarchyStep,
                                    varJobEntryOptionsChunk1,
                                    Filter(
                                        varJobEntryOptionsChunk2,
                                        !('Job Entry Option' in varJobEntryOptionsChunk1.'Job Entry Option')
                                    )
                                )
                            );
                            UpdateContext({locSaveJobEntryOptions: true});
                        );
                        If(
                            First(
                                SortByColumns(
                                    Filter(
                                        colCdsJobEntryOptions,
                                        Type = gblOptionSets.JobEntryOption.Type.Value
                                    ),
                                    "modifiedon",
                                    SortOrder.Descending
                                )
                            ).'Modified On' < locCdsOrgLatest_JobEntryOptions_Values Or IsEmpty(

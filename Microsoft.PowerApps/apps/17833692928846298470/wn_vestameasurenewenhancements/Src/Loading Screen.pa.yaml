                                    Type = gblOptionSets.JobEntryOption.Type.HierarchyStep
                                )
                            ),
                            RemoveIf(
                                colCdsJobEntryOptions,
                                Type = 'Job Entry Option Types'.'Hierarchy Step'
                            );
                            With(
                                {
                                    varJobEntryOptionsChunk1: Sort(
                                        Filter(
                                            'Job Entry Options',
                                            'Job Entry Options (Views)'.'Hierarchy Step Job Entry Options'
                                        ),
                                        'Job Entry Option',

Screens:
  Loading Screen:
    Properties:
      Fill: =gblAppColors.Primary.WhiteSmoke
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext(
            {
                locLoadingText: "Gettings things ready...",
                locLoadingPercent: 0
            }
        );
        If(
            gblAppAutoload,
            Select(btn_Loading_VersionCheck)
        )
    Children:
      - cmp_Loading_Titlebar:
          Control: CanvasComponent
          ComponentName: cmp_Titlebar
          Properties:
            BackScreen: =
            Color: =Color.White
            Context: =Blank()
            Fill: =gblAppStyles.Titlebar.Fill
            Font: |-
              ={Value: Font.'Segoe UI'}
            Height: =60
            Size: =gblAppStyles.Text.TitleSize
            Title: ="Vesta Measure"
            Width: =1024
      - lbl_Loading_Version:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            PaddingBottom: =20
            PaddingLeft: =20
            Size: =10
            Text: =Concatenate("Version ",Text(gblAppVersion))
            Width: =262
            X: =0*0
            Y: =Parent.Height - Self.Height
      - img_Loading_Spinner:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =132
            Image: =Image_LoadingSpinner
            Width: =132
            X: =(Parent.Width - Self.Width) / 2
            Y: =((Parent.Height - Self.Height) / 2) - 44
      - lbl_Loading_VestaMeasure:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =Color.Black
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Height: =88
            Size: =32
            Text: ="Vesta Measure"
            VerticalAlign: =VerticalAlign.Bottom
            Width: =1024
            Y: =img_Loading_Spinner.Y + img_Loading_Spinner.Height
      - lbl_Loading_CurrentActivity:
          Control: Label@2.5.1
          Properties:
            Align: =LayoutAlignItems.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =gblAppColors.Secondary.GrayMediumDark
            Fill: =Color.Transparent
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Lighter
            Height: =80
            Size: =20
            Text: =locLoadingText
            VerticalAlign: =VerticalAlign.Top
            Width: =1024
            Y: =lbl_Loading_VestaMeasure.Y + lbl_Loading_VestaMeasure.Height
      - shp_Loading_ProgressBackground:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =gblAppColors.Secondary.GrayMedium
            Height: =10
            Width: =500
            X: =(Parent.Width - Self.Width) / 2
            Y: =lbl_Loading_CurrentActivity.Y + lbl_Loading_CurrentActivity.Height
      - shp_Loading_ProgressActual:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =gblAppColors.Secondary.Yellow
            Height: =shp_Loading_ProgressBackground.Height
            Width: |-
              =With(
                  {varWidth: shp_Loading_ProgressBackground.Width},
                  varWidth * locLoadingPercent/100
              )
              /*
              // Clear Loading Progress Collection
              UpdateContext(
                  {
                      locCreatedRecords: true, // 20
                      locSaved_JobDocuments: false, // 10
                      locSaved_JobEntries: false, // 10
                      locSaved_JobLaborItems: false, // 5
                      locSaved_JobMaterialItems: false, // 5
                      locSaved_JobNotes: false, // 10
                      locSaved_JobRooms: false, // 5
                      locSaved_JobSelections: false, // 15
                      locSaved_WindowMeasurements: false, // 15
                      locSaved_WindowMulls: false // 5
                  }
              );
              */
            X: =shp_Loading_ProgressBackground.X
            Y: =lbl_Loading_CurrentActivity.Y + lbl_Loading_CurrentActivity.Height
      - dtb_Loading_RecordCounts:
          Control: DataTable@1.0.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            HeadingColor: =RGBA(255, 255, 255, 1)
            HeadingFill: =RGBA(56, 96, 178, 1)
            HeadingFont: =Font.'Segoe UI'
            HeadingSize: =10
            Height: =Parent.Height
            HoverFill: =RGBA(186, 202, 226, .2)
            Items: |-
              =Table(
                  {
                      tblCount: CountRows(colCdsJobs),
                      tblName: "localCdsJobs"
                  },
                  {
                      tblCount: CountRows(colCdsJobEntries),
                      tblName: "localCdsJobEntries"
                  },
                  {
                      tblCount: CountRows(colCdsJobEntrySelections),
                      tblName: "localCdsJobEntrySelections"
                  },
                  {
                      tblCount: CountRows(colCdsWindowMeasurements),
                      tblName: "localCdsWindowMeasurements"
                  },
                  {
                      tblCount: CountRows(colCdsRooms),
                      tblName: "localCdsRooms"
                  },
                  {
                      tblCount: CountRows(colCdsWindowModels),
                      tblName: "localCdsWindowModels"
                  },
                  {
                      tblCount: CountRows(colCdsWindowChoices),
                      tblName: "localCdsWindowChoices"
                  },
                  {
                      tblCount: CountRows(colCdsJobStages),
                      tblName: "localCdsJobStages"
                  },
                  {
                      tblCount: CountRows(colCdsWindowStyles),
                      tblName: "localCdsWindowStyles"
                  },
                  {
                      tblCount: CountRows(colCdsMarketSegments),
                      tblName: "localCdsMarketSegments"
                  },
                  {
                      tblCount: CountRows(colCdsAccounts),
                      tblName: "localCdsAccounts"
                  },
                  {
                      tblCount: CountRows(colCdsWindowMulls),
                      tblName: "localCdsWindowMulls"
                  },
                  {
                      tblCount: CountRows(colCdsJobRooms),
                      tblName: "localCdsJobRooms"
                  },
                  {
                      tblCount: CountRows(colCdsLaborItems),
                      tblName: "localCdsLaborItems"
                  },
                  {
                      tblCount: CountRows(colCdsMarketLaborItems),
                      tblName: "localCdsMarketLaborItems"
                  },
                  {
                      tblCount: CountRows(colCdsJobLaborItems),
                      tblName: "localCdsJobLaborItems"
                  },
                  {
                      tblCount: CountRows(colCdsMaterialItems),
                      tblName: "localCdsMaterialItems"
                  },
                  {
                      tblCount: CountRows(colCdsMarketMaterialItems),
                      tblName: "localCdsMarketMaterialItems"
                  },
                  {
                      tblCount: CountRows(colCdsJobMaterialItems),
                      tblName: "localCdsJobMaterialItems"
                  },
                  {
                      tblCount: CountRows(colCdsDocuments),
                      tblName: "localCdsDocuments"
                  },
                  {
                      tblCount: CountRows(colCdsJobDocuments),
                      tblName: "localCdsJobDocuments"
                  },
                  {
                      tblCount: CountRows(colCdsJobEntryOptions),
                      tblName: "localCdsJobEntryOptions"
                  },
                  {
                      tblCount: CountRows(colDeleteMaterialItems),
                      tblName: "localDeleteMaterialItems"
                  }
              )
            SelectedFill: =RGBA(56, 96, 178, .2)
            Size: =12
            Visible: =!gblAppAutoload
            Width: =481
            X: =543
          Children:
            - tblCount_Column1:
                Control: DataTableColumn@1.0.1
                Variant: Textual
                IsLocked: true
                Properties:
                  AutoWidth: =false
                  FieldDisplayName: ="tblCount"
                  FieldName: ="tblCount"
                  Order: =2
                  Text: =ThisItem.tblCount
                  Width: =204
            - tblName_Column1:
                Control: DataTableColumn@1.0.1
                Variant: Textual
                IsLocked: true
                Properties:
                  AutoWidth: =false
                  FieldDisplayName: ="tblName"
                  FieldName: ="tblName"
                  Order: =1
                  Text: =ThisItem.tblName
                  Width: =241
      - con_Loading_Steps:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =Color.White
            Height: =661
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =10
            PaddingLeft: =5
            PaddingRight: =5
            PaddingTop: =10
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =!gblAppAutoload
            Width: =340
          Children:
            - btn_Loading_VersionCheck:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =Trace("Button Pressed: Loading Step X",TraceSeverity.Information);
                    If(
                        // Connected
                        Connection.Connected,
                        UpdateContext(
                            {
                                locLoadingText: "Checking App version...",
                                locLoadingPercent: 5
                            }
                        );
                        UpdateContext(
                            // Check CDS for Power App Cache
                            {
                                locPowerAppCache: First(
                                    Filter(
                                        'Power App Caches',
                                        'Power App Caches (Views)'.'Vesta Measure'
                                    )
                                )
                            }
                        );
                        If(
                                // If User is not on correct version, redirect to screen to prompt update
                            locPowerAppCache.'App Version' = gblAppVersion,
                            Select(btn_Loading_OptionSets),
                            Navigate('Incorrect Version Screen');
                        ),
                        // Not Connected
                        LoadData(
                            colCdsOptionSets,
                            "localCdsOptionSets",
                            true
                        );
                        Set(
                            gblOptionSets,
                            First(colCdsOptionSets)
                        );
                        If(
                            IsEmpty(colCdsOptionSets),
                            Notify(
                                "You are offline and the app has not been configured. Please try again, when online.",
                                NotificationType.Error
                            ),
                            Select(btn_Loading_LoadLocalFiles);
                        )
                    );
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="X) Version Check"
                  Visible: =!gblAppAutoload
                  Width: =300
                  X: =16
                  Y: =32
            - btn_Loading_OptionSets:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =Trace("Button Pressed: Loading Step 0",TraceSeverity.Information);
                    UpdateContext(
                        {
                            locLoadingText: "Checking Vesta Data...",
                            locLoadingPercent: 10
                        }
                    );
                    If(
                        gblAppLoadOffline,
                        LoadData(
                            colCdsOptionSets,
                            "localCdsOptionSets",
                            true
                        )
                    );
                    Set(
                        gblOptionSets,
                        First(colCdsOptionSets)
                    );
                    If(
                        gblOptionSets.TimeStamp < locPowerAppCache.'Option Sets' Or IsEmpty(colCdsOptionSets),
                        Set(
                            gblOptionSets,
                            {
                                TimeStamp: locPowerAppCache.'Option Sets',
                                Global: {
                                    PhotoType: {
                                        Window: 'Photo Type'.Window,
                                        ElevationSide: 'Photo Type'.'Elevation (Side)',
                                        ElevationFront: 'Photo Type'.'Elevation (Front)',
                                        ElevationRear: 'Photo Type'.'Elevation (Rear)',
                                        Other: 'Photo Type'.Other
                                    },
                                    DataEntryType: {
                                        Construction: 'Data Entry Type'.Construction,
                                        ExistingWindows: 'Data Entry Type'.'Existing Windows',
                                        ExteriorCapping: 'Data Entry Type'.'Exterior Capping',
                                        ExteriorCovering: 'Data Entry Type'.'Exterior Covering',
                                        ExteriorWindowComponent: 'Data Entry Type'.'Exterior Window Component',
                                        Floor: 'Data Entry Type'.Floor,
                                        InteriorWindowComponent: 'Data Entry Type'.'Interior Window Component',
                                        LeadTestResults: 'Data Entry Type'.'Lead Test Results',
                                        LumberGrade: 'Data Entry Type'.'Lumber Grade',
                                        LumberSpecies: 'Data Entry Type'.'Lumber Species',
                                        Room: 'Data Entry Type'.Room,
                                        SpecialConditions: 'Data Entry Type'.'Special Conditions',
                                        SpecialEquipmentNeeded: 'Data Entry Type'.'Special Equipment Needed',
                                        StyleOfHome: 'Data Entry Type'.'Style Of Home'
                                    },
                                    YesNoNull: {
                                        Yes: 'Yes No Null'.Yes,
                                        No: 'Yes No Null'.No
                                    }
                                },
                                Job: {
                                    CompletedJob: {
                                        Yes: 'Completed (Jobs)'.Yes,
                                        No: 'Completed (Jobs)'.No
                                    },
                                    LeadTestSendDocuments: {
                                        Yes: 'Lead Test: Send Document? (Jobs)'.Yes,
                                        No: 'Lead Test: Send Document? (Jobs)'.No
                                    },
                                    IsSourceVestaDeal: {
                                        Yes: 'Is Source Vesta Deal? (Jobs)'.Yes,
                                        No: 'Is Source Vesta Deal? (Jobs)'.No
                                    },
                                    JobPackageSendDocuments: {
                                        Yes: 'Job Package: Send Documents? (Jobs)'.Yes,
                                        No: 'Job Package: Send Documents? (Jobs)'.No
                                    },
                                    JobFinishedSendEmail: {
                                        Yes: 'Job Finished: Send Email? (Jobs)'.Yes,
                                        No: 'Job Finished: Send Email? (Jobs)'.No
                                    }
                                },
                                JobPhoto: {
                                    Status: {
                                        Inactive: 'Status (Job Photos)'.Inactive,
                                        Active: 'Status (Job Photos)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Job Photos)'.Inactive}
                                },
                                JobRoom: {
                                    Status: {
                                        Inactive: 'Status (Job Rooms)'.Inactive,
                                        Active: 'Status (Job Rooms)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Job Rooms)'.Inactive}
                                },
                                JobLaborItem: {
                                    Status: {
                                        Active: 'Status (Job Labor Items)'.Active,
                                        Inactive: 'Status (Job Labor Items)'.Inactive
                                    },
                                    StatusReason: {
                                        Active: 'Status Reason (Job Labor Items)'.Active,
                                        Inactive: 'Status Reason (Job Labor Items)'.Inactive
                                    }
                                },
                                JobMaterialItem: {
                                    Status: {
                                        Inactive: 'Status (Job Material Items)'.Inactive,
                                        Active: 'Status (Job Material Items)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Job Material Items)'.Inactive}
                                },
                                JobEntrySelection: {
                                    Status: {
                                        Inactive: 'Status (Job Entry Selections)'.Inactive,
                                        Active: 'Status (Job Entry Selections)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Job Entry Selections)'.Inactive}
                                },
                                JobEntry: {
                                    Completed: {
                                        Yes: 'Completed (Job Entries)'.Yes,
                                        No: 'Completed (Job Entries)'.No
                                    },
                                    IsSourceVestaDeal: {
                                        Yes: 'Is Source Vesta Deal? (Jobs)'.Yes,
                                        No: 'Is Source Vesta Deal? (Jobs)'.No
                                    },
                                    Status: {
                                        Inactive: 'Status (Job Entries)'.Inactive,
                                        Active: 'Status (Job Entries)'.Active
                                    },
                                    LeadTestResult: {
                                        Yes: 'Yes No Null'.Yes,
                                        No: 'Yes No Null'.No
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Job Entries)'.Inactive}
                                },
                                JobEntryOption: {
                                    IsLegacy: {
                                        Yes: 'Legacy? (Job Entry Options)'.Yes,
                                        No: 'Legacy? (Job Entry Options)'.No
                                    },
                                    Status: {
                                        Inactive: 'Status (Job Entry Options)'.Inactive,
                                        Active: 'Status (Job Entry Options)'.Active
                                    },
                                    Type: {
                                        Attribute: 'Job Entry Option Types'.Attribute,
                                        Header: 'Job Entry Option Types'.Header,
                                        HierarchyStep: 'Job Entry Option Types'.'Hierarchy Step',
                                        Value: 'Job Entry Option Types'.Value
                                    }
                                },
                                MaterialItems: {
                                    Type: {
                                            CaulkCoil: 'Material Item Type'.CAULK,
                                            Lumber: 'Material Item Type'.COIL,
                                            RoofingSiding: 'Material Item Type'.'FOAM/CLEANER/INSULATION',
                                            LeadSupplies: 'Material Item Type'.'LEAD SUPPLIES'
                                    },
                                    TypeTable: Table(
                                        {Value: 'Material Item Type'.CAULK},
                                        {Value: 'Material Item Type'.COIL},
                                        {Value: 'Material Item Type'.'FOAM/CLEANER/INSULATION'},
                                        {Value: 'Material Item Type'.'LEAD SUPPLIES'}
                                    )
                                },
                                WindowChoices: {
                                    IncludeJambDepth: {
                                        Yes: 'Include Jamb Depth (Window Choices)'.Yes,
                                        No: 'Include Jamb Depth (Window Choices)'.No
                                    },
                                    IncludeMaxProjection: {
                                        Yes: 'Include Max Projection (Window Choices)'.Yes,
                                        No: 'Include Max Projection (Window Choices)'.No
                                    },
                                    IncludeSoffitDepth: {
                                        Yes: 'Include Soffit Depth (Window Choices)'.Yes,
                                        No: 'Include Soffit Depth (Window Choices)'.No
                                    },
                                    IncludeWallThickness: {
                                        Yes: 'Include Wall Thickness (Window Choices)'.Yes,
                                        No: 'Include Wall Thickness (Window Choices)'.No
                                    }
                                },
                                WindowMeasurement: {
                                    Completed: {
                                        Yes: 'Completed (Window Measurements)'.Yes,
                                        No: 'Completed (Window Measurements)'.No
                                    },
                                    Exception: {
                                        Yes: 'Exception? (Window Measurements)'.Yes,
                                        No: 'Exception? (Window Measurements)'.No
                                    },
                                    LeadTestResult: {
                                        Yes: 'Yes No Null'.Yes,
                                        No: 'Yes No Null'.No
                                    },
                                    Status: {
                                        Inactive: 'Status (Window Measurements)'.Inactive,
                                        Active: 'Status (Window Measurements)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Window Measurements)'.Inactive},
                                    Type: {
                                        Sales: 'Window Measurement Types'.Sales,
                                        Tech: 'Window Measurement Types'.Tech,
                                        Other: 'Window Measurement Types'.Other
                                    }
                                },
                                WindowMull: { 
                                    Status: {
                                        Inactive: 'Status (Window Mulls)'.Inactive,
                                        Active: 'Status (Window Mulls)'.Active
                                    },
                                    StatusReason: {Inactive: 'Status Reason (Window Mulls)'.Inactive}
                                },
                                JobDocument: {
                                    Completed: {
                                        Yes: 'Completed (Job Documents)'.Yes,
                                        No: 'Completed (Job Documents)'.No
                                    },
                                    Status: {
                                        Active: 'Status (Job Documents)'.Active
                                    }
                                }
                            }
                        );
                        ClearCollect(
                            colCdsOptionSets,
                            gblOptionSets
                        );
                        If(
                            gblAppLoadOffline,
                            SaveData(
                                colCdsOptionSets,
                                "localCdsOptionSets"
                            )
                        )
                    );
                    // Navigate
                    If(
                        gblAppAutoAdvance,
                        UpdateContext(
                            {
                                locLoadingText: "Loading local data...",
                                locLoadingPercent: 15
                            }
                        );
                        Select(btn_Loading_LoadLocalFiles)
                    );
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="0) Option Sets"
                  Visible: =!gblAppAutoload
                  Width: =300
                  X: =16
                  Y: =54
            - btn_Loading_LoadLocalFiles:
                Control: Classic/Button@2.2.0
                Properties:
                  Align: =Align.Left
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |-
                    =Trace(
                        "Button Pressed: Loading Step 1",
                        TraceSeverity.Information
                        );


                    IfError(   // ✅ Start error handler

                    If(
                        gblAppLoadOffline,
                        // UNSAVED JOBS
                        LoadData(
                            colAUDRecords,
                            "localAUDRecords",
                            true
                        );
                        If(
                            !IsEmpty(colAUDRecords),
                            UpdateContext(
                                {
                                    locLoadingText: "Resuming last session...",
                                    locLoadingPercent: 80
                                }
                            )
                        )
                    );
                    If(
                        !locLoadingSkipLocal,
                        If(
                            gblAppLoadOffline,
                    // ACCOUNTS
                                LoadData(
                                    colCdsAccounts,
                                    "localCdsAccounts",
                                    true
                                );
                    // DOCUMENTS
                                LoadData(
                                    colCdsDocuments,
                                    "localCdsDocuments",
                                    true
                                );
                    // DATA ENTRY CHOICES
                                LoadData(
                                    colCdsDataEntryChoices,
                                    "localCdsDataEntryChoices",
                                    true
                                );
                    // EMPLOYEES
                                LoadData(
                                    colCdsEmployees,
                                    "localCdsEmployees",
                                    true
                                );
                    // JOB DOCUMENTS
                                LoadData(
                                    colCdsJobDocuments,
                                    "localCdsJobDocuments",
                                    true
                                );
                    // JOB ENTRIES
                                LoadData(
                                    colCdsJobEntries,
                                    "localCdsJobEntries",
                                    true
                                );
                    // JOB ENTRY OPTIONS
                                Clear(colCdsJobEntryOptions);
                                LoadData(
                                    colStagingCdsJobEntryOptions_Header,
                                    "localCdsJobEntryOptions_Header",
                                    true
                                );
                                LoadData(
                                    colStagingCdsJobEntryOptions_Attribute,
                                    "localCdsJobEntryOptions_Attribute",
                                    true
                                );
                                LoadData(
                                    colStagingCdsJobEntryOptions_HierarchyStep,
                                    "localCdsJobEntryOptions_HierarchyStep",
                                    true
                                );
                                LoadData(
                                    colStagingCdsJobEntryOptions_Value,
                                    "localCdsJobEntryOptions_Value",
                                    true
                                );
                                Collect(
                                    colCdsJobEntryOptions,
                                    colStagingCdsJobEntryOptions_Header
                                );
                                Collect(
                                    colCdsJobEntryOptions,
                                    colStagingCdsJobEntryOptions_Attribute
                                );
                                Collect(
                                    colCdsJobEntryOptions,
                                    colStagingCdsJobEntryOptions_HierarchyStep
                                );
                                Collect(
                                    colCdsJobEntryOptions,
                                    colStagingCdsJobEntryOptions_Value
                                );
                                Clear(colStagingCdsJobEntryOptions_Header);
                                Clear(colStagingCdsJobEntryOptions_Attribute);
                                Clear(colStagingCdsJobEntryOptions_HierarchyStep);
                                Clear(colStagingCdsJobEntryOptions_Value);
                    // JOB ENTRY SELECTIONS
                                LoadData(
                                    colCdsJobEntrySelections,
                                    "localCdsJobEntrySelections",
                                    true
                                );
                    // JOB LABOR ITEMS
                                LoadData(
                                    colCdsJobLaborItems,
                                    "localCdsJobLaborItems",
                                    true
                                );
                    // JOB MATERIAL ITEMS
                                LoadData(
                                    colCdsJobMaterialItems,
                                    "localCdsJobMaterialItems",
                                    true
                                );
                    // JOB PHOTOS
                                LoadData(
                                    colCdsJobPhotos,
                                    "localCdsJobPhotos",
                                    true
                                );
                    // JOB ROOMS
                                LoadData(
                                    colCdsJobRooms,
                                    "localCdsJobRooms",
                                    true
                                );
                    // JOBS
                                LoadData(
                                    colCdsJobs,
                                    "localCdsJobs",
                                    true
                                );
                    // JOB STAGES
                                LoadData(
                                    colCdsJobStages,
                                    "localCdsJobStages",
                                    true
                                );
                    // LABOR ITEMS
                                LoadData(
                                    colCdsLaborItems,
                                    "localCdsLaborItems",
                                    true
                                );
                    // MARKET LABOR ITEMS

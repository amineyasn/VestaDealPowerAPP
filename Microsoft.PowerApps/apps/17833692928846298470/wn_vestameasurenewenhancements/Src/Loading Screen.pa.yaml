ee Or IsEmpty(colCdsEmployees),\n        ClearCollect(\n            colCdsEmployees,\n            Filter(\n                Employees,\n                'Employees (Views)'.'Active Employees'\n            )\n        );\n        UpdateContext({locSaveEmployees: true})\n    ),\n	// JOB STAGES\n    If(\n        First(\n            SortByColumns(\n                colCdsJobStages,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_JobStages Or IsEmpty(colCdsJobStages),\n        ClearCollect(\n            colCdsJobStages,\n            Filter(\n                'Job Stages',\n                'Job Stages (Views)'.'Active Job Stages'\n            )\n        );\n        UpdateContext({locSaveJobStages: true})\n    ),\n	// LABOR ITEMS\n    If(\n        First(\n            SortByColumns(\n                colCdsLaborItems,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_LaborItems Or IsEmpty(colCdsLaborItems),\n        ClearCollect(\n            colCdsLaborItems,\n            AddColumns(\n                Filter(\n                    'Labor Items',\n                    'Labor Items (Views)'.'Active Labor Items'\n                ),\n                appOptionSetType,\n                Type\n            )\n        );\n        UpdateContext({locSaveLaborItems: true})\n    ),\n// MARKET SEGMENTS\n    If(\n        First(\n            SortByColumns(\n                colCdsMarketSegments,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_MarketSegments Or IsEmpty(colCdsMarketSegments),\n        ClearCollect(\n            colCdsMarketSegments,\n            Filter(\n                'Market Segments',\n                'Market Segments (Views)'.'Active Market Segments'\n            )\n        );\n        UpdateContext({locSaveMarketSegments: true})\n    ),\n// MATERIAL ITEMS\n    If(\n        First(\n            SortByColumns(\n                colCdsMaterialItems,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_MaterialItems Or IsEmpty(colCdsMaterialItems),\n        ClearCollect(\n            colCdsMaterialItems,\n            AddColumns(\n                Filter(\n                    'Material Items',\n                    'Material Items (Views)'.'Active Material Items'\n                ),\n                appOptionSetType,\n                Type\n            )\n        );\n        UpdateContext({locSaveMaterialItems: true})\n    ),\n// MATERIAL ITEM COLORS\n    If(\n        First(\n            SortByColumns(\n                colCdsMaterialItemColors,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_MaterialItemColors Or IsEmpty(colCdsMaterialItemColors),\n        ClearCollect(\n            colCdsMaterialItemColors,\n            Filter(\n                'Material Item Colors',\n                'Material Item Colors (Views)'.'Active Material Item Colors'\n            )\n        );\n        UpdateContext({locSaveMaterialItemColors: true})\n    ),\n\n    //MARKET MATERIAL ITEMS\n    If(  \n        First(\n            SortByColumns(\n                colCdsMarketMaterialItems,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_MarketMaterialItems Or IsEmpty(colCdsMarketMaterialItems),\n ClearCollect(\n    colCdsMarketSegmentsIds,\n    Distinct('Market Segments', 'Market Segment')\n);\nForAll(\n    colCdsMarketSegmentsIds,\n    Collect(\n        colCdsMarketMaterialItems,\n        Filter(\n            'Market Material Items',\n            'Market Segment'.'Market Segment'= colCdsMarketSegmentsIds[@Value]\n        )\n    )\n);\n        UpdateContext({locSaveMarketMaterialItems: true})\n    ),\n    \n\n// ROOMS\n    If(\n        First(\n            SortByColumns(\n                colCdsRooms,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_Rooms Or IsEmpty(colCdsRooms),\n        ClearCollect(\n            colCdsRooms,\n            AddColumns(\n                Filter(\n                    Rooms,\n                    'Rooms (Views)'.'Active Rooms'\n                ),\n                appRoomIdText,\n                Text(Room)\n            )\n        );\n        UpdateContext({locSaveRooms: true})\n    ),\n   // VESTA SETTINGS\n   If(\n        First(\n            SortByColumns(\n                colCdsVestaSettings,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_VestaSettings Or IsEmpty(colCdsVestaSettings),\n        ClearCollect(\n            colCdsVestaSettings,\n            Filter(\n                'Vesta Settings',\n                'Vesta Settings (Views)'.'Active Vesta Measure Settings'\n            )\n        );\n        UpdateContext({locSaveVestaSettings: true})\n   ),\n// WINDOW CHOICES\n    If(\n        First(\n            SortByColumns(\n                colCdsWindowChoices,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_WindowChoices Or IsEmpty(colCdsWindowChoices),\n        ClearCollect(\n            colCdsWindowChoices,\n            AddColumns(\n                Filter(\n                    'Window Choices',\n                    'Window Choices (Views)'.'Active Window Choices'\n                ),\n                appWindowStyleIdText,\n                Text(Style.'Window Style'),\n                appWindowModelIdText,\n                Text(Model.'Window Model'),\n                appAccountsIdText,\n                Text(Manufacturer.Account),\n                appJobEntryOptionIdText,\n                Text('Job Entry Option (Header)'.'Job Entry Option')\n            )\n        );\n        UpdateContext({locSaveWindowChoices: true})\n    ),\n// WINDOW MODELS\n    If(\n        First(\n            SortByColumns(\n                colCdsWindowModels,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_WindowModels Or IsEmpty(colCdsWindowModels),\n        ClearCollect(\n            colCdsWindowModels,\n            Filter(\n                'Window Models',\n                'Window Models (Views)'.'Active Window Models'\n            )\n        );\n        UpdateContext({locSaveWindowModels: true})\n    ),\n// WINDOW STYLES\n    If(\n        First(\n            SortByColumns(\n                colCdsWindowStyles,\n                \"modifiedon\",\n                SortOrder.Descending\n            )\n        ).'Modified On' < locCdsOrgLatest_WindowStyles Or IsEmpty(colCdsWindowStyles),\n        ClearCollect(\n            colCdsWindowStyles,\n            Filter(\n                'Window Styles',\n                'Window Styles (Views)'.'Active Window Styles'\n            )\n        );\n        UpdateContext({locSaveWindowStyles: true})\n    )\n);\nIf(\n    gblAppAutoAdvance,\n    UpdateContext(\n        {\n            locLoadingText: \"Caching Vesta Data...\",\n            locLoadingPercent: 40\n        }\n    );\n    Select(btn_Loading_SaveCdsOrg)\n)"

                                !IsEmpty(colCdsJobEntryOptions_HierarchyStep),
                                !IsEmpty(colCdsJobEntryOptions_Value)
                            ),
                            ClearCollect(colCdsJobEntryOptions, colCdsJobEntryOptions_Header);
                            Collect(colCdsJobEntryOptions, colCdsJobEntryOptions_Attribute);
                            Collect(colCdsJobEntryOptions, colCdsJobEntryOptions_HierarchyStep);
                            Collect(colCdsJobEntryOptions, colCdsJobEntryOptions_Value);
                            Clear(colCdsJobEntryOptions_Header);
                            Clear(colCdsJobEntryOptions_Attribute);
                            Clear(colCdsJobEntryOptions_HierarchyStep);
                            Clear(colCdsJobEntryOptions_Value);

                                    colCdsJobEntryOptions,
                                    Type = gblOptionSets.JobEntryOption.Type.Value
                                )
                            ),
                            RemoveIf(
                                colCdsJobEntryOptions,
                                Type = gblOptionSets.JobEntryOption.Type.Value
                            );
                            ForAll(
                                Filter(
                                    colCdsJobEntryOptions_Header,
                                    Type = gblOptionSets.JobEntryOption.Type.Header
                                 ) As tblJobEntryOptionHeaders,
                                Collect(
                                    colCdsJobEntryOptions_Value,
                                    Filter(
                                        [@'Job Entry Options'],

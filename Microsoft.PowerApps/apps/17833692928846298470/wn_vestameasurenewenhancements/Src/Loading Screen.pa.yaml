                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: |
                    =Trace("Button Pressed: Loading Step 7",TraceSeverity.Information);
                    If(
                        // fall back screen when gblTextClickedSaveScreen is blank
                        gblTextClickedSaveScreen = "Jobs Screen",
                        Navigate(
                            'Jobs Screen',
                            ScreenTransition.Fade
                        ),
                        // go to load job screen
                        !IsBlank(gblRecordJobCurrent) And !IsToday(gblRecordJobCurrent.'Start Date Time'),
                        Navigate(
                            'Load Job Screen',
                            ScreenTransition.Fade
                        ),
                        // go to rooms screen
                        gblTextClickedSaveScreen = "Rooms Screen" And IsToday(gblRecordJobCurrent.'Start Date Time'),
                        Navigate(
                            'Rooms Screen',
                            ScreenTransition.Fade
                        ),
                        // go to final steps screen
                        gblTextClickedSaveScreen = "Final Steps Screen" And IsToday(gblRecordJobCurrent.'Start Date Time'),
                        Navigate(
                            'Final Steps Screen',
                            ScreenTransition.Fade
                        ),
                        // fall back screen when gblTextClickedSaveScreen is blank
                        Navigate(
                            'Jobs Screen',
                            ScreenTransition.Fade
                        )
                    );
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Text: ="7) Proceed"
                  Visible: =!gblAppAutoload
                  Width: =300
                  X: =16
                  Y: =493
